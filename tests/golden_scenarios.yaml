# ───────────────────────────────────────────────────────────────────
# ZEREK Quick Check · Регрессионные эталоны (R12.5 baseline)
# ───────────────────────────────────────────────────────────────────
# Зафиксировано на коде после R12.5 S2 Commit 2 (formats_r12 + ×WD).
# Ключевое отличие от R10/R11 baseline:
#   · revenue теперь × working_days_per_month (HOME 26, STUDIO 22 и т.д.)
#     вместо × 30 кален.дней.
#   · experience.check_multiplier и avg_clients_per_day_mature
#     применяются через A1 archetype: для 'none' — chek×0.85, traffic 3.
#   · Это даёт **реалистичный** mature для новичка-HOME 224K вместо
#     R10 baseline 315K (R10 эталон считал «новичок работает как опытный
#     7 кл/день × 30 дней» — методологически неверно для R12.5).
#
# Прогон: pytest tests/test_engine_regression.py -v
# ───────────────────────────────────────────────────────────────────

# ═══ CRITICAL — must pass на каждом PR (5 шт) ═══

- id: manicure_home_astana_700k_baseline
  severity: critical
  description: Главный baseline-сценарий, R12.5 канон (× WD + experience overrides)
  inputs:
    niche: MANICURE
    format: MANICURE_HOME
    city: astana
    capital: 700000
    experience: none
    start_month: 5
  expected:
    capex:                  { exact: 480000 }
    avg_y1:                 { exact: 189542 }
    mature_monthly:         { exact: 224000 }
    breakeven_clients:      { exact: 22 }
    safety_mature:          { exact: 6.0 }
    safety_ramp:            { exact: 2.4 }
    capital_zone:           { exact: YELLOW }
    income_grade:           { exact: LOW }
    income_ratio_pct:       { exact: 34 }
    marketing_year_total:   { exact: 715000 }
    marketing_phase_ramp:   { exact: 152333 }
    marketing_phase_tuning: { exact: 54000 }
    marketing_phase_mature: { exact: 16000 }

