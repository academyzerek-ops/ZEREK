# ───────────────────────────────────────────────────────────────────
# ZEREK Quick Check · Регрессионные эталоны
# ───────────────────────────────────────────────────────────────────
# Каждый сценарий: inputs (что подаём в engine) + expected (что
# ожидаем от engine.compute). Матчеры: exact / min+max / approx.
# Зафиксировано на коде после R10 #1+#2 (commit 228a3ad).
# Прогон: pytest tests/test_engine_regression.py -v
# ───────────────────────────────────────────────────────────────────

# ═══ CRITICAL — must pass на каждом PR (5 шт) ═══

- id: manicure_home_astana_700k_baseline
  severity: critical
  description: Главный baseline-сценарий, по нему откалиброван движок R10
  inputs:
    niche: MANICURE
    format: MANICURE_HOME
    city: astana
    capital: 700000
    experience: none
    start_month: 5
  expected:
    capex:                  { exact: 480000 }
    avg_y1:                 { exact: 270351 }
    mature_monthly:         { exact: 315000 }
    breakeven_clients:      { exact: 19 }
    safety_mature:          { exact: 6.9 }
    safety_ramp:            { exact: 2.8 }
    capital_zone:           { exact: YELLOW }
    income_grade:           { exact: MODEST }
    income_ratio_pct:       { exact: 48 }
    marketing_year_total:   { exact: 715000 }
    marketing_phase_ramp:   { exact: 152333 }
    marketing_phase_tuning: { exact: 54000 }
    marketing_phase_mature: { exact: 16000 }

