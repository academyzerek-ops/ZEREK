- id: manicure_home_astana_700k_none_aggressive_antipattern
  severity: critical
  description: HOME × none × aggressive — антипаттерн (новичок + агрессивный маркетинг). Бюджет ×1.40, mature_profit ниже из-за высоких расходов.
  inputs:
    niche: MANICURE
    format: MANICURE_HOME
    city: astana
    capital: 700000
    experience: none
    strategy: aggressive
    start_month: 5
  expected:
    capex:                  { exact: 480000 }       # CAPEX не зависит от стратегии
    capital_zone:           { exact: AMBER }        # 700K < yellow_threshold (для CAPEX 480K порог выше)
    income_grade:           { exact: LOW }          # mature ниже из-за агрессивного маркетинга
    marketing_year_total:   { min: 998000, max: 1003000 }   # ×1.40 от middle 715K
    marketing_phase_ramp:   { min: 210000, max: 215000 }    # 152×1.40 ≈ 213K (среднее по 3 мес)
    marketing_phase_tuning: { min: 75000, max: 76000 }      # 54×1.40
    marketing_phase_mature: { min: 22000, max: 23000 }      # 16×1.40
