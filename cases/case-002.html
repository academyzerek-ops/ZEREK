<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#101010">
<title>ZEREK — Как «успешный успех» чуть не убил клининг</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{background:#101010;color:#F3F5F7;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;font-size:15px;line-height:1.5;-webkit-font-smoothing:antialiased}
.page{max-width:480px;margin:0 auto;padding:20px 20px 100px}
.back{display:inline-flex;align-items:center;gap:4px;padding:8px 16px 8px 12px;background:#1E1E1E;color:#999;border:1px solid #2C2C2C;border-radius:20px;font-size:13px;font-weight:600;text-decoration:none;margin-bottom:24px}
.back:active{background:#252525}
.back svg{width:14px;height:14px;stroke:#999;stroke-width:2.5;fill:none}
.tag{display:inline-block;font-size:11px;font-weight:600;padding:4px 12px;border-radius:9999px;margin-bottom:16px}
.tag-loss{background:rgba(255,48,64,0.12);color:#FF3040}
.tag-win{background:rgba(0,186,124,0.12);color:#00BA7C}
h1{font-size:24px;font-weight:700;letter-spacing:-0.3px;line-height:1.2;margin-bottom:12px}
.preview{font-size:15px;color:#999;line-height:1.6;margin-bottom:32px}
.placeholder{padding:40px 20px;text-align:center;color:#666;font-size:14px;border:1px dashed #2C2C2C;border-radius:16px}
</style>
</head>
<body>
<div class="page">
  <a class="back" href="../products/app.html?tab=cases"><svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>Назад</a>
  <span class="tag tag-loss">Провал</span>
  <h1>Как «успешный успех» чуть не убил клининг</h1>
  <p class="preview">Лидер B2C решил масштабироваться в B2B без подготовки — и чуть не потерял всё.</p>
  <div class="placeholder">Полный текст кейса готовится.</div>
</div>
</body>
</html>
