    effective_from: "2026-01-01"

# =============================================================================
# ПЛАТЕЖИ ИП «ЗА СЕБЯ» (независимо от дохода)
# =============================================================================
# ИП обязан платить эти платежи ежемесячно, даже если дохода нет.
# Минимальная база = 1 МЗП (85 000 тг).
# Максимальная база = 50 МЗП (для ОПВ).
# =============================================================================
ip_self_payments:
  
  opv:
    label_ru: "Обязательные пенсионные взносы"
    label_short: "ОПВ"
    rate_pct: 10.0
    base_type: "declared_income"  # ИП сам заявляет доход
    base_min_units: 1             # не менее 1 МЗП
    base_min_kzt: 85000
    base_max_units: 50            # не более 50 МЗП
    base_max_kzt: 4250000
    min_payment_kzt: 8500         # 10% от 1 МЗП
    max_payment_kzt: 425000
    source: "Социальный кодекс РК (раздел пенсионное обеспечение)"
    effective_from: "2026-01-01"
    
    calculation_formula: "max(declared_income, 1_MZP) × 10%"
    
    note_ru: |
      ИП вправе заявить любой доход в пределах 1-50 МЗП. При нулевом 
      обороте — можно применить ставку к фактической выручке (даже если 
      она ниже МЗП) или к 1 МЗП. В практике считают от 1 МЗП.
  
  opvr:
    label_ru: "Обязательные пенсионные взносы работодателя"
    label_short: "ОПВР"
    rate_pct: 3.5
    previous_rate_pct: 2.5
    change_note_ru: "Повышена с 2,5% до 3,5% с 01.01.2026"
    base_type: "declared_income"
    base_min_units: 1
    base_min_kzt: 85000
    base_max_units: 50
    base_max_kzt: 4250000
    min_payment_kzt: 2975         # 3.5% от 1 МЗП
    max_payment_kzt: 148750
    source: "Социальный кодекс РК, ст. 251 (ред. 2026)"
    effective_from: "2026-01-01"
    
    note_ru: |
      Платится независимо от наличия сотрудников. ИП платит за себя.
      Освобождены ИП, рождённые до 1975 года.
  
  so:
    label_ru: "Социальные отчисления"
    label_short: "СО"
    rate_pct: 5.0
    base_type: "declared_income_minus_opv"  # база = доход - ОПВ
    base_min_units: 1
    base_min_kzt: 85000
    base_max_units: 7             # не более 7 МЗП
    base_max_kzt: 595000
    min_payment_kzt: 4250         # 5% от 1 МЗП
    max_payment_kzt: 29750
    source: "Социальный кодекс РК"
    effective_from: "2026-01-01"
    
    note_ru: |
      При заявленном доходе выше 1 МЗП база для СО = заявленный доход - ОПВ.
      При минимальной базе (1 МЗП) платёж = 85 000 × 5% = 4 250 ₸.
  
  vosms:
    label_ru: "Взносы на обязательное медстрахование (ИП за себя)"
    label_short: "ВОСМС"
    rate_pct: 5.0
    base_type: "fixed"
    base_formula: "1.4 × MZP"
    base_value_kzt: 119000        # 1.4 × 85 000
    payment_kzt: 5950             # 5% от 119 000
    source: "Закон РК «Об обязательном социальном медстраховании»"
    effective_from: "2026-01-01"
    
    note_ru: |
      Фиксированный платёж 5% от 1.4 МЗП = 5 950 ₸/мес.
      НЕ зависит от дохода. Платится ежемесячно.

# Общий минимальный платёж ИП за себя в месяц
ip_minimum_monthly_payment:
  components:
    - opv:   8500      # 10% × 85000
    - opvr:  2975      # 3.5% × 85000
    - so:    4250      # 5% × 85000
    - vosms: 5950      # 5% × (1.4 × 85000)
  
  total_kzt: 21675
  
  description_ru: |
    Это минимальная сумма, которую ИП обязан платить ЕЖЕМЕСЯЧНО,
    даже если бизнес в ноль или без дохода.
    Используется для расчёта подушки безопасности при планировании старта.
  
  note_for_calculator: |
    В Quick Check блок «Резерв безопасности» использует это значение
    (НЕ соцплатежи от зрелого дохода!) для расчёта минимальной
    ежемесячной нагрузки в период без выручки.

# =============================================================================
# ПЛАТЕЖИ ЗА СОТРУДНИКОВ (для форматов с наймом)
# =============================================================================
employee_payments:
  
  opv_employee:
    label_ru: "ОПВ работника (удерживается из зарплаты)"
    rate_pct: 10.0
    base: "salary"
    base_max_units: 50
    withheld_from_employee: true
    source: "Социальный кодекс РК"
  
  opvr_employer:
    label_ru: "ОПВР работодателя (за счёт работодателя)"
    rate_pct: 3.5
    base: "salary"
    base_min_units: 1
    base_max_units: 50
    paid_by_employer: true
    source: "Социальный кодекс РК, ст. 251 (ред. 2026)"
  
  so_employee:
    label_ru: "Социальные отчисления работодателя"
    rate_pct: 5.0
    base: "salary_minus_opv"
    base_min_units: 1
    base_max_units: 7
    source: "Социальный кодекс РК"
  
  vosms_employee_withheld:
    label_ru: "ВОСМС с работника (удерживается из зарплаты)"
    rate_pct: 2.0
    base: "salary"
    base_max_units: 10
    withheld_from_employee: true
    source: "Закон об ОСМС"
  
  oosms_employer:
    label_ru: "ООСМС работодателя (за счёт работодателя)"
    rate_pct: 3.0
    base: "salary"
    base_max_units: 40          # в 2026 году лимит увеличен с 10 до 40 МЗП
    paid_by_employer: true
    source: "Закон об ОСМС (ред. 2026)"
  
  ipn_employee:
    label_ru: "ИПН работника (удерживается)"
    rate_pct: 10.0
    progressive_threshold_mrp: 8500  # доход свыше 8500 МРП/год → 15%
    progressive_rate_pct: 15.0
    base_calculation: "salary - opv - vosms - tax_deduction"
    tax_deduction_mrp: 30            # вычет 30 МРП/мес
    tax_deduction_kzt: 129750        # 30 × 4325
    source: "Налоговый кодекс РК (ред. 2026)"
  
  social_tax:
    label_ru: "Социальный налог"
    calculation_note: "Зависит от режима работодателя"
    too_oer_calc: "соцналог_на_ФОТ - СО"  # для ТОО на ОУР
    ip_our_per_worker_mrp: 1        # ИП на ОУР: 1 МРП за работника, 2 МРП за себя
    source: "Налоговый кодекс РК (ред. 2026)"

# =============================================================================
# УСН (СНР НА ОСНОВЕ УПРОЩЁННОЙ ДЕКЛАРАЦИИ)
# =============================================================================
usn:
  label_ru: "СНР на основе упрощённой декларации"
  label_short: "Упрощёнка"
  
  base_rate_pct: 4.0              # БАЗОВАЯ СТАВКА (изменилась с 3% на 4% в 2026!)
  previous_base_rate_pct: 3.0
  change_note_ru: "Базовая ставка повышена с 3% до 4% с 01.01.2026"
  
  municipality_rate_range_pct: [2.0, 6.0]
  municipality_rate_note_ru: "Маслихаты могут устанавливать ставку ±50% от базовой (2-6%)"
  
  tax_base: "revenue"               # налог платится с ВЫРУЧКИ, не с прибыли
  
  # Пороги применения
  annual_revenue_limit_mrp: 600000
  annual_revenue_limit_kzt: 2595000000  # 2.595 млрд ₸
  
  # Лимиты по сотрудникам
  employee_limit: null              # СНЯТЫ с 2026 года
  employee_limit_note_ru: "Ограничения по численности сотрудников сняты с 2026"
  
  # Может ли быть плательщиком НДС
