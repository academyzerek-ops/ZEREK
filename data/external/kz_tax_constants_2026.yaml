# =============================================================================
# kz_tax_constants_2026.yaml
#
# Единая база финансовых констант Казахстана на 2026 год.
# Источник правды для всех расчётов движка ZEREK.
#
# ВАЖНО:
# • Каждая цифра имеет ссылку на источник
# • При изменении законодательства обновляем ТОЛЬКО этот файл
# • Код НЕ должен содержать захардкоженных ставок — только чтение отсюда
# • effective_from — дата вступления в силу, используется для истории
# • Если ставка изменится в середине года — создаём новый файл и логируем
#
# АВТОР: Ноа + Адиль | ПРОВЕРЕНО: 2026-04-23
# =============================================================================

meta:
  year: 2026
  version: "1.1"
  last_updated: "2026-04-23"
  changelog:
    - version: "1.1"
      date: "2026-04-23"
      changes:
        - "Все 20 городов УСН проверены через официальные источники, verification_status=confirmed"
        - "Добавлены: Семей (2%), Жезказган (3%), Конаев (2%)"
        - "Корректировки по областным центрам"
    - version: "1.0"
      date: "2026-04-23"
      changes:
        - "Первая версия файла"
        - "Базовые константы МРП, МЗП, соцплатежи ИП, УСН по 16 городам"
  legal_basis: |
    Закон РК № 239-VIII от 08.12.2025 «О республиканском бюджете на 2026-2028 годы»
    Налоговый кодекс РК (новая редакция, Закон № 214-VIII от 18.07.2025, в силе с 01.01.2026)
    Социальный кодекс РК
  
  review_schedule: "Ежегодно в декабре (после утверждения бюджета) + при изменении законодательства"
  
  next_review_date: "2026-12-01"

# =============================================================================
