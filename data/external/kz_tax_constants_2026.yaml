  mzp:
    value: 85000
    currency: KZT
    label_ru: "Минимальная заработная плата"
    label_short: "МЗП"
    description_ru: |
      Минимальный размер оплаты труда за полный рабочий месяц. 
      Используется как минимальная база для соцплатежей ИП за себя.
    previous_year_value: 85000
    change_pct: 0.0
    source: "ст. 7 Закона РК № 239-VIII от 08.12.2025"
    effective_from: "2026-01-01"
    note_ru: "В 2026 году МЗП сохранён на уровне 2025 года"
  
  min_pension:
    value: 69049
    currency: KZT
    label_ru: "Минимальная пенсия"
    source: "ст. 7 Закона РК № 239-VIII от 08.12.2025"
