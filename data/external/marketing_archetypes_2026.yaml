meta:
  version: '2.0'
  year: 2026
  last_updated: '2026-04-23'
  description: 'Маркетинговая модель ZEREK v2: 16 архетипов, 4 типа каналов, 3 метрики retention, 5 драйверов выбора'
  source: ZEREK Marketing Archetypes v2 methodology review
archetypes:
  A1:
    id: A1
    name_ru: Beauty & Personal Care
    demand_type: planned recurring
    retention_level: High (60-75%)
    formula_type: ramp_up_with_retention
    primary_channel: Instagram визуал + сарафан
    unfair_advantage: Личный бренд мастера
    ltv_horizon: Months-years
    growth_ceiling: scalable_with_team
    customer_type: B2C
    note_ru: Ключ — визуальный контент + ретеншен через качество
  A2:
    id: A2
    name_ru: Impulse Food & Beverage
    demand_type: impulse
    retention_level: Medium (40-60%)
    formula_type: geo_traffic_with_light_retention
    primary_channel: Локация + вывеска + 2GIS
    unfair_advantage: Проходимость + вывеска
    ltv_horizon: Days-months
    growth_ceiling: location_limit
    customer_type: B2C
    note_ru: Кофейни/пекарни — локация решает. Инста для бренда.
  A3:
    id: A3
    name_ru: Food Delivery Kitchen
    demand_type: planned recurring
    retention_level: Medium (50-60%)
    formula_type: delivery_platforms_with_retention
    primary_channel: Wolt/Glovo/Яндекс.Еда
    unfair_advantage: Вкус + скорость доставки
    ltv_horizon: Months-years
    growth_ceiling: scalable_via_platforms
    customer_type: B2C
    note_ru: Клиенты с агрегаторов. Комиссия 15-30% — не бюджет, а вычет.
  A4:
    id: A4
    name_ru: Urgent Health & Eyecare
    demand_type: urgent + planned
    retention_level: Mixed (30-65%)
    formula_type: bimodal_urgent_plus_preventive
    primary_channel: Google + 2GIS + отзывы
    unfair_advantage: Экспертиза + доверие + локация
    ltv_horizon: Years
    growth_ceiling: scalable_with_team
    customer_type: B2C
    note_ru: DENTAL/OPTICS — разовые urgent + регулярная профилактика
  A5:
    id: A5
    name_ru: Recurring Pet Health
    demand_type: recurring trust
    retention_level: Very High (75%+)
    formula_type: trust_retention_core
    primary_channel: Сарафан владельцев + 2GIS
    unfair_advantage: Доверие к конкретному врачу
    ltv_horizon: Years (pet lifetime)
    growth_ceiling: scalable_with_team
    customer_type: B2C
    note_ru: VET — любимца ведут годами. Retention - главный драйвер.
  A6:
    id: A6
    name_ru: Episodic Transactional
    demand_type: urgent transactional
    retention_level: Low (10-20%)
    formula_type: flat_cac_no_retention
    primary_channel: OLX + паблики + сарафан
    unfair_advantage: Цена + доступность сейчас
    ltv_horizon: Days
    growth_ceiling: scalable_via_platforms
    customer_type: B2C
    note_ru: CARGO/CARPETCLEAN — разовые услуги через агрегаторы
  A7:
    id: A7
    name_ru: Local Everyday Services
    demand_type: urgent routine
    retention_level: High (55-70%)
    formula_type: walk_in_plus_locality_retention
    primary_channel: 2GIS + карты + вывеска
    unfair_advantage: Локация + привычка
    ltv_horizon: Years
    growth_ceiling: location_limit
    customer_type: B2C
    note_ru: Аптеки, химчистки, ПВЗ, ателье — локация и привычка
  A8:
    id: A8
    name_ru: Visual Gift Retail
    demand_type: emotion-driven episodic
    retention_level: Low (20-35%)
    formula_type: visual_conversion_with_delivery
    primary_channel: Instagram-витрина + доставка
    unfair_advantage: Визуал + скорость доставки
    ltv_horizon: Months (events)
    growth_ceiling: scalable_via_platforms
    customer_type: B2C
    note_ru: Цветы, торты — покупатель ≠ получатель, событийный спрос
  A9:
    id: A9
    name_ru: Staple Retail
    demand_type: routine + urgent
    retention_level: Medium (40-55%)
    formula_type: geo_traffic_with_loyalty
    primary_channel: 2GIS + локация + лояльность
    unfair_advantage: Локация + свежесть + цены
    ltv_horizon: Years
    growth_ceiling: location_limit
    customer_type: B2C
    note_ru: Продукты, мясо, овощи, корма — повседневные покупки
  A10:
    id: A10
    name_ru: Recurring Delivery Subscription
    demand_type: subscription recurring
    retention_level: Very High (75%+)
    formula_type: acquisition_heavy_upfront_then_retention
    primary_channel: 'Старт: реклама. Потом: retention'
    unfair_advantage: Удобство + регулярность + привычка
    ltv_horizon: Years
    growth_ceiling: scalable_with_team
    customer_type: B2C
    note_ru: WATERPLANT — подписка, высокий LTV, старт дорогой
  A11:
    id: A11
    name_ru: High-Ticket Episodic
    demand_type: considered episodic
    retention_level: Very Low (<15%)
    formula_type: high_cac_single_sale
    primary_channel: Таргет + отзывы + портфолио
    unfair_advantage: Доверие + уникальность
    ltv_horizon: Days-weeks
    growth_ceiling: high_ceiling
    customer_type: B2C/mixed
    note_ru: Мебель, фото, обучение вождению — разовые сделки
  A12:
    id: A12
    name_ru: Subscription Wellness & Education
    demand_type: subscription planned
    retention_level: High (65-75%)
    formula_type: trial_to_retention_funnel
    primary_channel: Пробный урок → retention
    unfair_advantage: Результат + сообщество
    ltv_horizon: Months-years
    growth_ceiling: scalable_with_team
    customer_type: B2C
    note_ru: Фитнес, йога, языки, детские сады — абонементы
  A13:
    id: A13
    name_ru: B2B Project Services
    demand_type: project-based B2B
    retention_level: Medium (30-50%)
    formula_type: networking_plus_expertise
    primary_channel: Нетворкинг + Инста-экспертиза
    unfair_advantage: Репутация + кейсы
    ltv_horizon: Months-years
    growth_ceiling: high_ceiling
    customer_type: B2B
    note_ru: Кейтеринг событий, бухгалтерия — B2B контракты
  A14:
    id: A14
    name_ru: Hospitality & Travel
    demand_type: episodic travel
    retention_level: Low (15-25%)
    formula_type: platform_plus_corporate_contracts
    primary_channel: 2GIS + корп.договоры + OTA
    unfair_advantage: Локация + рейтинг + цена
    ltv_horizon: Days
    growth_ceiling: scalable_via_platforms
    customer_type: B2C/B2B
    note_ru: Отели, риелторы — платформенная зависимость
  A15:
    id: A15
    name_ru: Youth Entertainment Venue
    demand_type: impulse social
    retention_level: Medium (45-60%)
    formula_type: tiktok_plus_geo_plus_events
    primary_channel: TikTok + геотаргет + мероприятия
    unfair_advantage: Атмосфера + сообщество + события
    ltv_horizon: Months
    growth_ceiling: location_limit
    customer_type: B2C
    note_ru: Компьютерные клубы — молодёжная механика
  A16:
    id: A16
    name_ru: Corporate Canteen B2B+B2C
    demand_type: planned routine
    retention_level: High (70%)
    formula_type: corporate_location_plus_retention
    primary_channel: Локация у офисов + B2B-договоры
    unfair_advantage: Близость к офисам + стабильность
    ltv_horizon: Years
    growth_ceiling: location_limit
    customer_type: mixed
    note_ru: Столовые — B2B + офисный трафик
channels:
  ch01:
    id: ch01
    name_ru: Instagram таргет
    type: PAID
    cost_model: CPM/CPC
    typical_cost_ru: 500-2000 ₸/клик, 1-3К ₸/клиент
    relevant_archetypes: A1, A2, A3, A8, A11, A12, A13, A14, A15
    works_in_kz: Да, топ-1
    note_ru: Главный платный канал КЗ. Таргет по городу/интересам.
  ch02:
    id: ch02
    name_ru: TikTok реклама
    type: PAID
    cost_model: CPM/CPC
    typical_cost_ru: 1500-4000 ₸/клиент
    relevant_archetypes: A15, крупные Beauty
    works_in_kz: Редко
    note_ru: Платно мало используют. Только youth-бренды.
  ch03:
    id: ch03
    name_ru: Покупка постов в пабликах
    type: PAID
    cost_model: Fixed per post
    typical_cost_ru: 5-30К за пост
    relevant_archetypes: A2, A6, A8, A11, локальные
    works_in_kz: Да
    note_ru: Городские паблики Инстаграма («Актобе афиша»).
  ch04:
    id: ch04
    name_ru: Блогеры (paid)
    type: PAID
    cost_model: Fixed per post
    typical_cost_ru: 10-50К за пост
    relevant_archetypes: A1, A2, A8, A12, A15
    works_in_kz: Да
    note_ru: Микроблогеры 2-10К подписчиков дают лучший ROI.
  ch05:
    id: ch05
    name_ru: Google Ads
    type: PAID
    cost_model: CPC
    typical_cost_ru: 2-8К ₸/клиент
    relevant_archetypes: A4, A11 (мебель), A12 (образование), A13, A14
    works_in_kz: Да, но меньше Инсты
    note_ru: Для услуг где ищут в поисковике (дантист, курсы).
  ch06:
    id: ch06
    name_ru: Яндекс.Директ
    type: PAID
    cost_model: CPC
    typical_cost_ru: 1.5-6К ₸/клиент
    relevant_archetypes: A4, A13, A14
    works_in_kz: Да
    note_ru: Работает лучше в регионах. Аналог Google Ads.
  ch07:
    id: ch07
    name_ru: 2GIS продвижение
    type: PAID
    cost_model: Subscription
    typical_cost_ru: 30-100К/мес
    relevant_archetypes: A2, A7, A9, A14 (отели)
    works_in_kz: Да, критично
    note_ru: Платное продвижение внутри 2GIS. Для офлайн-точек.
  ch08:
    id: ch08
    name_ru: OLX платные listings
    type: PAID
    cost_model: Fixed per listing
    typical_cost_ru: 500-3К за объявление
    relevant_archetypes: A6, A11 (запчасти, мебель б/у)
    works_in_kz: Да
    note_ru: Главная площадка для transactional и b/u.
  ch09:
    id: ch09
    name_ru: Krisha.kz продвижение
    type: PAID
    cost_model: Fixed per listing
    typical_cost_ru: 1-10К/объявление
    relevant_archetypes: A14 (недвижимость)
    works_in_kz: Да
    note_ru: Специализированная площадка для риелторов.
  ch10:
    id: ch10
    name_ru: Wolt / Glovo / Яндекс.Еда
    type: PLATFORM
    cost_model: Commission
    typical_cost_ru: 15-30% комиссии
    relevant_archetypes: A3, A16
    works_in_kz: Да
    note_ru: Клиенты с агрегаторов. НЕ бюджет, а вычет из маржи.
  ch11:
    id: ch11
    name_ru: Booking.com / OTAs
    type: PLATFORM
    cost_model: Commission
    typical_cost_ru: 15-25% комиссии
    relevant_archetypes: A14 (отели)
    works_in_kz: Слабо в КЗ
    note_ru: Для туризма в Алматы/Астане. В регионах не работает.
  ch12:
    id: ch12
    name_ru: Kaspi Магазин (продвижение)
    type: PLATFORM
    cost_model: Commission + promo
    typical_cost_ru: 3-8% + реклама
    relevant_archetypes: A7, A8, A9, A11 (ритейл)
    works_in_kz: Да
    note_ru: Маркетплейс. Продвижение внутри платформы.
  ch13:
    id: ch13
    name_ru: Satu.kz
    type: PLATFORM
    cost_model: Commission/subscription
    typical_cost_ru: 1-5К ₸/клиент
    relevant_archetypes: A9, A11
    works_in_kz: Ограниченно
    note_ru: Каталог товаров. Менее актуален чем Kaspi.
  ch14:
    id: ch14
    name_ru: 2GIS профиль
    type: INFRASTRUCTURE
    cost_model: Free/basic
    typical_cost_ru: 0 ₸ (базовый)
    relevant_archetypes: ВСЕ офлайн-бизнесы
    works_in_kz: Обязательно
    note_ru: Бесплатный профиль — must have. Фото, отзывы, часы.
  ch15:
    id: ch15
    name_ru: Google Maps / Яндекс.Карты
    type: INFRASTRUCTURE
    cost_model: Free
    typical_cost_ru: 0 ₸
    relevant_archetypes: Все офлайн
    works_in_kz: Да
    note_ru: Обязательное присутствие. Отзывы важны.
  ch16:
    id: ch16
    name_ru: Instagram аккаунт (органический)
    type: INFRASTRUCTURE
    cost_model: Time-investment
    typical_cost_ru: 0 ₸ + 5-10 ч/неделя
    relevant_archetypes: A1, A2, A3, A8, A11, A12, A13
    works_in_kz: Обязательно
    note_ru: Ведение аккаунта — time investment, не деньги.
  ch17:
    id: ch17
    name_ru: Физическая вывеска
    type: INFRASTRUCTURE
    cost_model: One-time CAPEX
    typical_cost_ru: 50-200К разово
    relevant_archetypes: A2, A7, A9, A16
    works_in_kz: Критично для локации
    note_ru: Для food/local hub — 30-40% трафика с улицы.
  ch18:
    id: ch18
    name_ru: Word-of-Mouth (сарафан)
    type: ORGANIC
    cost_model: Free
    typical_cost_ru: 0 ₸
    relevant_archetypes: A1, A4, A5, A7, A12, A13
    works_in_kz: Очень важно
    note_ru: Бесплатно, но включается с 3-4 месяца работы.
  ch19:
    id: ch19
    name_ru: TikTok органика
    type: ORGANIC
    cost_model: Time-investment
    typical_cost_ru: 0 ₸ + 3-5 ч/неделя
    relevant_archetypes: A1, A2, A8, A12, A15
    works_in_kz: Растёт
    note_ru: Рилсы + обучающий контент. Платно редко.
  ch20:
    id: ch20
    name_ru: Referral program
    type: ORGANIC
    cost_model: Bonus per referral
    typical_cost_ru: 5-10% от услуги
    relevant_archetypes: A1, A5, A7, A12
    works_in_kz: Эффективно
    note_ru: Бонусы за приведённых. Технически paid, но низкозатратно.
  ch21:
    id: ch21
    name_ru: Walk-in traffic
    type: ORGANIC
    cost_model: Location-dependent
    typical_cost_ru: 0 ₸ (после вывески)
    relevant_archetypes: A2, A7, A9, A16
    works_in_kz: Критично
    note_ru: Пешеходный трафик. 25-40% клиентов для food/retail.
  ch22:
    id: ch22
    name_ru: Reviews / UGC
    type: ORGANIC
    cost_model: Incentivize
    typical_cost_ru: 0-5К ₸ в бонусах
    relevant_archetypes: A1, A4, A11, A14
    works_in_kz: Растёт
    note_ru: Поощрять отзывы на 2GIS, Google Maps, Инсте.
  ch23:
    id: ch23
    name_ru: ВКонтакте реклама
    type: PAID
    cost_model: CPM/CPC
    typical_cost_ru: n/a
    relevant_archetypes: НЕТ
    works_in_kz: НЕТ
    note_ru: В Казахстане ВК практически не используется.
  ch24:
    id: ch24
    name_ru: Telegram каналы
    type: PAID
    cost_model: Fixed per post
    typical_cost_ru: 5-30К за пост
    relevant_archetypes: Специфические B2B, образование
    works_in_kz: Слабо
    note_ru: В КЗ Telegram слабее чем Инста. Нишевые аудитории.
