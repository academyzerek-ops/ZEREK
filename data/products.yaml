# =============================================================================
# data/products.yaml
# Source of Truth для линейки продуктов и цен ZEREK.
# Все остальные слои (Wiki HTML, CTA, docs/context/02_PRODUCTS.md) — ссылаются.
# =============================================================================

products:
  quick_check:
    name: "Quick Check"
    price_usd: 10
    show_price_in_cta: true
    description: "Экспресс-оценка бизнес-идеи"

  finmodel:
    name: "FinModel"
    price_usd: 20
    show_price_in_cta: true
    description: "Детальная финансовая модель на 12-60 месяцев"

  bizplan_400mrp:
    name: "BizPlan + питч"
    price_usd: 20
    show_price_in_cta: false
    description: "Бизнес-план под государственную грантовую программу 400 МРП с презентацией (питч-дек идёт + бесплатно к любому БП)"
    template_file: "templates/bizplan/grant_400mrp_template.docx"
    notes: "Структура: 10 разделов, 12 таблиц-заполнялок. ~80% полей автозаполняются из QC + FinModel + 3-4 доп. вопроса (ИИН, регион, образование инициатора)."

# Бизнес-планы под другие государственные программы — будут добавляться сюда же
# по мере адаптации шаблонов под каждую программу. Цена может варьироваться.
# В CTA Wiki и Quick Check сумма BP НЕ показывается (разные программы — разные цены).

currency:
  payment: "USD"
  calculations: "KZT"
  note: "Расчёты бизнес-параметров клиента (аренда, ФОТ, чек, выручка) — в тенге, бизнес локальный. Прайс ZEREK — в долларах."

payments:
  status: "in_progress"
  note: "Адиль не может открыть ТОО (расчётный счёт заблокирован). Платежи через сторонний сервис (конкретный сервис в проработке), вывод через крипту."

free:
  - name: "Wiki-обзоры"
    description: "Бесплатно, верх воронки"
  - name: "Academy"
    description: "Бесплатно навсегда, не воронка к QC/FM (см. docs/context/03_ACADEMY.md)"

cta_rules:
  wiki_pair: "В CTA Wiki-обзоров — пара QC $10 + FM $20 (с ценами)"
  bp_no_price_in:
    - "Wiki-обзоры (CTA в конце статьи)"
    - "Quick Check (CTA в отчёте)"
    note: "В этих местах BP без цены — потому что обзор/отчёт универсальные, BP может быть под разные госпрограммы. Не хочется править контент при каждом новом шаблоне."
  bp_show_price_in:
    - "Mini App: карточка продукта в кабинете"
    - "FAQ-ответы в чате"
    note: "Здесь клиент явно выбирает конкретный продукт — должен видеть цену ($20 для BP-Бастау 400 МРП)."
  language: "Везде формулировка «БП + питч», не «пакет»"

meta:
  last_updated: "2026-05-01"
  decided_by: "Адиль"
  source_of_truth: true
  consumers:
    - "wiki/kz/*.html (CTA-блоки)"
    - "products/*.html (Mini App)"
    - "docs/context/02_PRODUCTS.md"
    - "api/calculators/*.py (для метаданных продуктов)"
