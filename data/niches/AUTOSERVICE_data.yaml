- id: ''
  title_ru: Найм первого попавшегося механика из-за срочности
  body_ru: Открытие с некомпетентным мастером обходится дороже простоя. Брак в работе в автосервисе — это не просто переделка,
    это потенциальная авария и уголовная ответственность. Проверка навыков тестовым заданием обязательна.
  probability: medium
  impact: medium
  what_to_do_ru: 'TODO: добавить рекомендацию'
- id: ''
  title_ru: Покупка диагностического оборудования «на вырост» в кредит
  body_ru: Современный мультимарочный сканер стоит дорого. Новичок без клиентской базы купит его, чтобы оборудование простаивало,
    а платежи по кредиту шли. Стартовый минимум — базовый сканер для работы с ходовыми марками, расширение — по мере спроса.
  probability: medium
  impact: medium
  what_to_do_ru: 'TODO: добавить рекомендацию'
- id: ''
  title_ru: Игнорирование учёта запчастей и расходников
  body_ru: Без складского учёта невозможно понять, куда уходит маржа. Механики нередко используют запчасти без фиксации, клиенты
    возвращают снятые детали как «новые» — всё это системные потери, которые видны только при учёте.
  probability: medium
  impact: medium
  what_to_do_ru: 'TODO: добавить рекомендацию'
- id: ''
  title_ru: Открытие без понимания трафика в точке
  body_ru: Автосервис на тихой улице требует активного маркетинга для привлечения каждого клиента. Автосервис на трафиковой
    трассе получает органический поток. Стоимость аренды второго выше, но маркетинговые расходы — ниже. Новички часто выбирают
    дешёвое место и потом тратят деньги на рекламу.
  probability: medium
  impact: medium
  what_to_do_ru: 'TODO: добавить рекомендацию'
- id: ''
  title_ru: Отсутствие приёмо-сдаточных актов
  body_ru: Машина пришла с царапиной — клиент утверждает, что её не было. Без фиксации состояния автомобиля при приёмке каждый
    конфликт — потенциальный убыток и скандал. Фото при приёмке и акт подписи — минимальная защита.
  probability: medium
  impact: medium
  what_to_do_ru: 'TODO: добавить рекомендацию'
- id: ''
  title_ru: 'Попытка делать всё: от ТО до кузовного ремонта'
  body_ru: Слишком широкий спектр при маленьком штате означает постоянные задержки, недовольных клиентов и механиков, работающих
    в условиях хаоса. Лучший старт — узкий профиль с высоким качеством, чем широкий с посредственным.
  probability: medium
  impact: medium
  what_to_do_ru: 'TODO: добавить рекомендацию'
