# =============================================================================
# MANICURE_data.yaml
# Машинные данные ниши "Маникюр" для движка ZEREK Quick Check.
# Источник правды для всех расчётов по этой нише.
# Обновляется через промпт Коту — не редактировать руками без проверки парсера.
#
# Версия: 1.0  | Дата: 2026-04-22  | Автор: Ноа+Адиль
# =============================================================================

niche:
  id: MANICURE
  name_ru: "Маникюр и педикюр"
  name_short: "Маникюр"
  industry: beauty                      # для группировки в UI
  description_short: "Регулярная процедура раз в 2-4 недели. Самая массовая ниша в бьюти РК."
  trend: stable                         # growing | stable | declining
  trend_note_ru: "Стабильный спрос, не падает в кризис более чем на 10-15%. Рост за счёт расширения услуг (педикюр, дизайн)."

# =============================================================================
# СЕЗОННОСТЬ (одна на всю нишу, не зависит от формата)
# =============================================================================
seasonality:
  pattern: [0.80, 0.85, 1.15, 0.75, 1.10, 1.10, 1.00, 1.00, 1.00, 0.95, 0.85, 1.30]
  # янв,  фев,  мар,  апр,  май,  июн,  июл,  авг,  сен,  окт,  ноя,  дек

  best_start_months: [3, 4, 5]          # март-май: разгон попадёт на пик
  worst_start_months: [10, 11, 12]      # октябрь-декабрь: пик уже к концу разгона
  expert_note_ru: |
    Лучше стартовать в марте-мае: к моменту выхода на мощность (4-й месяц)
    попадёте на сезонный пик (май-июнь). Январь-февраль — трудный старт
    из-за низкого спроса. Декабрь сам по себе пиковый, но первые месяцы
    разгона придутся на провальные январь-февраль.

  # Round-3 §3.2: комментарий к пикам/просадкам для блока сезонности
  # в PDF. Шаблон читает seasonality.commentary через seasonality_service.
  commentary:
    peaks:
      - month: "Март"
        reason: "8 марта — пик перед праздником, запись уводят на 2 недели вперёд."
      - month: "Май"
        reason: "Выпускные и начало свадебного сезона."
      - month: "Июнь"
        reason: "Свадебный сезон + отпуска, люди приводят себя в порядок."
      - month: "Декабрь"
        reason: "Новый год, корпоративы — пиковый месяц года."
    troughs:
      - month: "Январь"
        reason: "После праздников — спад покупательной способности."
      - month: "Февраль"
        reason: "Откладывают визит до 8 марта."
      - month: "Апрель"
        reason: "После Наурыза (22 марта) — пауза перед майскими."
      - month: "Ноябрь"
        reason: "Между октябрьскими и новогодними — минимальная активность."

# =============================================================================
# ФОРМАТЫ — каждый со своей экономикой
# =============================================================================
formats:

  # ───────────────────────────────────────────────────────────────────────
  - id: HOME
    label_ru: "Мастер на дому"
    description_short: "Работа из своей квартиры, 1 мастер, без аренды"
    archetype: solo                     # solo | owner_works | with_staff
    legal_form: ip                      # ip | too — определяет ФОТ-логику
    needs_location: false               # не нужна аренда

    avg_check:
      min: 3500                         # синхронизировано с xlsx baseline (Этап 7)
      med: 5000                         # совпадает с wiki: "3 кл/день × 5000 = 300К"
      max: 6500
      currency: KZT

    traffic:
      max_per_day: 6                    # физический максимум 1 мастера
      load_med: 0.50                    # реалистичная загрузка после ramp
      load_min: 0.30
      load_max: 0.75
      working_days_per_month: 26

    capex:
      base_total: 330000                # без обучения (для experience=pro)
      items:
        equipment:
          label_ru: "Оборудование"
          min: 100000
          med: 150000
          max: 250000
          note_ru: "Лампа UV/LED, фрезер, стерилизатор, расходники"
        furniture:
          label_ru: "Мебель и интерьер"
          min: 20000
          med: 30000
          max: 60000
        first_stock:
          label_ru: "Первый запас материалов"
          min: 40000
          med: 60000
          max: 100000
        permits:
          label_ru: "Разрешения и регистрация"
          min: 5000
          med: 10000
          max: 20000
        working_capital:
          label_ru: "Оборотные средства"
          min: 30000
          med: 45000
          max: 60000
        marketing_start:
          label_ru: "Стартовый маркетинг"
          min: 20000
          med: 30000
          max: 50000
        legal:
          label_ru: "Юридическое оформление"
          min: 3000
          med: 5000
          max: 10000

      # Адаптивная статья — добавляется в зависимости от опыта
      training:
        required: true                  # для этой ниши обучение критично
        amounts_by_experience:
          none: 150000                  # новичок без опыта
          some: 40000                   # есть базовое
          pro: 0                        # профессионал

    ramp_up:
      months: 3                         # сколько месяцев выходит на мощность
      start_pct: 0.30                   # с какого % стартует месяц 1
      curve: linear                     # linear | s-curve

    marketing:
      # Маркетинг по фазам разгона (₸/мес)
      phase_1_months: [1, 2, 3]
      phase_1_amount: 30000
      phase_2_months: [4, 5, 6, 7, 8]
      phase_2_amount: 50000
      phase_3_months: [9, 10, 11, 12]
      phase_3_amount: 15000
      # Усреднённое для расчётов (если нужно одно число)
      med_monthly: 45000
      min_monthly: 25000
      max_monthly: 70000

    other_opex:
      med_monthly: 5000                 # телефон, интернет, мелочи
      min_monthly: 3000
      max_monthly: 8000

    fot:
      monthly: 0                        # ИП = нет ФОТ владельца
      headcount: 0
      employer_taxes_pct: 0
      note_ru: "ИП на упрощёнке — собственный труд не оплачивается отдельно, прибыль = доход в карман"

    cogs_pct: 0.12                      # материалы как % от выручки

    tax_regime:
      type: ip_simplified
      rate_pct: 3.0                     # УД ставка (зависит от города, но 3% базовая)

    scenario_coefficients:
      pessimistic_traffic: 0.65
      pessimistic_check: 0.90
      base_traffic: 1.00
      base_check: 1.00
      optimistic_traffic: 1.25
      optimistic_check: 1.10

    risks_format_specific:
      - id: physical_health
      - id: income_ceiling_solo
      - id: home_sanitation

    risks_excluded:                     # риски НЕ применимые к этому формату
      - rent_overpriced
      - hiring_no_probation
      - master_contract
      - staff_management

  # ───────────────────────────────────────────────────────────────────────
  - id: SOLO
    label_ru: "Своя точка, 1 мастер"
    description_short: "Аренда кабинета 8-12 м², 1 мастер (вы)"
    archetype: solo
    legal_form: ip
    needs_location: true
    location_type: rented_cabinet       # rented_cabinet | retail_space | salon_room

    avg_check:
      min: 5500
      med: 7000
      max: 10000

    traffic:
      max_per_day: 7
      load_med: 0.55
      load_min: 0.35
      load_max: 0.80
      working_days_per_month: 26

    capex:
      base_total: 850000
      items:
        equipment:
          label_ru: "Оборудование"
          med: 250000
        furniture:
          label_ru: "Мебель и интерьер"
          med: 150000
        first_stock:
          label_ru: "Первый запас материалов"
          med: 80000
        renovation:
          label_ru: "Ремонт и адаптация"
          med: 100000
        permits:
          label_ru: "Разрешения и регистрация"
          med: 20000
        working_capital:
          label_ru: "Оборотные средства"
          med: 100000
        marketing_start:
          label_ru: "Стартовый маркетинг"
          med: 80000
        deposit:
          label_ru: "Депозит за аренду"
          med: 60000
        legal:
          label_ru: "Юридическое оформление"
          med: 10000

      training:
        required: true
        amounts_by_experience:
          none: 200000
          some: 50000
          pro: 0

    ramp_up:
      months: 4
      start_pct: 0.25
      curve: linear

    marketing:
      phase_1_months: [1, 2, 3]
      phase_1_amount: 60000
      phase_2_months: [4, 5, 6, 7, 8]
      phase_2_amount: 80000
      phase_3_months: [9, 10, 11, 12]
      phase_3_amount: 30000
      med_monthly: 70000

    other_opex:
      med_monthly: 25000                # коммуналка, интернет, расходники

    fot:
      monthly: 0
      headcount: 0

    cogs_pct: 0.13
    tax_regime:
      type: ip_simplified
      rate_pct: 3.0

    rent:
      use_external_data: true           # брать из 11_rent_benchmarks.xlsx
      area_m2: 10
      location_type_for_rent: cabinet_inside_salon

    risks_format_specific:
      - id: rent_dependency
      - id: physical_health
      - id: income_ceiling_solo

    risks_excluded:
      - hiring_no_probation
      - master_contract
      - staff_management

  # ───────────────────────────────────────────────────────────────────────
  - id: STANDARD
    label_ru: "Студия, 3-4 мастера"
    description_short: "Своё помещение 25-40 м², 3-4 мастера, владелец-организатор"
    archetype: with_staff
    legal_form: too
    needs_location: true
    location_type: retail_space

    avg_check:
      min: 6000
      med: 8000
      max: 12000

    traffic:
      max_per_day: 24                   # 6 на мастера × 4 мастера
      load_med: 0.55
      working_days_per_month: 28

    capex:
      base_total: 4500000
      items:
        equipment:
          label_ru: "Оборудование"
          med: 1200000
        furniture:
          label_ru: "Мебель и интерьер"
          med: 800000
        first_stock:
          label_ru: "Первый запас материалов"
          med: 350000
        renovation:
          label_ru: "Ремонт"
          med: 800000
        permits:
          label_ru: "Разрешения"
          med: 50000
        working_capital:
          label_ru: "Оборотные средства"
          med: 600000
        marketing_start:
          label_ru: "Стартовый маркетинг"
          med: 400000
        deposit:
          label_ru: "Депозит за аренду"
          med: 250000
        legal:
          label_ru: "Юридическое оформление"
          med: 50000

      training:
        # R12.5: STUDIO — это соло-мастер в своём кабинете, обучение
