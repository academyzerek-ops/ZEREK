  - name_ru: "Укрепление (гель/акрил)"
    avg_addition: 3000
    take_rate: 0.25
    margin_pct: 0.80

  - name_ru: "Парафинотерапия рук"
    avg_addition: 3000
    take_rate: 0.15
    margin_pct: 0.90
    note_ru: "Зимой спрос ×2"

  - name_ru: "SPA-уход для кутикулы"
    avg_addition: 1500
    take_rate: 0.20
    margin_pct: 0.85

# =============================================================================
# СЦЕНАРИИ РАЗВИТИЯ (блок «А что дальше?»)
# =============================================================================
# Наставнический блок: показывает клиенту горизонт 2-3 года, а не только первый.
# Используется growth_service для рендера блока между entrepreneur_income и
# инфографикой «Ваши первые 12 месяцев».
growth_scenarios:
  stagnation:
    label_ru: "Сценарий А: Стагнация"
    description_ru: |
      Вы работаете как в первый год. Не растёте как мастер,
      не развиваете клиентскую базу.
    outcome_ru: "Через 2-3 года: примерно 340-360 тыс ₸/мес"
    warning_ru: "Инфляция съест даже небольшой рост"

  development:
    label_ru: "Сценарий Б: Развитие"
    description_ru: |
      Растёте как специалист и организатор. Клиенты возвращаются,
      работает сарафан, средний чек растёт через допродажи.
    outcome_year2_ru: "Через 2 года: 450-500 тыс ₸/мес (+40-60%)"
    outcome_year3_ru: "Через 3 года: 600-700 тыс ₸/мес и выше"

  growth_factors:
    - id: quality_growth
      title_ru: "Постоянно повышать квалификацию"
      body_ru: |
        Курсы 2-3 раза в год. Новые техники, новые материалы.
        Мастер который стоит на месте — проигрывает конкурентам
        через 2 года.
      universal: true

    - id: no_economy_on_quality
      title_ru: "Не экономить на качестве"
      body_ru: |
        Дешёвое оборудование и материалы = клиент не вернётся,
        даже если цена низкая. Репутация строится годами,
        разрушается за недели.
      universal: true

    - id: loyalty_program
      title_ru: "Программа лояльности с первого дня"
      body_ru: |
        Маникюр — регулярная услуга. Клиент вернувшийся 3 раза,
        остаётся надолго. Накопительные бонусы окупаются кратно.
      universal: true

    - id: upsells_mastery
      title_ru: "Допродажи — главный рычаг роста"
      body_ru: |
        Дизайн (+2 500 ₸), укрепление (+3 000 ₸), SPA-уход
        (+1 500 ₸). Привлечь нового клиента стоит 1 500-3 000 ₸
        рекламы. Допродать существующей — 0 ₸.
      universal: false
      niche_specific: true

    - id: retention_over_acquisition
      title_ru: "Работать с постоянными, не только новыми"
      body_ru: |
        Удержание клиента в 5-7 раз дешевле привлечения.
        Знайте клиентов по имени, запоминайте их предпочтения,
        аллергии, форму ногтей.
      universal: false
      niche_specific: true

# =============================================================================
# ПЛАН ДЕЙСТВИЙ (адаптивный под experience)
# =============================================================================
action_plan:
  experience_none:
    - week: [1, 2, 3, 4]
      title_ru: "Обучение и практика"
      tasks_ru:
        - "Выбрать школу / курсы по нише"
        - "Пройти базовый курс (для маникюра — гель-лак + укрепление)"
        - "Практика на моделях (бесплатно / со скидкой)"
        - "Собрать первичное портфолио для Instagram"
    - week: [5, 6]
      title_ru: "Юридический старт"
      tasks_ru:
        - "Открыть ИП (Самозанятый / УСН 3%)"
        - "Открыть банковский счёт (Kaspi для приёма платежей)"
    - week: [7, 8]
      title_ru: "Закупка оборудования и материалов"
      tasks_ru:
        - "Закупить оборудование (минимальный набор: лампа UV/LED, фрезер, стерилизатор. Бюджет ≈ 132 тыс ₸. Для профессионального качества может понадобиться больше.)"
        - "Первичные закупки материалов (≈ 49 тыс ₸)"
    - week: [9, 10]
      title_ru: "Подготовка рабочего места"
      tasks_ru:
        - "Обустройство рабочего места"
        - "Страховка инструментов"
    - week: [11, 12]
      title_ru: "Запуск маркетинга ДО открытия"
      tasks_ru:
        - "Таргетированная реклама (Instagram / TikTok)"
        - "Договорённости с блогерами города"
        - "Приём предзаписей"
    - week: [13, 14]
      title_ru: "Первые недели работы"
      tasks_ru:
        - "Отслеживать конверсию заявок в сделки"
        - "Отзывы в Instagram + Google Maps (если есть геолокация) — просить клиентов с 1-го дня"
        - "Еженедельный контроль unit-экономики (выручка/чек/COGS)"

  experience_some:
    # план без блока "Обучение"
    - week: [1, 2]
      title_ru: "Юридический старт"
      tasks_ru:
        - "Открыть ИП (Самозанятый / УСН 3%)"
        - "Открыть банковский счёт"
    - week: [3, 4]
      title_ru: "Дополнительные курсы (опционально)"
      tasks_ru:
        - "Прокачать слабые техники (наращивание / дизайн)"
        - "Обновить портфолио"
    # дальше как у experience_none с week: 5-6 и далее

  experience_pro:
    # план без обучения
    - week: [1, 2]
      title_ru: "Юридический старт"
      tasks_ru:
        - "Открыть ИП (Самозанятый / УСН 3%)"
        - "Открыть банковский счёт"
    - week: [3, 4]
      title_ru: "Закупка оборудования и материалов"
      tasks_ru:
        - "Закупить оборудование (минимальный набор)"
        - "Первичные закупки материалов"
    # дальше как у experience_none с week: 9-10 и далее

# =============================================================================
# СПЕЦИФИЧНЫЕ ОСОБЕННОСТИ ДЛЯ ОТЧЁТА
# =============================================================================
report_overrides:

  # Для HOME форматов конкуренты не из 2GIS, а из Instagram
  market_block_for_home:
    type: home_market_note
    message_ru: |
      Для мастера на дому конкуренция формируется в Instagram и TikTok.
      2GIS и агрегаторы не отражают реального рынка домашних мастеров.
      Ищите конкурентов через хэштеги Instagram по вашему городу и району.

  # Сравнение с avg_salary только для SOLO/HOME
  show_avg_salary_comparison: true
  applies_to_formats: [HOME, SOLO]

