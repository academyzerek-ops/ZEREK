action_plan:
  experience_none:
    - week: [1, 2, 3, 4]
      title_ru: "Обучение и практика"
      tasks_ru:
        - "Выбрать школу / курсы по нише"
        - "Пройти базовый курс (для маникюра — гель-лак + укрепление)"
        - "Практика на моделях (бесплатно / со скидкой)"
        - "Собрать первичное портфолио для Instagram"
    - week: [5, 6]
      title_ru: "Юридический старт"
      tasks_ru:
        - "Открыть ИП (Самозанятый / УСН 3%)"
        - "Открыть банковский счёт (Kaspi для приёма платежей)"
    - week: [7, 8]
      title_ru: "Закупка оборудования и материалов"
      tasks_ru:
        - "Закупить оборудование (минимальный набор: лампа UV/LED, фрезер, стерилизатор. Бюджет ≈ 132 тыс ₸. Для профессионального качества может понадобиться больше.)"
        - "Первичные закупки материалов (≈ 49 тыс ₸)"
    - week: [9, 10]
      title_ru: "Подготовка рабочего места"
      tasks_ru:
        - "Обустройство рабочего места"
        - "Страховка инструментов"
    - week: [11, 12]
      title_ru: "Запуск маркетинга ДО открытия"
      tasks_ru:
        - "Таргетированная реклама (Instagram / TikTok)"
        - "Договорённости с блогерами города"
        - "Приём предзаписей"
    - week: [13, 14]
      title_ru: "Первые недели работы"
      tasks_ru:
        - "Отслеживать конверсию заявок в сделки"
        - "Отзывы в Instagram + Google Maps (если есть геолокация) — просить клиентов с 1-го дня"
