    avg_addition: 1500
    take_rate: 0.20
    margin_pct: 0.85

# =============================================================================
# СЦЕНАРИИ РАЗВИТИЯ (блок «А что дальше?»)
# =============================================================================
# Наставнический блок: показывает клиенту горизонт 2-3 года, а не только первый.
# Используется growth_service для рендера блока между entrepreneur_income и
# инфографикой «Ваши первые 12 месяцев».
growth_scenarios:
  stagnation:
    label_ru: "Сценарий А: Стагнация"
    description_ru: |
      Вы работаете как в первый год. Не растёте как мастер,
      не развиваете клиентскую базу, средний чек не индексируете
      на инфляцию.
    # R7 F.4: две цифры — номинал и реальная покупательная способность,
    # с честным объяснением что инфляция полностью съедает рост.
    outcome_ru: "В номинале через 2-3 года: 380-420 тыс ₸/мес. В реальной покупательной способности — те же ~315 тыс ₸/мес: инфляция полностью съедает номинальный рост."
    warning_ru: "Стагнация мастера, а не бизнеса в строгом смысле — ваше время становится дороже относительно того, что вы из него получаете."

  development:
    label_ru: "Сценарий Б: Развитие"
    description_ru: |
      Растёте как специалист и организатор. Клиенты возвращаются,
      работает сарафан, средний чек растёт через допродажи.
    outcome_year2_ru: "Через 2 года: 450-500 тыс ₸/мес (+40-60%)"
    outcome_year3_ru: "Через 3 года: 600-700 тыс ₸/мес и выше"
    # R12 Сессия 1: формат-зависимое описание «Рост». Если формат
    # есть в этой мапе — он перебивает description_ru. Тексты —
    # дословно из R12 ТЗ. STUDIO/SALON_RENT/MALL_SOLO готовы под
    # будущие сессии R12.
    description_by_format:
      HOME: |
        Переход в формат STUDIO (свой кабинет) или SALON_RENT (аренда
        места в чужом салоне). Физический потолок выручки увеличивается
        на 30-50%, появляется уровень профессионализма выше домашнего.
      STUDIO: |
        Переход в формат BEAUTY-салон с наймом 1-2 мастеров.
        Принципиально другая экономика — вы становитесь организатором,
        не мастером. Требует CAPEX от 2 млн ₸ и опыта управления людьми.
      SALON_RENT: |
        Переход в формат STUDIO (свой кабинет) или открытие собственного
        салона. Первый дешевле и логичнее как следующий шаг.
      MALL_SOLO: |
        Расширение до многоместной точки в ТЦ — арендуете 3-5 столов,
        нанимаете мастеров под процент. Принципиально другая экономика.
        Первый шаг — вторая стойка через 8-12 месяцев работы первой.

  growth_factors:
    - id: quality_growth
      title_ru: "Постоянно повышать квалификацию"
      body_ru: |
        Курсы 2-3 раза в год. Новые техники, новые материалы.
        Мастер который стоит на месте — проигрывает конкурентам
        через 2 года.
      universal: true

    - id: no_economy_on_quality
      title_ru: "Не экономить на качестве"
      body_ru: |
        Дешёвое оборудование и материалы = клиент не вернётся,
        даже если цена низкая. Репутация строится годами,
        разрушается за недели.
      universal: true

    - id: loyalty_program
      title_ru: "Программа лояльности с первого дня"
      body_ru: |
        Маникюр — регулярная услуга. Клиент вернувшийся 3 раза,
        остаётся надолго. Накопительные бонусы окупаются кратно.
      universal: true

    - id: upsells_mastery
      title_ru: "Допродажи — главный рычаг роста"
      body_ru: |
        Дизайн (+2 500 ₸), укрепление (+3 000 ₸), SPA-уход
        (+1 500 ₸). Привлечь нового клиента стоит 1 500-3 000 ₸
        рекламы. Допродать существующей — 0 ₸.
      universal: false
      niche_specific: true

    - id: retention_over_acquisition
      title_ru: "Работать с постоянными, не только новыми"
      body_ru: |
        Удержание клиента в 5-7 раз дешевле привлечения.
        Знайте клиентов по имени, запоминайте их предпочтения,
        аллергии, форму ногтей.
      universal: false
      niche_specific: true

# =============================================================================
# ПЛАН ДЕЙСТВИЙ (адаптивный под experience)
