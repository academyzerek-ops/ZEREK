# =============================================================================
# R12.5: ИНФОРМАЦИОННЫЕ БЛОКИ ПО ФОРМАТАМ
# =============================================================================
# Тексты дословно из R12.5 ТЗ. Появляются на соответствующих стр. PDF
# при выбранном формате.
info_blocks_r12:

  # Блок про материалы — для всех форматов кроме HOME (где cogs 12% жёстко).
  materials:
    page: 7  # «Расходы»
    show_for_formats: ["STUDIO", "SALON_RENT", "MALL_SOLO"]
    title_ru: "Про материалы"
    body_ru: |
      Расчёт исходит из материалов среднего уровня — стандартный
      гель-лак, расходники базового бренда, общая стоимость ~10% от
      выручки.

      Если вы работаете на премиум-материалах (KODI, Vogue, NeoNail) —
      закладывайте 12-14% от выручки. Премиум-материалы могут дать
      +5-10% к чеку при условии что вы можете их продемонстрировать
      клиенту (показать упаковку, рассказать про бренд).

      Если на эконом-сегменте (несетевые китайские бренды) — может
      быть 7-8%, но это влияет на качество, срок носки и количество
      жалоб. На длинном сроке экономия на материалах часто оборачивается
      потерей клиентов.

      В среднем чеке учтён уровень доверия к материалам стандартного
      качества. Quick Check считает середину спектра — это безопасный
      сценарий для большинства мастеров.

  # Блок про две модели аренды — только SALON_RENT.
  salon_rent_models:
    page: 7  # «Расходы»
    show_for_formats: ["SALON_RENT"]
    title_ru: "Две модели аренды в салоне"
    body_ru: |
      ФИКС-АРЕНДА (расчёт основан на ней)
      30 000 - 60 000 ₸/мес. Стабильна, удобна для планирования.
      В выходящие за норму месяцы (просадка апреля, болезнь) —
      платите всё равно.

      ПРОЦЕНТ С ВЫРУЧКИ
      30-40% от того что заработали. Гибкость в просадках, но в
      зрелом месяце салон забирает значительно больше — для нашей
      выручки 1 050К × 35% = 367К/мес против 35К фикс-аренды.

      В Казахстане преобладает фикс-аренда в стандартном сегменте.
      Процент чаще в премиум-салонах с сильным брендом.

      Уточняйте конкретные условия в выбранном вами салоне ДО
      подписания.

  # Блок про сценарий стойки — только MALL_SOLO.
  mall_solo_scenarios:
    page: 13  # «Маркетинг»
    show_for_formats: ["MALL_SOLO"]
    title_ru: "Сценарий вашей стойки в ТЦ"
    body_ru: |
      В ТЦ маникюр работает в двух сценариях, и от того в каком вы
      окажетесь зависит экономика. Уточните в администрации ТЦ ДО
      подписания договора.

      ОДИНОЧНАЯ СТОЙКА. Вы единственный маникюр в этом ТЦ.
      + Можете держать средний чек 4 500-5 000 ₸ без давления
        соседей
      + Вся импульсная клиентура ТЦ ваша
      − Если место плохо просматривается — рискуете простоять день
        впустую
      − «Зоны притяжения» нет, клиенты идут только к вам по сарафану
      − Аренда обычно немного выше: ТЦ знает что вы единственный

      СТОЙКА В КЛАСТЕРЕ. Рядом ещё 4-6 мастеров маникюра.
      + Кластер привлекает клиентов как «зона маникюра в ТЦ» —
        трафик выше
      + Простой маловероятен — кто-то всё равно зайдёт
      + Аренда обычно ниже за счёт массовости
      − Демпинг возможен — соседи снизят цену, придётся следовать
      − Ваш средний чек тяготеет к самому низкому в кластере
        (3 800-4 200)
      − Удержание клиента слабое — он легко уходит к соседу
        следующий раз

      В Казахстане встречаются оба варианта. В малых городах кластеры
      встречаются чаще — это новая модель которую активно осваивают
      ТЦ-операторы.

      Расчёт основан на средней экономике между сценариями: чек
      4 200 ₸. Если знаете заранее в какой сценарий идёте —
      скорректируйте ожидания.

# =============================================================================
# РИСКИ (общая база, привязка к форматам — выше)
# =============================================================================
risks:

  # ─── HOME-специфичные ───
  - id: physical_health
    title_ru: "Зависимость от физсостояния"
    body_ru: "Болезнь, беременность, травма рук = ноль дохода. Один человек — единая точка отказа."
    probability: medium
    impact: high
    what_to_do_ru: "Подушка безопасности на 3 мес. Страхование от нетрудоспособности."

  - id: income_ceiling_solo
    title_ru: "Потолок дохода одного мастера"
    body_ru: "Максимум 5-7 клиенток в день физически. Чтобы расти дальше — поднимайте средний чек (дизайн, укрепление, уход) или планируйте переезд в свою студию через 1-2 года."
    probability: high
    impact: medium
    what_to_do_ru: "Апсейл: дизайн, укрепление, парафин. План перехода в SOLO/STANDARD через 1-2 года."

  - id: home_sanitation
    title_ru: "Санитарные нормы без контроля"
    body_ru: "Дома проще забить на стерилизацию. Один случай грибка/инфекции — репутация уничтожена."
    probability: medium
    impact: high
    what_to_do_ru: "Автоклав или сухожар. Одноразовые инструменты где можно. Фото стерилизации в сторис."

  # ─── STANDARD/PREMIUM-специфичные ───
  - id: rent_overpriced
    title_ru: "Аренда дорогого помещения в надежде на поток"
    body_ru: "Маникюрный сервис не работает на случайном потоке — клиенты записываются. Переплата за проходное место не конвертируется в выручку."
    probability: medium
    impact: medium
    what_to_do_ru: "Считайте долю аренды от прогнозной выручки. Не выше 15% — норма, выше 20% — зона убытка."

  - id: hiring_no_probation
    title_ru: "Найм мастеров без испытательного срока"
    body_ru: "Плохая техника или конфликтное поведение мастера разрушают репутацию быстрее, чем любая реклама."
    probability: medium
    impact: medium
    what_to_do_ru: "Испытательный срок 1-2 недели с тестовыми клиентами. Проверка отзывов и портфолио до найма."

  - id: master_contract
    title_ru: "Игнорирование договора с мастерами"
    body_ru: "Без чётких условий работы (процент, клиентская база, запрет переманивания) уходящий мастер забирает клиентов и открывает точку рядом."
    probability: medium
    impact: medium
    what_to_do_ru: "Письменный договор: процент, доступ к базе, NDA, штраф за переманивание. Юрист на старте — обязателен."

  - id: master_takes_clients
    title_ru: "Уход ключевого мастера с клиентской базой"
    body_ru: "Один мастер, занимающий больше 40% записи — критическая зависимость. Диверсификация мастеров обязательна."
    probability: medium
    impact: high
    what_to_do_ru: "Не давайте одному мастеру более 35% записи. Программа лояльности на бренд салона, не на мастера."

  - id: staff_management
    title_ru: "Работа без учёта занятости мастеров"
    body_ru: "Перегрузка ведёт к выгоранию и снижению качества; недозагрузка — к уходу мастера к конкурентам с большим потоком."
    probability: medium
    impact: medium
    what_to_do_ru: "Учёт занятости по каждому мастеру. Балансировать поток через систему записи."

  - id: premium_market_thin
    title_ru: "Тонкий премиум-сегмент"
    body_ru: "Реальный платёжеспособный premium в РК узкий. Чек 15-25К найдут только в Алматы/Астане в правильных районах."
    probability: high
    impact: high
    what_to_do_ru: "Перед открытием — реальные интервью с потенциальной аудиторией. Тестируйте через pop-up или партнёрство."

  # ─── Общие риски (применимы ко всем форматам) ───
  - id: low_loyalty_program
    title_ru: "Отсутствие программы лояльности с первого дня"
    body_ru: "Маникюр — регулярная процедура (раз в 2-4 недели). Клиент, вернувшийся трижды, остаётся надолго. Без стимула возвращения теряются до 40% разовых посетителей."
    probability: medium
    impact: medium
    # R7 F.3: расшифровка «Что делать» в едином формате — конкретные
    # инструменты, не общие фразы.
    what_to_do_ru: "С первого клиента — карточка постоянного клиента (Notion или Excel). После 5-го визита — бонус. День рождения — скидка 10-15%. Без этого ретеншен на маленькой базе невозможен."
    formats_applied: [HOME, SOLO, STANDARD, PREMIUM]

  - id: stock_no_norms
    title_ru: "Закупка расходников «на глаз»"
    body_ru: "Избыток дорогих материалов замораживает деньги; нехватка в разгар записи — потеря клиентов. Нужны нормы расхода на процедуру."
    probability: medium
    impact: medium
    # R7 F.3: «Что делать» — конкретный инструмент и периодичность.
    what_to_do_ru: "Excel или Google Sheets со списком расходников. Закупка 1 раз в 2 недели по списку. Запас на 3 рабочих дня минимум, чтобы не срывать запись из-за отсутствия материала."
    formats_applied: [HOME, SOLO, STANDARD, PREMIUM]

