# =============================================================================
# R12.5: ФОРМАТЫ v2 — 4 формата с уровнями + интеграция с архетипом A1
# =============================================================================
# Источник: ТЗ Адиль R12.5 (2026-04-26).
# Архитектурный принцип: формат + опыт + стратегия + (для STUDIO/SALON_RENT)
# уровень. Опыт и стратегия — из data/archetypes/a1_beauty_solo.yaml.
# Здесь — только нишевые параметры маникюра (базовые чеки, маркетинговые
# фазы, аренда, working_days).
#
# Старый блок `formats:` выше остаётся работать — его использует движок
# Сессия 1. В Сессии 2 движок переключится на formats_r12, старый
# блок переименуется в formats_legacy.
# =============================================================================
formats_r12:

  # ───────────────────────────────────────────────────────────────────────
  - id: HOME
    label_ru: "Мастер на дому"
    description_short: "Соло-мастер работает у себя дома, без аренды"
    location_type: home
    needs_location: false
    available_for_levels: false  # один уровень — без выбора в анкете
    available_experience: ["none"]  # фильтр по опыту: только новичок

    base_check:
      astana: 5250  # base × city_check_multiplier применяется в движке

    working_days_per_month: 26
    rent_per_month: 0
    utilities_per_month: 0
    deposit_months: 0  # без депозита

    # CAPEX-разбивка (без обучения и без депозита).
    # Обучение добавляется через experience_levels.training_capex.
    capex_items:
      equipment:        { label_ru: "Оборудование",            med: 150000 }
      furniture:        { label_ru: "Мебель и интерьер",       med: 30000 }
      first_stock:      { label_ru: "Первый запас материалов", med: 60000 }
      permits:          { label_ru: "Разрешения и регистрация", med: 10000 }
      working_capital:  { label_ru: "Оборотные средства",      med: 45000 }
      marketing_start:  { label_ru: "Открытие и брендинг",     med: 30000 }
      legal:            { label_ru: "Юридическое оформление",  med: 5000 }
    capex_base_total: 330000  # сумма items без обучения и без депозита

    # Маркетинг: базовые суммы по фазам (для «средней» стратегии).
    # Для других стратегий движок применяет budget_multiplier из архетипа A1.
    marketing_phases:
      ramp_m1_m3_base:   152000  # пик М2 = ramp_m1_m3_base × 1.15
      tuning_m4_m6_base: 54000
      mature_m7_m12_base: 16000

    other_opex_per_month: 5000
    cogs_pct: 0.12

  # ───────────────────────────────────────────────────────────────────────
  - id: STUDIO
    label_ru: "Свой кабинет"
    description_short: "Соло-мастер арендует отдельный кабинет 8-15 м²"
    location_type: rent_cabinet
    needs_location: true
    available_for_levels: true
    available_experience: ["middle", "experienced"]

    levels:
      simple:
        label_ru: "Простой кабинет"
        description_short: "Базовое оборудование, минимальный ремонт"
        base_check_astana: 7000
        capex_furniture_extra: 0   # база
        capex_renovation_extra: 0
        capex_marketing_start_extra: 0

      nice:
        label_ru: "Приличный кабинет"
        description_short: "Дизайн, качественная мебель, ремонт под бьюти"
        base_check_astana: 7700  # +10% к простому (учтено base_check)
        capex_furniture_extra: 100000   # +100K к простому
        capex_renovation_extra: 130000  # +130K к простому
        capex_marketing_start_extra: 30000  # +30K (профиль на уровне)

    working_days_per_month: 22
    rent_per_month_astana: 70000
    utilities_per_month: 15000
    deposit_months: 2  # 2 месяца аренды как депозит

    # База CAPEX (для simple). Для nice добавляются capex_*_extra сверху.
    capex_items:
      equipment:        { label_ru: "Оборудование",            med: 150000 }
      furniture:        { label_ru: "Мебель и интерьер",       med: 80000 }
      renovation:       { label_ru: "Ремонт под бьюти-стандарт", med: 100000 }
      first_stock:      { label_ru: "Первый запас материалов", med: 60000 }
      permits:          { label_ru: "Разрешения и регистрация", med: 10000 }
      working_capital:  { label_ru: "Оборотные средства",      med: 60000 }
      marketing_start:  { label_ru: "Открытие и брендинг",     med: 50000 }
      legal:            { label_ru: "Договор аренды",          med: 10000 }
    capex_base_total: 520000  # для simple. nice = base + 230K extra

    marketing_phases:
      ramp_m1_m3_base:   130000
      tuning_m4_m6_base: 50000
      mature_m7_m12_base: 18000

    other_opex_per_month: 8000
    cogs_pct: 0.10  # средние материалы (см. info_block про материалы)

  # ───────────────────────────────────────────────────────────────────────
  - id: SALON_RENT
    label_ru: "Аренда места в салоне"
    description_short: "Соло-мастер арендует кресло/место в чужом салоне"
    location_type: rent_in_salon
    needs_location: true
    available_for_levels: true
    available_experience: ["middle", "experienced"]

    levels:
      standard:
        label_ru: "Стандарт-салон"
        description_short: "Маникюрный салон среднего сегмента"
        base_check_astana: 7500
        rent_per_month_astana: 35000
        deposit_months: 2
        capex_equipment: 150000
        capex_marketing_start: 20000
        available_experience: ["middle", "experienced"]

      premium:
        label_ru: "Премиум-салон"
        description_short: "Известный бренд, сильный трафик"
        base_check_astana: 9500
        rent_per_month_astana: 60000
        deposit_months: 2
        capex_equipment: 80000  # часть оборудования салона
        capex_marketing_start: 40000  # профиль премиум-уровня
        available_experience: ["experienced"]  # только опытному

    working_days_per_month: 24
    utilities_per_month: 0  # входит в аренду

    # Общие CAPEX-итемы (одинаковые для standard/premium, кроме equipment+marketing_start)
    capex_items_common:
      first_stock:      { label_ru: "Первый запас материалов", med: 60000 }
      permits:          { label_ru: "Разрешения и регистрация", med: 10000 }
      working_capital:  { label_ru: "Оборотные средства",      med: 50000 }
      legal:            { label_ru: "Юридическое оформление",  med: 10000 }
    capex_base_total_standard: 300000  # standard без обучения и без депозита
    capex_base_total_premium: 265000   # premium ниже за счёт equipment

    # Альтернативная модель оплаты — процент с выручки. Информационно,
    # не используется в базовом расчёте (см. info_blocks).
    rent_alternative_models:
      percent_of_revenue:
