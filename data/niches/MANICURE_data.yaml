        first_stock:
          label_ru: "Первый запас материалов"
          med: 350000
        renovation:
          label_ru: "Ремонт"
          med: 800000
        permits:
          label_ru: "Разрешения"
          med: 50000
        working_capital:
          label_ru: "Оборотные средства"
          med: 600000
        marketing_start:
          label_ru: "Стартовый маркетинг"
          med: 400000
        deposit:
