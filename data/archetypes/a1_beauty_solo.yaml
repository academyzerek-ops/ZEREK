# =============================================================================
# Архетип A1 · Beauty-соло (соло-мастер)
# =============================================================================
# Универсальные параметры для всех соло-мастеровых ниш beauty:
# MANICURE, BARBER, BROW, LASH, SUGARING, MASSAGE, COSMETOLOGY.
#
# Для конкретной ниши (маникюра, бровиста и т.д.) — нишевые параметры
# (базовые чеки, длительность услуги, сезонность, риски) лежат в её
# собственном data/niches/{NICHE}_data.yaml.
#
# Версия: R12.5 v1.0  | Дата: 2026-04-27  | Источник: ТЗ Адиль R12.5
# =============================================================================

archetype:
  id: A1
  name: "Beauty-соло"
  description_short: "Соло-мастер бьюти-ниш — ограничитель = время мастера"
  format_options: ["HOME", "STUDIO", "SALON_RENT", "MALL_SOLO"]

# =============================================================================
# УРОВНИ ОПЫТА (3 варианта)
# =============================================================================
# Универсальная характеристика мастеровых ниш. Меняется со временем
# через практику — обычно 8-14 месяцев активной работы достаточно для
# перехода none → middle, и ещё ~2 года для middle → experienced.
#
# Параметры используются движком при расчёте:
#   real_check         = base_check_by_format × check_multiplier × city_coef
#   avg_clients_mature = avg_clients_per_day_mature
#   capex_training     = training_capex
#   capex_working      = base_working_capital × working_capital_multiplier
#
# available_formats определяет какие форматы доступны на этом уровне опыта.
# В анкете Mini App / wizard форматы фильтруются по выбранному уровню.

experience_levels:

  none:
    label: "Учусь / только начинаю"
    description_short: "Без опыта, открываю с нуля"
    minutes_per_client: 90
    peak_clients_per_day: 4
    avg_clients_per_day_mature: 3.0
    check_multiplier: 0.85
    training_capex: 150000
    working_capital_multiplier: 1.00
    available_formats: ["HOME"]
    risk_note: "Риск выше среднего — первый год это период обучения"

  middle:
    label: "Делаю гель-лак уверенно"
    description_short: "Базовые техники освоены, есть первичная база"
    minutes_per_client: 70
    peak_clients_per_day: 5
    avg_clients_per_day_mature: 4.5
    check_multiplier: 1.00
    training_capex: 40000
    working_capital_multiplier: 0.90
    available_formats: ["STUDIO", "SALON_RENT_STANDARD", "MALL_SOLO"]
    risk_note: "Базовый уровень — стандартная оценка"

  experienced:
    label: "Делаю сложные техники, есть постоянная база клиентов"
    description_short: "Опытный мастер с устойчивой клиентской базой"
    minutes_per_client: 50
    peak_clients_per_day: 7
    avg_clients_per_day_mature: 5.5
    check_multiplier: 1.20
    training_capex: 20000
    working_capital_multiplier: 0.80
    available_formats: ["STUDIO", "SALON_RENT_STANDARD", "SALON_RENT_PREMIUM"]
    risk_note: "Риск ниже — есть подушка опыта и клиенты"

# =============================================================================
# СТРАТЕГИИ МАРКЕТИНГА (3 варианта)
# =============================================================================
# Универсальный множитель к разгонному маркетинговому бюджету ниши.
# Базовый разгонный бюджет (на «средней» стратегии) хранится в YAML
# конкретной ниши: marketing_ramp_base, marketing_tuning_base,
# marketing_mature_base.
#
# Применение:
#   real_marketing_ramp_m1_m3 = marketing_ramp_base × budget_multiplier
#   real_ramp_curve           = ramp_curve (12 месяцев)
#
# КРИТИЧНО: стратегия влияет НЕ только на бюджет, но и на скорость
# выхода на потолок (ramp_curve). Консерватор выходит к М11, средний к
# М4, агрессивный к М3.

marketing_strategies:

  conservative:
    label: "Консервативная"
    description_short: "Расту медленно, минимум вложений"
    description_long: |
      Минимум таргета, ставка на сарафан и органический Instagram.
      Полный выход на потолок к М10-М12 вместо М4. Подходит если у вас
      есть параллельный доход или если страшно тратить много на старте.
    budget_multiplier: 0.20
    ramp_speed: "slow"
    full_capacity_month: 11
    ramp_curve:
      - 0.20  # M1
      - 0.30  # M2
      - 0.40  # M3
      - 0.50  # M4
      - 0.60  # M5
      - 0.70  # M6
      - 0.80  # M7
      - 0.85  # M8
      - 0.90  # M9
      - 0.95  # M10
      - 1.00  # M11
      - 1.00  # M12

  middle:
    label: "Средняя"
    description_short: "Умеренные вложения, разумный темп"
    description_long: |
      Стандартный путь — выход на потолок к М4. Базовый разгонный
      бюджет ниши без масштабирования. Подходит большинству мастеров.
    budget_multiplier: 1.00
    ramp_speed: "normal"
    full_capacity_month: 4
    ramp_curve:
      - 0.40  # M1
      - 0.65  # M2
      - 0.85  # M3
      - 1.00  # M4
      - 1.00  # M5
      - 1.00  # M6
      - 1.00  # M7
      - 1.00  # M8
      - 1.00  # M9
      - 1.00  # M10
      - 1.00  # M11
      - 1.00  # M12

  aggressive:
    label: "Агрессивная"
    description_short: "Активный рост, готов к большим тратам"
    description_long: |
      Активный таргет + блогеры + промо. Быстрый выход на потолок к
      М3-М4. Подходит если у вас есть подушка и желание занять рынок
      раньше. Не подходит новичкам — антипаттерн (см. ниже).
    budget_multiplier: 1.40
    ramp_speed: "fast"
    full_capacity_month: 3
    ramp_curve:
      - 0.55  # M1
      - 0.80  # M2
      - 0.95  # M3
      - 1.00  # M4
      - 1.00  # M5
      - 1.00  # M6
      - 1.00  # M7
      - 1.00  # M8
      - 1.00  # M9
      - 1.00  # M10
      - 1.00  # M11
      - 1.00  # M12

# =============================================================================
# АНТИПАТТЕРНЫ (предупреждающие блоки в PDF)
# =============================================================================
# Появляются на стр. 3 «Итог» как отдельный блок предупреждения когда
# комбинация анкеты создаёт известный неэффективный паттерн.

antipatterns:

  novice_aggressive:
    trigger:
      experience: "none"
      strategy: "aggressive"
    severity: "high"
    block_title: "Предупреждение — антипаттерн"
    block_text: |
      Вы выбрали агрессивную маркетинговую стратегию, но указали что
      вы только начинаете. Quick Check рассчитал сценарий по вашим
      параметрам, но обязан предупредить:

      При вашем уровне (3-4 клиента в день в зрелом месяце) агрессивная
      реклама создаёт больше заявок чем вы можете принять. Часть лидов
      получит ответ «свободного времени нет» и больше не вернётся.

      Это значит:
      • Часть рекламного бюджета уйдёт впустую
      • Конверсия из заявки в визит будет ниже 30% (норма 40-60%)
      • Репутация «у мастера всегда занято» формируется быстрее, чем
        растут навыки

      Рекомендуем рассмотреть среднюю стратегию. Она соответствует
      темпу вашего роста как мастера. Агрессивная стратегия становится
      оправданной с уровня «делаю гель-лак уверенно» — обычно через
      8-12 месяцев активной практики.

# =============================================================================
# ОБЪЯСНИТЕЛЬНЫЕ БЛОКИ ДЛЯ НОВИЧКА
# =============================================================================
# Появляются только для уровня experience_levels.none. Закрывают
# типичный когнитивный диссонанс «у моей подруги 500K, почему у меня
# по расчёту 170K».

explanation_blocks:

  novice_lower_than_friends:
    trigger:
      experience: "none"
    page: 3  # стр. «Итог», после блока «Характер направления»
    block_title: "Почему ваша первая прибыль ниже чем у знакомых мастеров"
    block_text: |
      Если у вашей знакомой маникюр приносит 500-700K в месяц — это
      обычно потому что она работает 2-3 года, делает за 50 минут и
      средний чек на 20% выше вашего. У неё другой профиль, не как
      у новичка. Конкретные причины разрыва на старте:

      ВРЕМЯ НА КЛИЕНТА. Без опыта — 90 минут. С опытом — 50 минут.
      Это значит что за рабочий день опытный успевает 7 клиентов,
      а вы 4. Со временем (за 6-12 месяцев активной практики)
      разница сокращается.

      ЧЕК. Опытному платят на 20% больше за тот же объём услуг —
      это премия за уверенность, скорость и доверие. Вы дойдёте
      до этого уровня, но не сразу.

      ПОРТФОЛИО. У знакомой 2-3 года работ в Insta, отзывы,
      постоянные клиенты. У вас на старте — пустой профиль.
      Маркетинг новичка работает в 2-3 раза слабее: люди не доверяют
      без примеров.

      ОШИБКИ И ПЕРЕДЕЛКИ. На первом полугодии часть работы будет
      переделываться бесплатно. Это нормально, это часть обучения.
      Но это съедает время которое могло идти на новых клиентов.

      Большинство мастеров проходят этот этап за 8-14 месяцев и
      выходят на нормальный уровень. Это не приговор, это путь.
      Quick Check показывает реальную картину старта, а не идеальный
      сценарий через 2 года.

# =============================================================================
# КОММЕНТАРИИ К ВЫБРАННОЙ СТРАТЕГИИ (показываются на стр. «Маркетинг»)
# =============================================================================

strategy_explanations:

  conservative: |
    Что это значит на практике: значительно меньше таргета, ставка
    на сарафан и органический Instagram. Полный выход на потолок к
    М10-М12 вместо М4. Подходит если у вас есть параллельный доход
    или если страшно тратить много на старте.

  middle: |
    Что это значит на практике: стандартный путь — выход на потолок
    к М4. Базовый разгонный бюджет полностью. Подходит большинству
    мастеров.

  aggressive: |
    Что это значит на практике: активный таргет + блогеры + промо.
    Быстрый выход на потолок к М3-М4. Подходит если у вас есть
    подушка и желание занять рынок раньше.

  warning_universal: |
    Важно: стратегия должна соответствовать вашему уровню как
    мастера. Агрессивная реклама при низкой производительности —
    антипаттерн (см. предупреждение на стр. 3).
