# ZEREK — жёсткие константы КЗ 2026
# Этот файл — единый источник истины для числовых параметров,
# которые не должны зависеть от ниши, формата или города.
# Версия: 1.0

# ------------------------------------------------------------------
# Налоговые константы 2026
# ------------------------------------------------------------------
mrp_2026: 4325                 # месячный расчётный показатель
mzp_2026: 85000                # минимальная заработная плата
nds_rate: 0.16                 # ставка НДС

taxes:
  default_tax_rate_pct: 3      # дефолтная ставка УСН в городах без явного решения
  fallback_tax_rate_pct: 4     # применяется когда город не найден в city_ud_rates

# ------------------------------------------------------------------
# Параметры собственника (ИП на УСН)
# ------------------------------------------------------------------
owner:
  closure_pocket_kzt: 200000   # порог «точка закрытия»: ниже — смысла вести бизнес нет
  growth_pocket_kzt: 600000    # порог «точка роста»: уровень для масштабирования
  social_rate: 0.22            # соцплатежи ИП (ОПВ+ОПВР+ОСМС+СО) ~18-22% от базы
  social_base_mrp: 50          # база расчёта = 50 МРП
  fot_multiplier: 1.175        # налоги работодателя на ФОТ (gross = net × multiplier)

