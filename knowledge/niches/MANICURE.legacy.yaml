risks:
- id: physical_health
  title_ru: Зависимость от физсостояния
  body_ru: Болезнь, беременность, травма рук = ноль дохода. Один человек — единая
    точка отказа.
  probability: medium
  impact: high
  what_to_do_ru: Подушка безопасности на 3 мес. Страхование от нетрудоспособности.
- id: income_ceiling_solo
  title_ru: Потолок дохода одного мастера
  body_ru: Максимум 5-7 клиенток в день физически. Чтобы расти дальше — поднимайте
    средний чек (дизайн, укрепление, уход) или планируйте переезд в свою студию через
    1-2 года.
  probability: high
  impact: medium
  what_to_do_ru: 'Апсейл: дизайн, укрепление, парафин. План перехода в SOLO/STANDARD
    через 1-2 года.'
- id: home_sanitation
  title_ru: Санитарные нормы без контроля
  body_ru: Дома проще забить на стерилизацию. Один случай грибка/инфекции — репутация
    уничтожена.
  probability: medium
  impact: high
  what_to_do_ru: Автоклав или сухожар. Одноразовые инструменты где можно. Фото стерилизации
    в сторис.
- id: rent_overpriced
  title_ru: Аренда дорогого помещения в надежде на поток
  body_ru: Маникюрный сервис не работает на случайном потоке — клиенты записываются.
    Переплата за проходное место не конвертируется в выручку.
  probability: medium
  impact: medium
  what_to_do_ru: Считайте долю аренды от прогнозной выручки. Не выше 15% — норма,
    выше 20% — зона убытка.
- id: hiring_no_probation
  title_ru: Найм мастеров без испытательного срока
  body_ru: Плохая техника или конфликтное поведение мастера разрушают репутацию быстрее,
    чем любая реклама.
  probability: medium
  impact: medium
  what_to_do_ru: Испытательный срок 1-2 недели с тестовыми клиентами. Проверка отзывов
    и портфолио до найма.
- id: master_contract
  title_ru: Игнорирование договора с мастерами
  body_ru: Без чётких условий работы (процент, клиентская база, запрет переманивания)
    уходящий мастер забирает клиентов и открывает точку рядом.
  probability: medium
  impact: medium
  what_to_do_ru: 'Письменный договор: процент, доступ к базе, NDA, штраф за переманивание.
    Юрист на старте — обязателен.'
- id: master_takes_clients
  title_ru: Уход ключевого мастера с клиентской базой
  body_ru: Один мастер, занимающий больше 40% записи — критическая зависимость. Диверсификация
    мастеров обязательна.
  probability: medium
  impact: high
  what_to_do_ru: Не давайте одному мастеру более 35% записи. Программа лояльности
    на бренд салона, не на мастера.
- id: staff_management
  title_ru: Работа без учёта занятости мастеров
  body_ru: Перегрузка ведёт к выгоранию и снижению качества; недозагрузка — к уходу
    мастера к конкурентам с большим потоком.
  probability: medium
  impact: medium
  what_to_do_ru: Учёт занятости по каждому мастеру. Балансировать поток через систему
    записи.
- id: premium_market_thin
  title_ru: Тонкий премиум-сегмент
  body_ru: Реальный платёжеспособный premium в РК узкий. Чек 15-25К найдут только
    в Алматы/Астане в правильных районах.
  probability: high
  impact: high
  what_to_do_ru: Перед открытием — реальные интервью с потенциальной аудиторией. Тестируйте
    через pop-up или партнёрство.
- id: low_loyalty_program
  title_ru: Отсутствие программы лояльности с первого дня
  body_ru: Маникюр — регулярная процедура (раз в 2-4 недели). Клиент, вернувшийся
    трижды, остаётся надолго. Без стимула возвращения теряются до 40% разовых посетителей.
  probability: medium
  impact: medium
  what_to_do_ru: С первого клиента — карточка постоянного клиента (Notion или Excel).
    После 5-го визита — бонус. День рождения — скидка 10-15%. Без этого ретеншен на
    маленькой базе невозможен.
  formats_applied:
  - HOME
  - SOLO
  - STANDARD
  - PREMIUM
- id: stock_no_norms
  title_ru: Закупка расходников «на глаз»
  body_ru: Избыток дорогих материалов замораживает деньги; нехватка в разгар записи
    — потеря клиентов. Нужны нормы расхода на процедуру.
  probability: medium
  impact: medium
  what_to_do_ru: Excel или Google Sheets со списком расходников. Закупка 1 раз в 2
    недели по списку. Запас на 3 рабочих дня минимум, чтобы не срывать запись из-за
    отсутствия материала.
  formats_applied:
  - HOME
  - SOLO
  - STANDARD
  - PREMIUM
