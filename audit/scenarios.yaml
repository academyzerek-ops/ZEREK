- id: baseline_aktobe_no_capital_middle
  inputs: {niche: MANICURE, format: HOME, city: aktobe,    capital: 0,       experience: some, start_month: 5}

- id: baseline_turkestan_500k_decent
  inputs: {niche: MANICURE, format: HOME, city: turkestan, capital: 500000,  experience: none, start_month: 5}

