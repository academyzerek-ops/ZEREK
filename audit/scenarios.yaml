# ───────────────────────────────────────────────────────────────────
# ZEREK PDF Auditor · сценарии для прогона (R11)
# ───────────────────────────────────────────────────────────────────
# Старт: маникюр × HOME × разные города/капиталы. Покрываем:
#   · все 4 зоны капитала (RED/AMBER/YELLOW/GREEN)
#   · все 6 градаций дохода (LOW/MODEST/MIDDLE/DECENT/HIGH/VERY_HIGH)
#   · региональный разброс ЗП (от Туркестана 324K до Аktау 658K)
#   · 2 уровня опыта (none / some)
# Расширять по мере добавления ниш — BARBER, BROW, SUGARING и т.д.
# ───────────────────────────────────────────────────────────────────

# ═══ R10 baseline — должны давать 0 critical/high (контроль false positives) ═══

- id: baseline_astana_700k_yellow_modest
  inputs: {niche: MANICURE, format: HOME, city: astana,    capital: 700000,  experience: none, start_month: 5}

- id: baseline_astana_350k_red_modest
  inputs: {niche: MANICURE, format: HOME, city: astana,    capital: 350000,  experience: none, start_month: 5}

- id: baseline_astana_1100k_green_modest
