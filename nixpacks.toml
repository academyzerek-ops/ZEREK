# Railway / Nixpacks build config — adds system libs for WeasyPrint.
# Minimal safe set: Pango + Harfbuzz. Fontconfig uses whatever fonts the base image ships
# (DejaVu Sans/Mono cover Latin+Cyrillic); PDF CSS lists generic fallbacks.

[phases.setup]
aptPkgs = [
  "libpango-1.0-0",
  "libpangoft2-1.0-0",
  "libharfbuzz-subset0",
]
