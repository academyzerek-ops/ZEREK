# Railway / Nixpacks build config — adds system libs for WeasyPrint
# Pango renders text; Harfbuzz does shaping; font packages are picked up by fontconfig.

[phases.setup]
aptPkgs = [
  "libpango-1.0-0",
  "libpangoft2-1.0-0",
  "libharfbuzz-subset0",
  "fonts-inter",
  "fonts-jetbrains-mono",
  "fonts-noto-core",
  "fonts-noto-color-emoji",
]
