# Railway / Nixpacks build config.
# WeasyPrint требует системные библиотеки Pango/Cairo/HarfBuzz/Fontconfig.
# apt-packages добавляются поверх автоматически определённого Python-провайдера.

[phases.setup]
aptPkgs = [
  "libpango-1.0-0",
  "libpangoft2-1.0-0",
  "libharfbuzz0b",
  "libfontconfig1",
  "libcairo2",
  "libjpeg-dev",
  "libgdk-pixbuf2.0-0",
  "shared-mime-info",
]
