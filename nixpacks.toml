# Railway / Nixpacks — native Nix packages for WeasyPrint.
# Nix-built Python sees these via its managed RPATH; aptPkgs layer is invisible to it.

[phases.setup]
nixPkgs = [
  "pango",
  "harfbuzz",
  "glib",
  "cairo",
  "fontconfig",
  "freetype",
  "gdk-pixbuf",
  "shared-mime-info",
  "dejavu_fonts",
  "noto-fonts",
  "noto-fonts-emoji",
]

[variables]
# Expose the Nix profile libs for any ctypes/cffi loader that does find_library
LD_LIBRARY_PATH = "/nix/var/nix/profiles/default/lib:${LD_LIBRARY_PATH:-}"
