<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#0F0F0F">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<title>ZEREK — Экспресс-оценка v2</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0F0F0F;--surface:#1C1C1E;--surface-2:#2C2C2E;--surface-3:#3A3A3C;
  --text:#FFFFFF;--text-2:#A0A0A5;--text-3:#6C6C70;
  --accent:#7C6CFF;--accent-dim:rgba(124,108,255,0.15);
  --green:#22c55e;--yellow:#eab308;--red:#ef4444;
  --sans:-apple-system,BlinkMacSystemFont,"Inter","Roboto","Segoe UI",sans-serif;
  --mono:"JetBrains Mono",ui-monospace,"SF Mono",Menlo,monospace;
  --radius:16px;--radius-sm:10px;--radius-lg:20px;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0;background:var(--bg);color:var(--text);font-family:var(--sans);font-size:15px;line-height:1.45;-webkit-font-smoothing:antialiased;overflow-x:hidden;max-width:100vw}
body{padding:0 16px 40px;padding-bottom:max(40px,env(safe-area-inset-bottom,0))}
button{font-family:inherit;border:none;background:none;color:inherit;cursor:pointer;padding:0}
input,select{font-family:inherit;color:inherit}
h1,h2,h3{margin:0;font-weight:700;letter-spacing:-0.02em}
h2{font-size:22px;margin-bottom:6px}
p{margin:0}

/* Top bar */
.top-bar{display:flex;align-items:center;justify-content:space-between;padding:14px 0 10px;position:sticky;top:0;background:linear-gradient(180deg,var(--bg) 85%,transparent);z-index:10}
.back-btn{display:flex;align-items:center;gap:6px;font-size:15px;font-weight:600;color:var(--accent);padding:6px 4px}
.back-btn svg{width:18px;height:18px}
.back-btn[disabled]{color:var(--text-3);cursor:default}
.brand{font-size:13px;font-weight:700;letter-spacing:0.02em;color:var(--text-2);text-transform:uppercase}
.brand strong{color:var(--text)}
.brand-v{color:var(--accent);font-weight:700}

/* Progress */
.progress-bar{height:4px;background:var(--surface-2);border-radius:2px;overflow:hidden;margin-bottom:6px}
.progress-fill{height:100%;background:var(--accent);width:calc(var(--p,0) * 100%);transition:width 0.25s ease}
.progress-text{display:flex;justify-content:space-between;font-size:12px;color:var(--text-3);font-weight:500;margin-bottom:20px}
.progress-text strong{color:var(--text-2);font-weight:600}

/* Wizard */
.step{animation:fadeUp 0.2s ease both}
@keyframes fadeUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.step-kicker{font-size:11px;font-weight:700;letter-spacing:0.12em;color:var(--accent);text-transform:uppercase;margin-bottom:8px}
.step-desc{font-size:14px;color:var(--text-2);margin:4px 0 18px}
.step-note{background:var(--accent-dim);border:1px solid rgba(124,108,255,0.3);color:var(--text);padding:12px 14px;border-radius:var(--radius-sm);font-size:13px;line-height:1.5;margin-bottom:14px}
.step-note strong{color:var(--accent)}

.options{display:flex;flex-direction:column;gap:8px;padding-bottom:20px}
.opt{display:flex;align-items:center;gap:14px;padding:14px 16px;background:var(--surface);border:1.5px solid transparent;border-radius:var(--radius);cursor:pointer;transition:border-color 0.15s,background 0.15s,transform 0.1s;min-height:56px}
.opt:active{transform:scale(0.985)}
.opt.selected{border-color:var(--accent);background:var(--accent-dim)}
.opt-icon{font-size:22px;width:32px;flex-shrink:0;text-align:center}
.opt-label{font-size:15px;font-weight:600;color:var(--text)}
.opt-sub{font-size:12px;color:var(--text-3);margin-top:2px}

.toggles{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:18px}
.toggle{padding:12px 8px;background:var(--surface);border:1.5px solid transparent;border-radius:var(--radius-sm);text-align:center;font-size:13px;font-weight:600;cursor:pointer}
.toggle.selected{border-color:var(--accent);background:var(--accent-dim);color:var(--accent)}

.range-wrap{padding:14px 16px;background:var(--surface);border-radius:var(--radius);margin-bottom:18px}
.range-label{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;font-size:13px;color:var(--text-2);font-weight:600}
.range-val{font-family:var(--mono);font-weight:700;color:var(--text);font-size:16px}
input[type="range"]{-webkit-appearance:none;width:100%;height:4px;background:var(--surface-3);border-radius:2px;outline:none}
input[type="range"]::-webkit-slider-thumb{-webkit-appearance:none;width:22px;height:22px;background:var(--accent);border-radius:50%;cursor:pointer;border:3px solid var(--bg)}

.num-in{display:flex;align-items:center;gap:10px;padding:14px 16px;background:var(--surface);border-radius:var(--radius);margin-bottom:18px}
.num-in input{flex:1;background:transparent;border:none;outline:none;font-family:var(--mono);font-weight:700;font-size:18px;color:var(--text);width:100%}
.num-in-suffix{font-size:13px;color:var(--text-3);font-weight:600}

.radio-group{display:flex;flex-direction:column;gap:6px;padding-bottom:18px}
.radio{display:flex;align-items:center;gap:10px;padding:12px 14px;background:var(--surface);border:1.5px solid transparent;border-radius:var(--radius-sm);cursor:pointer;font-size:14px}
.radio.selected{border-color:var(--accent);background:var(--accent-dim)}
.radio-dot{width:18px;height:18px;border-radius:50%;border:2px solid var(--surface-3);flex-shrink:0;transition:border-color 0.15s}
.radio.selected .radio-dot{border-color:var(--accent);background:radial-gradient(var(--accent) 0 4px,transparent 5px)}

.section-label{font-size:13px;font-weight:600;margin-bottom:8px;color:var(--text-2)}

.confirm-table{width:100%;border-collapse:collapse;background:var(--surface);border-radius:var(--radius);overflow:hidden;margin-bottom:6px}
.confirm-table td{padding:12px 16px;font-size:14px;border-bottom:1px solid var(--surface-2)}
.confirm-table tr:last-child td{border-bottom:none}
.confirm-table td:first-child{color:var(--text-2);width:45%}
.confirm-table td:last-child{text-align:right;font-weight:600}

.cta-wrap{position:sticky;bottom:0;padding:14px 0 16px;padding-bottom:max(16px,env(safe-area-inset-bottom,0));background:linear-gradient(0deg,var(--bg) 80%,transparent);margin-top:10px}
.btn{width:100%;padding:15px 20px;background:var(--accent);color:#fff;font-size:16px;font-weight:700;border-radius:100px;cursor:pointer;transition:opacity 0.15s,transform 0.1s;letter-spacing:-0.01em}
.btn:active{opacity:0.85;transform:scale(0.99)}
.btn.disabled{background:var(--surface-2);color:var(--text-3);cursor:default}

/* Loading */
#loading-screen{display:none;flex-direction:column;align-items:center;justify-content:center;min-height:70vh;text-align:center;padding:40px 20px}
#loading-screen.active{display:flex}
.spinner{width:48px;height:48px;border:3px solid var(--surface-2);border-top-color:var(--accent);border-radius:50%;animation:spin 0.9s linear infinite;margin-bottom:24px}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-title{font-size:18px;font-weight:700;margin-bottom:6px}
.loading-sub{font-size:13px;color:var(--text-2)}

/* Result */
#result-screen{display:none}
#result-screen.active{display:block}
.result-hero{text-align:center;padding:22px 16px;background:var(--surface);border-radius:var(--radius-lg);margin-bottom:14px}
.result-hero-label{font-size:11px;font-weight:700;letter-spacing:0.12em;color:var(--text-3);text-transform:uppercase;margin-bottom:8px}
.result-hero-val{font-family:var(--mono);font-weight:700;font-size:34px;color:var(--green);line-height:1.1}
.result-hero-val.yellow{color:var(--yellow)}
.result-hero-val.red{color:var(--red)}
.result-hero-unit{font-size:13px;color:var(--text-2);margin-top:8px}

.result-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
.result-card{background:var(--surface);border-radius:var(--radius);padding:14px 16px}
.result-card-label{font-size:11px;font-weight:700;letter-spacing:0.08em;color:var(--text-3);text-transform:uppercase;margin-bottom:4px}
.result-card-val{font-family:var(--mono);font-weight:700;font-size:18px;color:var(--text)}

.result-err{background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.3);color:#fca5a5;padding:14px;border-radius:var(--radius);font-size:13px;margin-bottom:12px}

#wizard-screen.hidden,#loading-screen.hidden,#result-screen.hidden{display:none!important}

.debug-toggle{font-size:11px;color:var(--text-3);text-align:center;padding:8px;cursor:pointer}
.debug-json{background:var(--surface-2);border-radius:8px;padding:10px;font-family:var(--mono);font-size:11px;white-space:pre-wrap;word-break:break-all;color:var(--text-2);max-height:240px;overflow:auto;margin-top:8px}
</style>
</head>
<body>

<div class="top-bar">
  <button class="back-btn" id="back-btn" onclick="goBack()">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
    Назад
  </button>
  <div class="brand">ZEREK · <span class="brand-v">V2</span> · <strong>Экспресс-оценка</strong></div>
  <div style="width:60px"></div>
</div>

<div class="progress-bar"><div class="progress-fill" id="progress-fill" style="--p:0"></div></div>
<div class="progress-text"><span id="progress-step">Шаг 1</span><span id="progress-total">из 10</span></div>

<div id="wizard-screen"></div>

<div id="loading-screen">
  <div class="spinner"></div>
  <div class="loading-title">Запускаем расчёт…</div>
  <div class="loading-sub">ZEREK анализирует цифры — это займёт до 10 секунд.</div>
</div>

<div id="result-screen"></div>

<div class="cta-wrap" id="cta-wrap">
  <button class="btn disabled" id="cta-btn" onclick="nextStep()">Далее</button>
</div>

<script>
/* ====================================================================
   Quick Check v2 — адаптивная анкета под конфиг ниши.
   Data flow:
     1. GET /cities, /niches
     2. GET /niche-config/{niche_id} после выбора ниши
     3. POST /quick-check с новыми полями (has_license, staff_mode, staff_count, specific_answers)
   ==================================================================== */

var API = 'https://web-production-921a5.up.railway.app';

/* ---------- helpers ---------- */
function $(id){ return document.getElementById(id); }
function fmt(n){ if(n==null||isNaN(n)) return '—'; return Math.round(n).toLocaleString('ru-RU').replace(/,/g,' '); }

function apiGet(path, cb){
  var x=new XMLHttpRequest(); x.open('GET', API+path, true);
  x.timeout=30000;
  x.onload=function(){ try{ cb(null, JSON.parse(x.responseText)); }catch(e){ cb(e); } };
  x.onerror=function(){ cb(new Error('network')); };
  x.ontimeout=function(){ cb(new Error('timeout')); };
  x.send();
}
function apiPost(path, body, cb){
  var x=new XMLHttpRequest(); x.open('POST', API+path, true);
  x.setRequestHeader('Content-Type','application/json');
  x.timeout=60000;
  x.onload=function(){ try{ cb(null, JSON.parse(x.responseText)); }catch(e){ cb(e, x.responseText); } };
  x.onerror=function(){ cb(new Error('network')); };
  x.ontimeout=function(){ cb(new Error('timeout')); };
  x.send(JSON.stringify(body));
}

try { if (window.Telegram && window.Telegram.WebApp) { var tg=window.Telegram.WebApp; tg.ready && tg.ready(); tg.expand && tg.expand(); } } catch(e){}

/* ---------- state ---------- */
var QC = {
  // answers
  city_id: '',
  city_name: '',
  niche_id: '',
  niche_name: '',
  format_id: '',
  format_name: '',
  cls: 'Стандарт',           // "эконом"/"стандарт"/"премиум" → маппинг
  capex_level: 'стандарт',
  loc_type: '',
  area_m2: 0,
  capital: 0,
  has_license: null,          // "yes"/"no"/"in_progress"
  staff_mode: null,           // "self"/"hired"
  staff_count: null,
  specific_answers: {},
};

// Дерево шагов: имена функций-рендеров. Пересчитывается динамически в computeStepPlan()
var StepPlan = [];
var stepIndex = 0;

// city and niches catalogs
var CITIES = [];
var NICHES = [];
var NicheConfig = null;
var ExpressSurvey = null;          // /niche-survey response for tier=express

// Quids которые рендерятся специализированными шагами (city/niche/format/...)
// — их НЕ нужно показывать в обобщённом «specific» шаге.
var SPECIAL_QIDS = [
  'U_CITY','U_NICHE','U_CAPITAL',
  'A_FORMAT','B_FORMAT','C_FORMAT','D_FORMAT','E_FORMAT','F_FORMAT','G_FORMAT','H_FORMAT','O_FORMAT','P_FORMAT',
  'A_LOC','O_LOC','E_LOC','H_LOC',
  'A_AREA','O_AREA','D_AREA','E_AREA','F_AREA','G_AREA','H_AREA',
  'A_STAFF_MODE','P_STAFF',
  'P_LICENSE','G_LICENSE'
];

function nonSpecialExpressQs(){
  var qs = (ExpressSurvey && ExpressSurvey.questions) || [];
  return qs.filter(function(q){ return SPECIAL_QIDS.indexOf(q.qid) === -1; });
}

/* ---------- step plan (dynamic) ---------- */
// Локации, которые однозначно определяют физическую модель и не требуют
// уточнения через шаг «локация» — если формат уже сообщил такой loc_type,
// используем его как есть.
var SELF_DEFINING_LOC = ['home','own_building','highway','online'];

function effectiveLocOptions(){
  // Какие локации реально доступны после выбора формата:
  // — если у выбранного формата есть конкретный loc_type → возвращаем [loc_type]
  //   (шаг локации тогда вообще пропускается).
  // — иначе берём пересечение allowed_location_types ниши и loc_type'ов
  //   доступных форматов; если форматов нет — allowed_location_types ниши.
  if(!NicheConfig) return [];
  var allowed = (NicheConfig.allowed_location_types || []).slice();
  var formats = NicheConfig.formats || [];
  if(QC.format_id){
    var fm = formats.find(function(x){ return x.format_id === QC.format_id; });
    if(fm && fm.loc_type){
      return [fm.loc_type];
    }
  }
  if(formats.length){
    var fmtLocs = {};
    formats.forEach(function(f){ if(f.loc_type) fmtLocs[f.loc_type] = true; });
    var inter = allowed.filter(function(l){ return fmtLocs[l]; });
    // объединение: показываем то, что есть и в формате и в allowed
    if(inter.length) return inter;
  }
  return allowed;
}

function isHomeMode(){
  // home через формат или явный пользовательский выбор
  if(QC.loc_type === 'home') return true;
  if(QC.format_id && NicheConfig){
    var fm = (NicheConfig.formats||[]).find(function(x){ return x.format_id === QC.format_id; });
    if(fm && fm.loc_type === 'home') return true;
  }
  return false;
}

function shouldSkipLocation(){
  // (1) формат уже определил конкретный self-defining loc_type → не спрашиваем
  // (2) effective options содержит ровно один вариант → нечего выбирать
  if(QC.format_id && NicheConfig){
    var fm = (NicheConfig.formats||[]).find(function(x){ return x.format_id === QC.format_id; });
    if(fm && fm.loc_type && SELF_DEFINING_LOC.indexOf(fm.loc_type) !== -1){
      return true;
    }
  }
  var opts = effectiveLocOptions();
  return opts.length <= 1;
}

function computeStepPlan(){
  // Базовые шаги
  var plan = ['city', 'niche'];
  if(!NicheConfig){ return plan; }

  // license (если требуется или опциональна с вопросом)
  if(NicheConfig.requires_license === 'mandatory' ||
     (NicheConfig.requires_license === 'optional' && NicheConfig.specific_questions.some(isLicenseQuestion))){
    plan.push('license');
  }
  // format (всегда показываем если есть форматы)
  if(NicheConfig.formats && NicheConfig.formats.length){
    plan.push('format');
  }
  // location (только если есть смысл выбирать)
  if(!shouldSkipLocation()){
    plan.push('location');
  }
  // specific — обобщённый шаг для всех «не-специализированных» вопросов из
  // /niche-survey?tier=express (после фильтрации SPECIAL_QIDS и лицензии).
  var leftoverQs = nonSpecialExpressQs().filter(function(q){
    return !isLicenseQuestionByQid(q.qid);
  });
  if(leftoverQs.length) plan.push('specific');
  // area (скрываем если home или формат «без помещения»)
  if(!shouldSkipArea()){
    plan.push('area');
  }
  // staff
  plan.push('staff');
  // capital
  plan.push('capital');
  // confirm
  plan.push('confirm');
  return plan;
}

function isLicenseQuestion(q){
  return ['Q_NOT_LIC','Q_IPO','Q_MED_LIC','Q_EDU_LIC'].indexOf(q.question_id) !== -1;
}

function isLicenseQuestionByQid(qid){
  return ['B_MED_LIC','P_LICENSE','G_LICENSE'].indexOf(qid) !== -1;
}

/* ---------- init ---------- */
function init(){
  apiGet('/cities', function(err, resp){
    if(err){ return showError('Не удалось загрузить список городов: ' + err.message); }
    CITIES = (resp && resp.cities) || [];
    apiGet('/niches', function(err2, resp2){
      if(err2){ return showError('Не удалось загрузить список ниш: ' + err2.message); }
      NICHES = (resp2 && resp2.niches) || [];
      StepPlan = computeStepPlan();
      renderStep();
    });
  });
}

function renderStep(){
  var name = StepPlan[stepIndex];
  updateProgress();
  var wiz = $('wizard-screen');
  wiz.style.display = 'block';
  $('loading-screen').classList.remove('active');
  $('result-screen').classList.remove('active');
  $('cta-wrap').style.display = '';
  $('back-btn').disabled = stepIndex === 0;

  var renderer = RENDERERS[name];
  if(!renderer){ wiz.innerHTML = '<div class="step-note">Шаг «'+name+'» не реализован.</div>'; return; }
  renderer(wiz);
  updateCta();
}

function updateProgress(){
  var total = StepPlan.length;
  var p = (stepIndex) / Math.max(1, total-1);
  $('progress-fill').style.setProperty('--p', p);
  $('progress-step').textContent = 'Шаг ' + (stepIndex+1);
  $('progress-total').textContent = 'из ' + total;
}

function goBack(){
  if(stepIndex === 0) return;
  stepIndex -= 1;
  renderStep();
}

function nextStep(){
  if($('cta-btn').classList.contains('disabled')) return;

  var curName = StepPlan[stepIndex];
  if(curName === 'niche'){
    // после выбора ниши — тянем конфиг, потом пересчитываем план
    loadNicheConfigThen(function(){
      StepPlan = computeStepPlan();
      stepIndex += 1;
      renderStep();
    });
    return;
  }
  if(curName === 'confirm'){
    submit();
    return;
  }
  stepIndex += 1;
  renderStep();
}

function loadNicheConfigThen(cb){
  $('cta-btn').classList.add('disabled');
  $('cta-btn').textContent = 'Загружаем параметры ниши…';
  // Параллельно конфиг ниши + express-анкета (data-driven вопросы)
  var pending = 2; var hadError = null;
  apiGet('/niche-config/' + QC.niche_id, function(err, data){
    if(err){ hadError = err; }
    else { NicheConfig = data || {}; }
    if(--pending === 0) finish();
  });
  apiGet('/niche-survey/' + QC.niche_id + '?tier=express', function(err, data){
    if(err){ /* survey опционален — без него всё равно сработает специальные шаги */ }
    else { ExpressSurvey = data || null; }
    if(--pending === 0) finish();
  });
  function finish(){
    $('cta-btn').textContent = 'Далее';
    if(hadError){ return showError('Не удалось загрузить конфиг ниши: ' + hadError.message); }
    if(NicheConfig.formats && NicheConfig.formats.length === 1){
      QC.format_id = NicheConfig.formats[0].format_id;
      QC.format_name = NicheConfig.formats[0].name || QC.format_id;
    }
    QC.loc_type = inferLocType();
    cb();
  }
}

function inferLocType(){
  if(!NicheConfig) return '';
  // 1. Выбранный формат — мастер.
  if(QC.format_id){
    var fm = (NicheConfig.formats||[]).find(function(x){ return x.format_id === QC.format_id; });
    if(fm && fm.loc_type) return fm.loc_type;
  }
  // 2. Все форматы делят один и тот же loc_type → берём его.
  var formats = NicheConfig.formats || [];
  if(formats.length){
    var locs = {};
    formats.forEach(function(f){ if(f.loc_type) locs[f.loc_type] = true; });
    var keys = Object.keys(locs);
    if(keys.length === 1) return keys[0];
  }
  // 3. Если уже выбрано пользователем — не перезатираем.
  if(QC.loc_type) return QC.loc_type;
  // 4. Дефолт из конфига ниши.
  return NicheConfig.default_location_type || '';
}

function showError(msg){
  $('wizard-screen').innerHTML = '<div class="result-err">'+msg+'</div>';
  $('cta-wrap').style.display = 'none';
}

function updateCta(){
  var name = StepPlan[stepIndex];
  var ok = isStepValid(name);
  var btn = $('cta-btn');
  btn.classList.toggle('disabled', !ok);
  btn.textContent = (name === 'confirm') ? 'Запустить расчёт' : 'Далее';
}

function isStepValid(name){
  switch(name){
    case 'city':     return !!QC.city_id;
    case 'niche':    return !!QC.niche_id;
    case 'license':  return QC.has_license != null || (NicheConfig && NicheConfig.requires_license !== 'mandatory');
    case 'format':   return !!QC.format_id;
    case 'location': return !!QC.loc_type;
    case 'specific': return allSpecificAnswered();
    case 'area':     return shouldSkipArea() || (QC.area_m2 > 0);
    case 'staff':    return isStaffAnswered();
    case 'capital':  return QC.capital > 0;
    case 'confirm':  return true;
  }
  return false;
}

function allSpecificAnswered(){
  // Все обобщённые «specific» вопросы (из express survey, не SPECIAL, не license)
  var qs = nonSpecialExpressQs().filter(function(q){
    return !isLicenseQuestionByQid(q.qid);
  });
  for(var i=0;i<qs.length;i++){
    var ans = QC.specific_answers[qs[i].qid];
    if(ans == null || ans === '' || (Array.isArray(ans) && !ans.length)) return false;
  }
  return true;
}

function shouldSkipArea(){
  if(!NicheConfig) return false;
  // (1) home — площадь не имеет смысла (нет помещения)
  if(isHomeMode()) return true;
  // (2) формат с area_m2 = 0 (например, грузоперевозки на 1 машину) → площадь не нужна
  if(QC.format_id){
    var fm = (NicheConfig.formats||[]).find(function(x){ return x.format_id === QC.format_id; });
    if(fm && (!fm.area_m2 || fm.area_m2 === 0)) return true;
  }
  // (3) ниша по конфигу скрывает площадь всегда
  if(NicheConfig.area_question_mode === 'hidden_always') return true;
  return false;
}

function isStaffAnswered(){
  if(!NicheConfig) return true;
  var mode = NicheConfig.staff_question_mode;
  if(mode === 'hidden') return true;
  if(mode === 'self_only'){ QC.staff_mode = 'self'; return true; }
  if(mode === 'hired_only'){ QC.staff_mode = 'hired'; return QC.staff_count != null && QC.staff_count > 0; }
  if(mode === 'choice'){
    if(QC.staff_mode === 'self') return true;
    if(QC.staff_mode === 'hired') return QC.staff_count != null && QC.staff_count > 0;
    return false;
  }
  return true;
}

  qs.forEach(function(q){
    html += renderSpecificField(q);
  });
  html += '</form></div>';

function renderSpecificField(q){
  // Используем тот же универсальный renderer, что и финмодель,
  // но с привязкой значения и select-стейтом.
  var name = q.qid;
  var current = QC.specific_answers[name];
  var label = '<div class="section-label" style="margin-top:18px">'+escapeHtml(q.question_text)+
              (q.unit ? ' <span style="color:var(--text-3);font-weight:400">('+q.unit+')</span>' : '')+'</div>';
  if(q.input_type === 'radio' || q.input_type === 'select'){
    var opts = q.options || [];
    var radios = '<div class="radio-group">';
    opts.forEach(function(opt){
      var safe = String(opt).replace(/'/g,"\\'");
      var sel = (current === opt) ? ' selected' : '';
      radios += '<label class="radio'+sel+'" onclick="setSpecificV2(\''+name+'\',\''+safe+'\',event)">' +
                '<div class="radio-dot"></div><div>'+escapeHtml(opt)+'</div></label>';
    });
    radios += '</div>';
    return label + radios;
  }
  if(q.input_type === 'boolean'){
    return label + '<div class="radio-group">' +
      '<label class="radio'+(current==='yes' ? ' selected':'')+'" onclick="setSpecificV2(\''+name+'\',\'yes\',event)"><div class="radio-dot"></div><div>Да</div></label>' +
      '<label class="radio'+(current==='no'  ? ' selected':'')+'" onclick="setSpecificV2(\''+name+'\',\'no\',event)"><div class="radio-dot"></div><div>Нет</div></label>' +
    '</div>';
  }
  if(q.input_type === 'multi_select'){
    var opts2 = q.options || [];
    var arr = Array.isArray(current) ? current : [];
    var multi = '<div class="radio-group">';
    opts2.forEach(function(opt){
      var safe = String(opt).replace(/'/g,"\\'");
      var sel = (arr.indexOf(opt) !== -1) ? ' selected' : '';
      multi += '<label class="radio'+sel+'" onclick="toggleSpecificMulti(\''+name+'\',\''+safe+'\',event)">' +
               '<div class="radio-dot"></div><div>'+escapeHtml(opt)+'</div></label>';
    });
    multi += '</div>';
    return label + multi;
  }
  if(q.input_type === 'number'){
    return label + '<div class="num-in"><input type="number" inputmode="numeric" min="'+(q.min||0)+'" max="'+(q.max||9999999999)+'" step="'+(q.step||1)+'" placeholder="'+escapeHtml(q.placeholder||'')+'" value="'+(current||'')+'" oninput="setSpecificV2(\''+name+'\',this.value)"><span class="num-in-suffix">'+(q.unit||'')+'</span></div>';
  }
  if(q.input_type === 'range'){
    var initial = current || q.placeholder || q.min || 0;
    return label + '<div class="range-wrap"><div class="range-label"><span>значение</span><span class="range-val" id="sr-'+name+'">'+fmt(initial)+(q.unit?' '+q.unit:'')+'</span></div>' +
      '<input type="range" min="'+(q.min||0)+'" max="'+(q.max||100)+'" step="'+(q.step||1)+'" value="'+initial+'" oninput="setSpecificRange(\''+name+'\',this.value,\''+(q.unit||'')+'\')"></div>';
  }
  return label + '<div class="num-in"><input type="text" value="'+(current||'')+'" oninput="setSpecificV2(\''+name+'\',this.value)" placeholder="'+escapeHtml(q.placeholder||'')+'"></div>';
}

function setSpecificV2(qid, val, evt){
  QC.specific_answers[qid] = val;
  if(evt){
    var target = evt.currentTarget || evt.target.closest('.radio');
    if(target && target.parentNode){
      Array.prototype.forEach.call(target.parentNode.children, function(ch){ ch.classList.remove('selected'); });
      target.classList.add('selected');
    }
  }
  updateCta();
}
function setSpecificRange(qid, val, unit){
  QC.specific_answers[qid] = val;
  var lbl = $('sr-'+qid);
  if(lbl) lbl.textContent = fmt(val) + (unit?' '+unit:'');
  updateCta();
}
function toggleSpecificMulti(qid, val, evt){
  if(!Array.isArray(QC.specific_answers[qid])) QC.specific_answers[qid] = [];
  var arr = QC.specific_answers[qid];
  var i = arr.indexOf(val);
  if(i === -1) arr.push(val); else arr.splice(i,1);
  if(evt){
    var t = evt.currentTarget || evt.target.closest('.radio');
    if(t) t.classList.toggle('selected', arr.indexOf(val) !== -1);
  }
  updateCta();
}

function typicalArea(){

}

  var body = {
    city_id: QC.city_id,
    niche_id: QC.niche_id,
    format_id: QC.format_id,
    cls: QC.cls || 'Стандарт',
    area_m2: QC.area_m2 || 0,
    loc_type: QC.loc_type,
    capital: QC.capital || 0,
    capex_level: QC.capex_level || 'стандарт',
    // v2 fields
    has_license: QC.has_license,
    staff_mode: QC.staff_mode,
    staff_count: QC.staff_count,
    specific_answers: QC.specific_answers && Object.keys(QC.specific_answers).length ? QC.specific_answers : null,
  };

  apiPost('/quick-check', body, function(err, resp, raw){
    $('loading-screen').classList.remove('active');
    if(err){ return showResultError('Ошибка расчёта: ' + err.message + (raw ? '\n' + raw : '')); }
    renderResult(resp && resp.result);
  });
}

function renderResult(result){
  window._lastResult = result;
  $('result-screen').classList.add('active');
  $('cta-wrap').style.display = 'none';
  if(!result){ return showResultError('Пустой ответ от API.'); }

  var kpis = extractKpis(result);
  var cls = (kpis.verdict || '').toLowerCase();
  var verdictColor = cls.indexOf('зелён')!==-1 || cls.indexOf('green')!==-1 ? '' :
                     cls.indexOf('красн')!==-1 || cls.indexOf('red')!==-1   ? 'red' :
                     'yellow';

  var html =
    '<div class="result-hero">' +
      '<div class="result-hero-label">'+(kpis.heroLabel || 'Окупаемость')+'</div>' +
      '<div class="result-hero-val '+verdictColor+'">'+(kpis.heroVal || '—')+'</div>' +
      (kpis.heroUnit ? '<div class="result-hero-unit">'+kpis.heroUnit+'</div>' : '') +
    '</div>' +
    '<div class="result-grid">' +
      card('Выручка/мес', kpis.revenue) +
      card('Прибыль/мес', kpis.profit) +
      card('Инвестиции', kpis.capex) +
      card('Оборотка', kpis.working_cap) +
    '</div>' +
    '<div style="margin:16px 0">' +
      '<button class="btn" onclick="openFinmodel()">Развернуть в финмодель</button>' +
      '<div style="font-size:12px;color:var(--text-3);text-align:center;margin-top:8px">+ '+
      'налоги, кредит, маркетинг, сезонность — расчёт на 36 месяцев</div>' +
    '</div>' +
    '<div class="debug-toggle" onclick="toggleDebug()">Показать JSON-ответ ▾</div>' +
    '<div class="debug-json" id="debug-json" style="display:none">'+escapeHtml(JSON.stringify(result,null,2))+'</div>';

  $('result-screen').innerHTML = html;
}

/* ============================================================
   FINMODEL extension — finmodel-only delta questions in one form
   ============================================================ */
var FinmodelSurvey = null;

function openFinmodel(){
  if(!QC.niche_id){ return; }
  $('result-screen').classList.remove('active');
  $('result-screen').innerHTML = '';
  $('loading-screen').classList.add('active');
  $('loading-screen').querySelector('.loading-title').textContent = 'Загружаем расширенную анкету…';

  apiGet('/niche-survey/' + QC.niche_id + '?tier=finmodel', function(err, data){
    $('loading-screen').classList.remove('active');
    if(err){ return showResultError('Не удалось загрузить финмодель-анкету: ' + err.message); }
    FinmodelSurvey = data;
    renderFinmodelForm();
  });
}

function renderFinmodelForm(){
  var qs = (FinmodelSurvey && FinmodelSurvey.questions) || [];
  // Делта: вопросы которые ещё не отвечены (qid не в QC.specific_answers
  // и не дублируют отвеченные базовые QC.* поля).
  var alreadyAnswered = collectAnsweredQids();
  var extras = qs.filter(function(q){ return alreadyAnswered.indexOf(q.qid) === -1; });

  if(!extras.length){
    return showResultError('Все вопросы финмодели уже отвечены — нечего добавить.');
  }

  $('result-screen').classList.add('active');
  var html =
    '<div class="step-kicker" style="margin-bottom:8px">Финмодель</div>' +
    '<h2>Дополнительные параметры для расчёта на 36 месяцев</h2>' +
    '<div class="step-desc">Заполните 1-2 минуты. Можно пропустить — подставим типовое.</div>' +
    '<form id="fin-form" onsubmit="event.preventDefault(); submitFinmodel();">';
  extras.forEach(function(q){
    html += renderQuestionField(q);
  });
  html += '<div style="margin-top:18px"><button type="submit" class="btn">Сохранить и пересчитать</button></div>' +
          '<div style="text-align:center;margin-top:12px"><button type="button" onclick="backToResult()" class="btn-outline" style="background:transparent;color:var(--accent);padding:10px;font-weight:600">Вернуться к результату</button></div>' +
          '</form>';
  $('result-screen').innerHTML = html;
}

function backToResult(){
  // Просто перерисуем текущий результат если есть.
  if(window._lastResult){ renderResult(window._lastResult); }
  else { $('result-screen').innerHTML = ''; }
}

function collectAnsweredQids(){
  // Сопоставим существующие QC.* поля с qid'ами из каталога.
  var map = {
    U_CITY: QC.city_id, U_NICHE: QC.niche_id, U_CAPITAL: QC.capital,
    A_FORMAT: QC.format_id, B_FORMAT: QC.format_id, C_FORMAT: QC.format_id,
    D_FORMAT: QC.format_id, E_FORMAT: QC.format_id, F_FORMAT: QC.format_id,
    G_FORMAT: QC.format_id, H_FORMAT: QC.format_id, O_FORMAT: QC.format_id,
    P_FORMAT: QC.format_id,
    A_LOC: QC.loc_type, B_LOC: QC.loc_type, O_LOC: QC.loc_type, E_LOC: QC.loc_type, H_LOC: QC.loc_type,
    A_AREA: QC.area_m2, O_AREA: QC.area_m2, D_AREA: QC.area_m2, E_AREA: QC.area_m2,
    F_AREA: QC.area_m2, G_AREA: QC.area_m2, H_AREA: QC.area_m2,
    A_STAFF_MODE: QC.staff_mode,
    P_LICENSE: QC.has_license, G_LICENSE: QC.has_license,
  };
  var done = [];
  Object.keys(map).forEach(function(k){
    if(map[k] != null && map[k] !== '' && map[k] !== 0) done.push(k);
  });
  Object.keys(QC.specific_answers || {}).forEach(function(k){ done.push(k); });
  return done;
}

function renderQuestionField(q){
  var name = q.qid;
  var label = '<div class="section-label" style="margin-top:18px">'+escapeHtml(q.question_text)+
              (q.unit ? ' <span style="color:var(--text-3);font-weight:400">('+q.unit+')</span>' : '')+'</div>';
  if(q.input_type === 'radio' || q.input_type === 'select'){
    var opts = q.options || [];
    var radios = '<div class="radio-group">';
    opts.forEach(function(opt){
      var safe = String(opt).replace(/'/g,"\\'");
      radios += '<label class="radio" data-q="'+name+'" data-v="'+safe+'" onclick="setFinAnswer(\''+name+'\',\''+safe+'\',event)">' +
                '<div class="radio-dot"></div><div>'+escapeHtml(opt)+'</div></label>';
    });
    radios += '</div>';
    return label + radios;
  }
  if(q.input_type === 'boolean'){
    return label + '<div class="radio-group">' +
      '<label class="radio" onclick="setFinAnswer(\''+name+'\',\'yes\',event)"><div class="radio-dot"></div><div>Да</div></label>' +
      '<label class="radio" onclick="setFinAnswer(\''+name+'\',\'no\',event)"><div class="radio-dot"></div><div>Нет</div></label>' +
    '</div>';
  }
  if(q.input_type === 'multi_select'){
    var opts2 = q.options || [];
    var multi = '<div class="radio-group">';
    opts2.forEach(function(opt){
      var safe = String(opt).replace(/'/g,"\\'");
      multi += '<label class="radio" onclick="toggleFinMulti(\''+name+'\',\''+safe+'\',event)">' +
               '<div class="radio-dot"></div><div>'+escapeHtml(opt)+'</div></label>';
    });
    multi += '</div>';
    return label + multi;
  }
  if(q.input_type === 'number'){
    return label + '<div class="num-in"><input type="number" inputmode="numeric" min="'+(q.min||0)+'" max="'+(q.max||9999999999)+'" step="'+(q.step||1)+'" placeholder="'+escapeHtml(q.placeholder||'')+'" oninput="setFinAnswer(\''+name+'\',this.value)"><span class="num-in-suffix">'+(q.unit||'')+'</span></div>';
  }
  if(q.input_type === 'range'){
    return label + '<div class="range-wrap"><div class="range-label"><span>значение</span><span class="range-val" id="fr-'+name+'">'+fmt(q.placeholder||q.min||0)+(q.unit?' '+q.unit:'')+'</span></div>' +
      '<input type="range" min="'+(q.min||0)+'" max="'+(q.max||100)+'" step="'+(q.step||1)+'" value="'+(q.placeholder||q.min||0)+'" oninput="setFinRange(\''+name+'\',this.value,\''+(q.unit||'')+'\')"></div>';
  }
  // fallback: number input
  return label + '<div class="num-in"><input type="text" oninput="setFinAnswer(\''+name+'\',this.value)" placeholder="'+escapeHtml(q.placeholder||'')+'"></div>';
}

QC.fin_answers = QC.fin_answers || {};

function setFinAnswer(qid, val, evt){
  QC.fin_answers[qid] = val;
  if(evt){
    var labels = document.querySelectorAll('.radio[data-q="'+qid+'"], #fin-form .radio');
    labels.forEach(function(l){
      // unselect siblings in same parent radio-group
    });
    var target = evt.currentTarget || evt.target.closest('.radio');
    if(target && target.parentNode){
      Array.prototype.forEach.call(target.parentNode.children, function(ch){ ch.classList.remove('selected'); });
      target.classList.add('selected');
    }
  }
}
function setFinRange(qid, val, unit){
  QC.fin_answers[qid] = val;
  var lbl = $('fr-'+qid);
  if(lbl) lbl.textContent = fmt(val) + (unit?' '+unit:'');
}
function toggleFinMulti(qid, val, evt){
  if(!Array.isArray(QC.fin_answers[qid])) QC.fin_answers[qid] = [];
  var arr = QC.fin_answers[qid];
  var i = arr.indexOf(val);
  if(i === -1) arr.push(val); else arr.splice(i,1);
  if(evt){
    var t = evt.currentTarget || evt.target.closest('.radio');
    if(t) t.classList.toggle('selected', arr.indexOf(val) !== -1);
  }
}

function submitFinmodel(){
  // Сливаем fin_answers в specific_answers и шлём ещё раз /quick-check
  // (расчёт пока тот же, но user_inputs теперь полные).
  Object.keys(QC.fin_answers || {}).forEach(function(k){
    QC.specific_answers[k] = QC.fin_answers[k];
  });
  $('result-screen').innerHTML = '';
  $('result-screen').classList.remove('active');
  $('loading-screen').classList.add('active');
  $('loading-screen').querySelector('.loading-title').textContent = 'Пересчитываем с финмодель-параметрами…';
  submit();
}

function card(label, val){
  return '<div class="result-card"><div class="result-card-label">'+label+'</div><div class="result-card-val">'+(val||'—')+'</div></div>';
}

function escapeHtml(s){ return String(s||'').replace(/[&<>]/g, function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;'}[c];}); }

function toggleDebug(){
  var el = $('debug-json');
  el.style.display = el.style.display === 'none' ? 'block' : 'none';
}

function showResultError(msg){
  $('result-screen').classList.add('active');
  $('cta-wrap').style.display = 'none';
  $('result-screen').innerHTML = '<div class="result-err">'+escapeHtml(msg)+'</div>';
}

function extractKpis(r){
  // r — ответ render_report_v4. Попробуем аккуратно вытащить ключевые числа.
  var out = { heroLabel:'Окупаемость', heroVal:'—', heroUnit:'', revenue:'—', profit:'—', capex:'—', working_cap:'—', verdict:'' };
  try {
    var payback = r.payback_months || (r.block1 && r.block1.payback_months) || null;
    if(payback){ out.heroVal = payback + ' мес'; out.heroUnit = 'срок окупаемости'; }
    var rev = r.revenue_month || (r.unit && r.unit.revenue_month) || null;
    var pr  = r.profit_month  || (r.unit && r.unit.profit_month) || null;
    var cap = r.capex_total   || (r.unit && r.unit.capex_total) || null;
    var wc  = r.working_cap   || (r.unit && r.unit.working_cap) || null;
    if(rev) out.revenue = fmt(rev)+' ₸';
    if(pr)  out.profit  = fmt(pr)+' ₸';
    if(cap) out.capex   = fmt(cap)+' ₸';
    if(wc)  out.working_cap = fmt(wc)+' ₸';
    out.verdict = (r.verdict || (r.block1 && r.block1.verdict) || '');
  } catch(e){}
  return out;
}

init();
</script>
