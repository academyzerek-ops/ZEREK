<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#0F0F0F">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<title>ZEREK — Экспресс-оценка</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0F0F0F;--surface:#1C1C1E;--surface-2:#2C2C2E;--surface-3:#3A3A3C;
  --text:#FFFFFF;--text-2:#A0A0A5;--text-3:#6C6C70;
  --accent:#7C6CFF;--accent-dim:rgba(124,108,255,0.15);
  --green:#22c55e;--yellow:#eab308;--red:#ef4444;
  --sans:-apple-system,BlinkMacSystemFont,"Inter","Roboto","Segoe UI",sans-serif;
  --mono:"JetBrains Mono",ui-monospace,"SF Mono",Menlo,monospace;
  --radius:16px;--radius-sm:10px;--radius-lg:20px;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0;background:var(--bg);color:var(--text);font-family:var(--sans);font-size:15px;line-height:1.45;-webkit-font-smoothing:antialiased;overflow-x:hidden;max-width:100vw}
body{padding:0 16px 40px;padding-bottom:max(40px,env(safe-area-inset-bottom,0))}
button{font-family:inherit;border:none;background:none;color:inherit;cursor:pointer;padding:0}
input,select{font-family:inherit;color:inherit}
h1,h2,h3{margin:0;font-weight:700;letter-spacing:-0.02em}
h2{font-size:22px;margin-bottom:6px}

.top-bar{display:flex;align-items:center;justify-content:space-between;padding:14px 0 10px;position:sticky;top:0;background:linear-gradient(180deg,var(--bg) 85%,transparent);z-index:10}
.back-btn{display:flex;align-items:center;gap:6px;font-size:15px;font-weight:600;color:var(--accent);padding:6px 4px}
.back-btn[disabled]{color:var(--text-3);cursor:default}
.brand{font-size:13px;font-weight:700;letter-spacing:0.02em;color:var(--text-2);text-transform:uppercase}
.brand strong{color:var(--text)}

.progress-bar{height:4px;background:var(--surface-2);border-radius:2px;overflow:hidden;margin-bottom:6px}
.progress-fill{height:100%;background:var(--accent);width:calc(var(--p,0) * 100%);transition:width 0.25s ease}
.progress-text{display:flex;justify-content:space-between;font-size:12px;color:var(--text-3);font-weight:500;margin-bottom:20px}

.step{animation:fadeUp 0.2s ease both}
@keyframes fadeUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.step-kicker{font-size:11px;font-weight:700;letter-spacing:0.12em;color:var(--accent);text-transform:uppercase;margin-bottom:8px}
.step-desc{font-size:14px;color:var(--text-2);margin:4px 0 18px}
.step-note{background:var(--accent-dim);border:1px solid rgba(124,108,255,0.3);color:var(--text);padding:12px 14px;border-radius:var(--radius-sm);font-size:13px;line-height:1.5;margin-bottom:14px}

.options{display:flex;flex-direction:column;gap:8px;padding-bottom:20px}
.opt{display:flex;align-items:center;gap:14px;padding:14px 16px;background:var(--surface);border:1.5px solid transparent;border-radius:var(--radius);cursor:pointer;min-height:56px}
.opt.selected{border-color:var(--accent);background:var(--accent-dim)}
.opt-icon{font-size:22px;width:32px;flex-shrink:0;text-align:center}
.opt-label{font-size:15px;font-weight:600}
.opt-sub{font-size:12px;color:var(--text-3);margin-top:2px;line-height:1.4}
.opt-badge{font-size:10px;color:var(--accent);background:var(--accent-dim);padding:2px 8px;border-radius:10px;display:inline-block;margin-top:4px;font-weight:600;text-transform:uppercase;letter-spacing:0.04em}
/* Сетка месяцев (шаг «Когда планируете открыться»): 3 колонки × 4 ряда. */
.month-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:8px}
.month-opt{justify-content:center;min-height:48px;padding:10px 8px;text-align:center}
.month-opt .opt-title{font-size:14px;font-weight:600}
.month-opt.selected{border-color:var(--accent);background:var(--accent-dim)}

.category{font-size:11px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:var(--text-3);padding:18px 0 8px;border-bottom:0.5px solid var(--surface-2);margin-bottom:8px}

.radio-group{display:flex;flex-direction:column;gap:6px;padding-bottom:8px}
.radio{display:flex;align-items:center;gap:10px;padding:14px;background:var(--surface);border:1.5px solid transparent;border-radius:var(--radius-sm);cursor:pointer;font-size:14px}
.radio.selected{border-color:var(--accent);background:var(--accent-dim)}
.radio-dot{width:18px;height:18px;border-radius:50%;border:2px solid var(--surface-3);flex-shrink:0}
.radio.selected .radio-dot{border-color:var(--accent);background:radial-gradient(var(--accent) 0 4px,transparent 5px)}
.radio-label{font-weight:600}
.radio-sub{font-size:12px;color:var(--text-3);margin-top:3px}

.num-in{display:flex;align-items:center;gap:10px;padding:14px 16px;background:var(--surface);border-radius:var(--radius);margin-bottom:8px}
.num-in input{flex:1;background:transparent;border:none;outline:none;font-family:var(--mono);font-weight:700;font-size:18px;color:var(--text);width:100%}
.num-in-suffix{font-size:13px;color:var(--text-3);font-weight:600}

.section-label{font-size:13px;font-weight:600;margin:18px 0 8px;color:var(--text-2)}

.auto-badge{background:var(--surface-2);border-radius:var(--radius);padding:16px;display:flex;align-items:center;gap:12px;margin-bottom:12px}
.auto-badge-ic{font-size:28px}
.auto-badge-text{font-size:14px;color:var(--text-2);line-height:1.4}
.auto-badge-text strong{color:var(--text)}

.skip-btn{display:block;width:100%;padding:12px;text-align:center;background:var(--surface-2);border-radius:var(--radius);color:var(--accent);font-size:14px;font-weight:600;margin-top:8px;cursor:pointer}

.confirm-table{width:100%;border-collapse:collapse;background:var(--surface);border-radius:var(--radius);overflow:hidden;margin-bottom:6px}
.confirm-table td{padding:12px 16px;font-size:14px;border-bottom:1px solid var(--surface-2)}
.confirm-table tr:last-child td{border-bottom:none}
.confirm-table td:first-child{color:var(--text-2);width:45%}
.confirm-table td:last-child{text-align:right;font-weight:600}

.cta-wrap{position:sticky;bottom:0;padding:14px 0 16px;padding-bottom:max(16px,env(safe-area-inset-bottom,0));background:linear-gradient(0deg,var(--bg) 80%,transparent);margin-top:10px}
.btn{width:100%;padding:15px 20px;background:var(--accent);color:#fff;font-size:16px;font-weight:700;border-radius:100px}
.btn.disabled{background:var(--surface-2);color:var(--text-3)}

#loading-screen{display:none;flex-direction:column;align-items:center;justify-content:center;min-height:70vh;text-align:center;padding:40px 20px}
#loading-screen.active{display:flex}
.spinner{width:48px;height:48px;border:3px solid var(--surface-2);border-top-color:var(--accent);border-radius:50%;animation:spin 0.9s linear infinite;margin-bottom:24px}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-title{font-size:18px;font-weight:700;margin-bottom:6px}
.loading-sub{font-size:13px;color:var(--text-2)}

#result-screen{display:none}
#result-screen.active{display:block}
.result-err{background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.3);color:#fca5a5;padding:14px;border-radius:var(--radius);font-size:13px;margin-bottom:12px}

/* ─── BLOCK 1 — ВЕРДИКТ ─── */
.b1{padding-bottom:20px}
.b1-section{padding:18px 16px;background:var(--surface);border-radius:var(--radius-lg);margin-bottom:12px}
.b1-header{font-size:11px;font-weight:700;letter-spacing:0.12em;color:var(--text-3);text-transform:uppercase;margin-bottom:14px;text-align:center}

/* светофор */
.b1-traffic{display:flex;align-items:center;justify-content:center;gap:16px;margin-bottom:18px}
.b1-light{width:28px;height:28px;border-radius:50%;background:var(--surface-2);position:relative;transition:all 0.4s}
.b1-light.green.active{background:var(--green);box-shadow:0 0 20px rgba(34,197,94,0.5)}
.b1-light.yellow.active{background:var(--yellow);box-shadow:0 0 20px rgba(234,179,8,0.5)}
.b1-light.red.active{background:var(--red);box-shadow:0 0 20px rgba(239,68,68,0.5)}
.b1-connector{height:2px;width:24px;background:var(--surface-3);opacity:0.4}

.b1-verdict-label{display:flex;align-items:center;justify-content:center;gap:10px;font-size:15px;font-weight:700;margin-bottom:14px}
.b1-verdict-label .b1-dot{width:14px;height:14px;border-radius:50%}
.b1-verdict-label.green{color:var(--green)}
.b1-verdict-label.green .b1-dot{background:var(--green)}
.b1-verdict-label.yellow{color:var(--yellow)}
.b1-verdict-label.yellow .b1-dot{background:var(--yellow)}
.b1-verdict-label.red{color:var(--red)}
.b1-verdict-label.red .b1-dot{background:var(--red)}

.b1-statement{font-size:15px;line-height:1.55;color:var(--text);text-align:center;font-weight:500;padding:0 6px}

/* 4 главные цифры */
.b1-metrics{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.b1-metric{background:var(--bg);border-radius:var(--radius);padding:14px;text-align:center}
.b1-metric-label{font-size:10px;font-weight:700;letter-spacing:0.1em;color:var(--text-3);text-transform:uppercase;margin-bottom:6px}
.b1-metric-val{font-family:var(--mono);font-weight:700;font-size:17px;color:var(--text);line-height:1.2}
.b1-metric.hero{grid-column:1 / -1;padding:16px;background:linear-gradient(135deg,rgba(124,108,255,0.12),rgba(124,108,255,0.06));border:1px solid rgba(124,108,255,0.3)}
.b1-metric.hero .b1-metric-val{font-size:22px;color:var(--accent)}

/* плюсы и риски */
.b1-list{margin-top:4px}
.b1-list-title{font-size:13px;font-weight:700;margin-bottom:10px;display:flex;align-items:center;gap:8px}
.b1-list-title.pluses{color:var(--green)}
.b1-list-title.risks{color:var(--yellow)}
.b1-item{display:flex;gap:10px;padding:10px 0;border-bottom:0.5px solid var(--surface-2);font-size:13.5px;line-height:1.5}
.b1-item:last-child{border-bottom:none}
.b1-item-ic{flex-shrink:0;font-size:14px;line-height:1.4}
.b1-item-text{color:var(--text-2)}
.b1-item-text strong{color:var(--text)}

.b1-footer{text-align:center;padding:14px 0;color:var(--text-3);font-size:11px;letter-spacing:0.04em}
.b1-footer strong{color:var(--text-2)}

/* ─── BLOCK 2 — ПАСПОРТ БИЗНЕСА ─── */
.b2-section{padding:16px;background:var(--surface);border-radius:var(--radius-lg);margin-bottom:12px}
.b2-title{font-size:11px;font-weight:700;letter-spacing:0.12em;color:var(--text-3);text-transform:uppercase;margin-bottom:14px}

.b2-niche{display:flex;align-items:flex-start;gap:14px;margin-bottom:14px}
.b2-niche-icon{font-size:34px;line-height:1;width:42px;flex-shrink:0;text-align:center}
.b2-niche-title{font-size:17px;font-weight:700;letter-spacing:-0.01em;line-height:1.2}
.b2-niche-cls{font-size:12px;color:var(--text-3);margin-top:4px;text-transform:uppercase;letter-spacing:0.08em}

.b2-meta{display:grid;grid-template-columns:1fr;gap:6px;padding:12px 0;border-top:0.5px solid var(--surface-2)}
.b2-meta-row{display:flex;gap:10px;font-size:14px;color:var(--text-2)}
.b2-meta-ic{flex-shrink:0}
.b2-meta-val{color:var(--text)}

.b2-staff{margin-top:10px}
.b2-staff-title{font-size:11px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:var(--text-3);margin-bottom:10px}
.b2-staff-row{display:flex;align-items:center;gap:12px;padding:8px 0;font-size:14px}
.b2-staff-icons{flex-shrink:0;font-size:14px;letter-spacing:2px;min-width:130px}
.b2-staff-label{color:var(--text-2)}
.b2-staff-label strong{color:var(--text)}

.b2-role{background:linear-gradient(135deg,rgba(124,108,255,0.18),rgba(124,108,255,0.08));border:1px solid rgba(124,108,255,0.35);border-radius:var(--radius);padding:12px 14px;margin-top:14px;display:flex;gap:10px;align-items:flex-start}
.b2-role-ic{font-size:18px}
.b2-role-body{flex:1}
.b2-role-title{font-weight:700;font-size:14px;color:var(--accent);margin-bottom:3px}
.b2-role-desc{font-size:13px;color:var(--text-2)}

.b2-fin-row{display:flex;justify-content:space-between;align-items:center;padding:10px 0;font-size:14px;border-bottom:0.5px solid var(--surface-2)}
.b2-fin-row:last-child{border-bottom:none}
.b2-fin-label{color:var(--text-2)}
.b2-fin-val{font-family:var(--mono);font-weight:700;color:var(--text)}
.b2-fin-val.surplus{color:var(--green)}
.b2-fin-val.deficit{color:var(--yellow)}
.b2-fin-val.critical{color:var(--red)}

.b2-critical-note{background:rgba(239,68,68,0.12);border:1px solid rgba(239,68,68,0.35);border-radius:var(--radius-sm);padding:10px 12px;margin-top:10px;font-size:13px;color:#fca5a5;line-height:1.5}
.b2-match-note{background:rgba(34,197,94,0.1);border:1px solid rgba(34,197,94,0.3);border-radius:var(--radius-sm);padding:10px 12px;margin-top:10px;font-size:13px;color:#86efac;line-height:1.5}

.b2-confirm{text-align:center;padding:14px 16px;background:var(--surface-2);border-radius:var(--radius);margin-bottom:12px;font-size:13px;color:var(--text-2);line-height:1.55}
.b2-confirm strong{color:var(--text)}

/* ─── BLOCK 5 — P&L ЗА ГОД ─── */
.b5-section{padding:18px 16px;background:var(--surface);border-radius:var(--radius-lg);margin-bottom:12px}
.b5-title{font-size:11px;font-weight:700;letter-spacing:0.12em;color:var(--text-3);text-transform:uppercase;margin-bottom:14px}
.b5-table{width:100%;border-collapse:collapse;font-size:13px;margin-bottom:10px;table-layout:fixed}
/* Первая колонка (метка строки) чуть шире, 3 сценария — ровно одинаковые. */
.b5-table col.b5-col-label{width:34%}
.b5-table col.b5-col-sc{width:22%}
.b5-table thead th{font-size:10px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;color:var(--text-3);padding:8px 4px;text-align:right;white-space:nowrap}
.b5-table thead th:first-child{text-align:left}
.b5-table td{padding:7px 6px;border-bottom:0.5px solid var(--surface-2);text-align:right;font-family:var(--mono);font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.b5-table td:first-child{text-align:left;font-family:var(--sans);font-weight:500;color:var(--text-2);white-space:normal;overflow:visible;border-left:none !important}
/* Вертикальные разделители между 3 сценарными колонками (Пессим./База/Оптим.) */
.b5-table td:nth-child(n+2), .b5-table th:nth-child(n+2){border-left:1px solid var(--surface-2)}
.b5-row-rev td{color:var(--green)}
.b5-row-cost td{color:var(--text-2)}
.b5-row-cost td:first-child{color:var(--text-2)}
.b5-row-profit{border-top:2px solid var(--text-2)}
.b5-row-profit td{color:var(--text);font-weight:800;padding-top:10px}
.b5-row-profit td:first-child{font-family:var(--sans);font-weight:700;letter-spacing:-0.01em}

.b5-mults{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:14px}
.b5-mult{padding:12px;background:var(--bg);border-radius:var(--radius-sm)}
.b5-mult-label{font-size:10px;font-weight:700;letter-spacing:0.08em;color:var(--text-3);text-transform:uppercase;margin-bottom:4px}
.b5-mult-val{font-family:var(--mono);font-weight:700;font-size:17px;color:var(--text)}
.b5-mult-sub{font-size:11px;color:var(--text-3);margin-top:2px}
.b5-roi{grid-column:1 / -1;text-align:center;padding:14px;background:linear-gradient(135deg,rgba(124,108,255,0.14),rgba(124,108,255,0.06));border:1px solid rgba(124,108,255,0.25)}
.b5-roi .b5-mult-val{font-size:26px;color:var(--accent)}

.b5-income{margin-top:14px;padding:14px;background:linear-gradient(135deg,rgba(34,197,94,0.10),rgba(34,197,94,0.04));border:1px solid rgba(34,197,94,0.28);border-radius:var(--radius)}
.b5-income-title{font-size:11px;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;color:#86efac;margin-bottom:10px;text-align:center}
.b5-income-row{display:flex;justify-content:space-between;padding:5px 0;font-size:13px;color:var(--text-2)}
.b5-income-row strong{font-family:var(--mono);font-weight:700;color:var(--text)}
.b5-income-total{border-top:1px solid rgba(34,197,94,0.3);padding-top:8px;margin-top:6px;font-size:14px;color:var(--text)}
.b5-income-total strong{font-size:17px;color:var(--green)}
.b5-income-cards{display:flex;gap:0;margin:10px 0 6px;border:1px solid rgba(34,197,94,0.25);border-radius:var(--radius);overflow:hidden;background:rgba(34,197,94,0.05)}
.b5-income-card{flex:1;text-align:center;padding:12px 10px}
.b5-income-card + .b5-income-card{border-left:1px solid rgba(34,197,94,0.28)}
.b5-income-card-label{font-size:11px;color:var(--text-3);margin-bottom:6px;line-height:1.35}
.b5-income-card-val{font-family:var(--mono);font-weight:700;font-size:20px;color:#10b981;line-height:1.15}
.b5-income-card-sub{font-size:10px;color:var(--text-3);margin-top:3px}
.b5-income-link{text-align:center;margin-top:2px;margin-bottom:6px;font-size:12px}
.b5-income-link a{color:var(--accent);text-decoration:none}
.b5-income-link a:hover{text-decoration:underline}
@media (max-width:420px){
  .b5-income-cards{flex-direction:column}
  .b5-income-card + .b5-income-card{border-left:none;border-top:1px solid rgba(34,197,94,0.28)}
}
.b5-income-disclaimer{margin-top:10px;font-size:11px;color:var(--text-3);line-height:1.45;text-align:center}
.b5-income-region{margin-top:10px;padding:8px 10px;background:rgba(34,197,94,0.05);border-left:2px solid rgba(34,197,94,0.4);border-radius:4px;font-size:12px;color:var(--text-2);line-height:1.45}

/* ─── Staff paradox (потолок мастера + стратегии) — для beauty-ниш ─── */
.staff-paradox{margin:20px 0;padding:18px;background:linear-gradient(135deg,#1c1b3a 0%,#0f172a 100%);border-radius:var(--radius-lg);border:1px solid rgba(236,72,153,0.22)}
.sp-title{font-size:16px;font-weight:700;color:var(--text);margin-bottom:6px}
.sp-subtitle{font-size:13px;color:var(--text-2);margin-bottom:16px;line-height:1.5}
.sp-capacity{padding:12px;background:rgba(236,72,153,0.10);border-radius:10px;margin-bottom:14px}
.sp-capacity-label{font-size:11px;color:var(--text-3);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:6px}
.sp-capacity-row{display:flex;justify-content:space-between;padding:3px 0;font-size:13px;color:var(--text-2)}
.sp-capacity-row strong{color:var(--text);font-family:var(--mono);font-weight:700}
.sp-note{padding:12px;background:rgba(245,158,11,0.10);border-left:3px solid #f59e0b;border-radius:10px;font-size:12px;color:var(--text-2);line-height:1.5;margin:12px 0}
.sp-section-label{font-size:11px;font-weight:700;color:var(--text-3);margin:14px 0 8px;text-transform:uppercase;letter-spacing:0.08em}
.sp-strategy{padding:14px;background:rgba(255,255,255,0.04);border-radius:10px;margin-bottom:10px}
.sp-strategy-title{font-size:13px;font-weight:700;color:var(--text);margin-bottom:6px}
.sp-strategy-body{font-size:12px;color:var(--text-2);line-height:1.5}
.sp-strategy-savings{margin-top:8px;padding:6px 10px;background:rgba(16,185,129,0.12);border-radius:6px;font-size:12px;color:#10b981;font-weight:700}
.sp-warning{padding:14px;background:rgba(239,68,68,0.10);border-left:3px solid #ef4444;border-radius:10px;margin:14px 0}
.sp-warning-title{font-size:13px;font-weight:700;color:#ef4444;margin-bottom:6px}
.sp-warning-text{font-size:12px;color:var(--text-2);line-height:1.5}

/* ─── Marketing plan (архетипы + помесячный бюджет) — между danger_zone и capital ─── */
.marketing-plan{margin:20px 0;padding:18px;background:linear-gradient(135deg,#1e293b 0%,#0f172a 100%);border-radius:var(--radius-lg);border:1px solid rgba(124,108,255,0.22)}
.mp-title{font-size:16px;font-weight:700;color:var(--text);margin-bottom:6px}
.mp-subtitle{font-size:13px;color:var(--text-2);margin-bottom:16px;line-height:1.5}
.mp-archetype{padding:12px;background:rgba(124,108,255,0.10);border-radius:10px;margin-bottom:14px}
.mp-archetype-label{font-size:11px;color:var(--text-3);text-transform:uppercase;letter-spacing:0.08em}
.mp-archetype-name{font-size:14px;font-weight:700;color:var(--text);margin-top:4px}
.mp-archetype-note{font-size:12px;color:var(--text-2);margin-top:6px;line-height:1.4}
.mp-section-label{font-size:11px;font-weight:700;color:var(--text-3);margin:14px 0 8px;text-transform:uppercase;letter-spacing:0.08em}
.mp-drivers{display:grid;grid-template-columns:repeat(5,1fr);gap:6px;margin:10px 0;padding:10px;background:rgba(255,255,255,0.03);border-radius:10px}
.mp-driver{text-align:center;font-size:11px}
.mp-driver-label{color:var(--text-3);margin-bottom:3px}
.mp-driver-stars{color:#f59e0b;font-size:10px;letter-spacing:0.5px}
.mp-driver-score{font-weight:700;color:var(--text);margin-top:2px}
.mp-phases{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin:14px 0}
.mp-phase{padding:10px;background:rgba(255,255,255,0.04);border-radius:10px;text-align:center}
.mp-phase-label{font-size:10px;color:var(--text-3);text-transform:uppercase;letter-spacing:0.08em}
.mp-phase-budget{font-family:var(--mono);font-size:14px;font-weight:700;color:var(--text);margin:5px 0}
.mp-phase-note{font-size:10px;color:var(--text-2);line-height:1.35}
.mp-summary{padding:12px;background:rgba(255,255,255,0.05);border-radius:10px;margin:14px 0}
.mp-summary-row{display:flex;justify-content:space-between;padding:3px 0;font-size:12px;color:var(--text-2)}
.mp-summary-row strong{color:var(--text);font-family:var(--mono);font-weight:700}
.mp-channels{display:flex;flex-direction:column;gap:5px}
.mp-channel{display:flex;justify-content:space-between;padding:8px 10px;background:rgba(16,185,129,0.08);border-radius:8px;font-size:12.5px}
.mp-channel-name{color:var(--text)}
.mp-channel-pct{font-weight:700;color:#10b981;font-family:var(--mono)}
.mp-warning{padding:12px;background:rgba(239,68,68,0.08);border-left:3px solid #ef4444;border-radius:10px;font-size:12px;color:var(--text-2);line-height:1.5;margin:10px 0}
.mp-content-advice{padding:12px;background:rgba(245,158,11,0.08);border-radius:10px;font-size:12px;color:var(--text-2);line-height:1.5;margin:10px 0}
.mp-wisdom{padding:10px 12px;background:rgba(124,108,255,0.10);border-radius:10px;font-size:12px;color:var(--text-2);line-height:1.5;margin-top:12px}

/* ─── Danger zone (разгон + сезонность) — после инфографики, до стресса ─── */
.danger-zone{margin:20px 0;padding:18px;background:linear-gradient(135deg,#1a1a2e 0%,#16213e 100%);border-radius:var(--radius-lg);border:1px solid rgba(239,68,68,0.22)}
.danger-zone-title{font-size:16px;font-weight:700;color:var(--text);margin-bottom:6px}
.danger-zone-intro{font-size:13px;color:var(--text-2);line-height:1.5;margin-bottom:16px}
.danger-section-label{font-size:11px;font-weight:700;color:var(--text-3);margin:14px 0 8px;text-transform:uppercase;letter-spacing:0.08em}
.danger-zone-stats{background:rgba(255,255,255,0.03);border-radius:10px;padding:12px;margin-bottom:12px}
.danger-stat-row{display:flex;justify-content:space-between;padding:4px 0;font-size:13px;color:var(--text-2)}
.danger-stat-row strong{color:var(--text);font-family:var(--mono)}
.danger-drawdown{font-size:15px;font-weight:700;color:#ef4444;font-family:var(--mono)}
.danger-loss-months{padding:12px;background:rgba(239,68,68,0.08);border-radius:10px;margin-bottom:12px}
.danger-loss-item{display:flex;justify-content:space-between;padding:4px 0;font-size:13px}
.danger-loss-item .label{color:var(--text-2)}
.danger-loss-item .amount{color:#ef4444;font-weight:700;font-family:var(--mono)}
.danger-advice{padding:14px;background:rgba(16,185,129,0.10);border-left:3px solid #10b981;border-radius:10px;margin:14px 0}
.danger-advice-title{font-size:12px;font-weight:700;color:#10b981;margin-bottom:4px;text-transform:uppercase;letter-spacing:0.06em}
.danger-advice-amount{font-family:var(--mono);font-size:18px;font-weight:700;color:var(--text);display:block;margin:4px 0}
.danger-advice-text{font-size:13px;color:var(--text-2);line-height:1.5}
.danger-wisdom{margin-top:14px;padding:10px 12px;background:rgba(124,108,255,0.10);border-radius:10px;font-size:12px;color:var(--text-2);line-height:1.5}
.danger-wisdom::before{content:"📚 "}

/* ─── Capital adequacy (достаточность капитала) — после block6 ─── */
.capital-adequacy{margin:20px 0;padding:18px;background:var(--surface);border-radius:var(--radius-lg)}
.capital-head{font-size:16px;font-weight:700;margin-bottom:10px;color:var(--text)}
.capital-user-amount{font-size:13px;color:var(--text-2);margin-bottom:14px}
.capital-user-amount strong{color:var(--text);font-size:17px;font-family:var(--mono)}
.capital-verdict{padding:14px;border-radius:12px;margin-bottom:16px;border-left:4px solid}
.capital-verdict-safe,
.capital-verdict-comfortable{background:rgba(16,185,129,0.10);border-left-color:#10b981}
.capital-verdict-risky{background:rgba(245,158,11,0.10);border-left-color:#f59e0b}
.capital-verdict-insufficient{background:rgba(239,68,68,0.10);border-left-color:#ef4444}
.capital-verdict-unknown{background:rgba(107,114,128,0.10);border-left-color:#6b7280}
.capital-verdict-label{font-size:12px;font-weight:700;margin-bottom:6px;text-transform:uppercase;letter-spacing:0.06em;color:var(--text)}
.capital-verdict-message{font-size:13px;color:var(--text-2);line-height:1.5}
.capital-levels-title{font-size:11px;font-weight:700;color:var(--text-3);margin:16px 0 8px;text-transform:uppercase;letter-spacing:0.08em}
.capital-level{display:flex;align-items:center;justify-content:space-between;padding:12px 0;border-bottom:1px solid rgba(255,255,255,0.06)}
.capital-level:last-child{border-bottom:none}
.capital-level-info{display:flex;align-items:center;gap:10px}
.capital-level-icon{font-size:15px;width:20px;flex:0 0 auto}
.capital-level-labels{display:flex;flex-direction:column;gap:2px}
.capital-level-label{font-size:13px;font-weight:600;color:var(--text)}
.capital-level-sublabel{font-size:11px;color:var(--text-3)}
.capital-level-amount{font-family:var(--mono);font-size:13px;font-weight:700;color:var(--text)}
.capital-reserve-breakdown{margin-top:14px;padding:12px;background:rgba(255,255,255,0.03);border-radius:10px;font-size:12px}
.capital-reserve-breakdown-title{font-weight:600;color:var(--text);margin-bottom:8px}
.capital-reserve-item{display:flex;justify-content:space-between;padding:3px 0;color:var(--text-2)}
.capital-reserve-total{margin-top:6px;padding-top:6px;border-top:1px solid rgba(255,255,255,0.1);font-weight:700;color:var(--text)}
.capital-wisdom{margin-top:14px;padding:10px 12px;background:rgba(124,108,255,0.10);border-radius:10px;font-size:12px;color:var(--text-2);line-height:1.5}

/* ─── Growth scenarios (А что дальше?) — между block5 и инфографикой ─── */
.growth-block{margin:20px 0;padding:18px;background:linear-gradient(135deg,#0f172a 0%,#1e293b 100%);border-radius:var(--radius-lg);border:1px solid rgba(16,185,129,0.22)}
.growth-title{font-size:16px;font-weight:700;margin-bottom:8px;color:var(--text)}
.growth-intro{font-size:14px;color:var(--text-2);margin-bottom:18px;line-height:1.5}
.growth-scenarios{display:flex;flex-direction:column;gap:10px;margin-bottom:18px}
.growth-scenario{padding:14px;border-radius:10px;border-left:3px solid}
.growth-scenario-stagnation{background:rgba(107,114,128,0.10);border-left-color:#6b7280}
.growth-scenario-development{background:rgba(16,185,129,0.10);border-left-color:#10b981}
.scenario-label{font-size:14px;font-weight:600;margin-bottom:8px;color:var(--text)}
.scenario-description{font-size:13px;color:var(--text-2);line-height:1.5;margin-bottom:10px;white-space:pre-line}
.scenario-outcome{font-size:13.5px;font-weight:500;color:var(--text);padding:6px 10px;background:rgba(255,255,255,0.04);border-radius:6px;margin-top:6px}
.scenario-warning{font-size:11.5px;color:#f59e0b;margin-top:8px}
.growth-factors-title{font-size:14px;font-weight:600;margin:18px 0 10px;color:var(--text)}
.growth-factor{padding:12px 0;border-bottom:1px solid rgba(255,255,255,0.06)}
.growth-factor:last-child{border-bottom:none}
.factor-title{font-size:13px;font-weight:600;margin-bottom:6px;color:var(--text)}
.factor-body{font-size:12px;color:var(--text-2);line-height:1.5;white-space:pre-line}
.growth-finmodel-cta{margin-top:18px;padding:16px;background:linear-gradient(135deg,#059669 0%,#10b981 100%);border-radius:12px;text-align:center}
.growth-cta-text{font-size:13px;color:#fff;margin-bottom:10px;line-height:1.4}
.growth-cta-btn{display:inline-block;padding:10px 24px;background:#fff;color:#059669;border:none;border-radius:8px;font-weight:700;font-size:14px;margin-top:4px;cursor:pointer;font-family:inherit}

/* ─── PDF download (Round-3 §4.1) ───
   Единый зелёный primary CTA для обоих мест (после паспорта и перед
   апселлом). Фиолетовая navy-версия и бежевая «Скачано» заменены на
   этот стиль. */
.pdf-download-hero{margin:20px 0;text-align:center}
.pdf-download-btn{display:block;padding:18px 24px;background:linear-gradient(135deg,#4ADE80 0%,#22C55E 100%);color:#fff;border:none;border-radius:14px;cursor:pointer;box-shadow:0 4px 16px rgba(34,197,94,0.35);transition:all 0.2s;width:100%;max-width:420px;margin:0 auto;font-family:inherit;font-weight:600}
.pdf-download-btn:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(34,197,94,0.45)}
.pdf-download-btn:disabled{opacity:0.7;cursor:wait;transform:none}
.pdf-download-btn .pdf-icon{font-size:24px;display:block;margin-bottom:6px}
.pdf-download-btn .pdf-main{font-size:16px;font-weight:700;display:block;margin-bottom:2px}
.pdf-download-btn .pdf-sub{font-size:12px;opacity:0.92;display:block}
.pdf-download-btn.downloaded{background:linear-gradient(135deg,#22C55E 0%,#16A34A 100%);box-shadow:0 3px 12px rgba(22,163,74,0.4)}

/* ─── AI-чат secondary action (Round-3 §4.2) ─── */
.btn-discuss-ai{display:block;padding:16px 24px;background:#FFFFFF;color:#1F3864;border:1.5px solid #1F3864;border-radius:14px;font-weight:500;font-family:inherit;cursor:pointer;width:100%;max-width:420px;margin:12px auto 0;font-size:14px;transition:background 0.15s}
.btn-discuss-ai:hover{background:#F5F7FB}
.btn-discuss-ai:disabled{opacity:0.6;cursor:wait}

/* ─── AI-chat модалка ─── */
.ai-chat-overlay{position:fixed;inset:0;background:rgba(15,26,46,0.78);z-index:9999;display:flex;align-items:flex-end;justify-content:center}
.ai-chat-sheet{background:var(--bg);color:var(--text);width:100%;max-width:480px;max-height:85vh;border-radius:18px 18px 0 0;display:flex;flex-direction:column;overflow:hidden}
.ai-chat-header{padding:14px 16px;border-bottom:1px solid var(--surface-2);display:flex;align-items:center;justify-content:space-between}
.ai-chat-title{font-weight:700;font-size:15px}
.ai-chat-close{background:none;border:none;color:var(--text-2);font-size:22px;cursor:pointer;padding:0 6px;font-family:inherit}
.ai-chat-messages{flex:1;overflow-y:auto;padding:14px 16px;display:flex;flex-direction:column;gap:10px;min-height:240px}
.ai-msg{padding:10px 12px;border-radius:12px;font-size:13.5px;line-height:1.5;max-width:85%}
.ai-msg-user{align-self:flex-end;background:var(--accent-dim);color:var(--text);border-bottom-right-radius:4px}
.ai-msg-bot{align-self:flex-start;background:var(--surface-2);color:var(--text);border-bottom-left-radius:4px}
.ai-msg-bot.loading{opacity:0.6;font-style:italic}
.ai-chat-input{border-top:1px solid var(--surface-2);padding:10px 12px;display:flex;gap:8px;background:var(--surface)}
.ai-chat-input textarea{flex:1;resize:none;border:1px solid var(--surface-3);border-radius:10px;padding:8px 10px;background:var(--bg);color:var(--text);font-family:inherit;font-size:13px;min-height:40px;max-height:90px}
.ai-chat-send{padding:8px 14px;background:#1F3864;color:#fff;border:none;border-radius:10px;font-weight:700;cursor:pointer;font-family:inherit}
.ai-chat-send:disabled{opacity:0.5;cursor:wait}


/* ─── BLOCK 10 — СЛЕДУЮЩИЕ ШАГИ ─── */
.b10-section{padding:18px 16px;background:var(--surface);border-radius:var(--radius-lg);margin-bottom:12px}
.b10-headline{font-size:15px;font-weight:700;line-height:1.4;padding:14px;background:var(--surface-2);border-radius:var(--radius);margin-bottom:12px}
.b10-headline.green{background:rgba(34,197,94,0.12);color:#86efac}
.b10-headline.yellow{background:rgba(234,179,8,0.12);color:#fde68a}
.b10-headline.red{background:rgba(239,68,68,0.12);color:#fca5a5}

.b10-title{font-size:11px;font-weight:700;letter-spacing:0.12em;color:var(--text-3);text-transform:uppercase;margin-bottom:14px}

.b10-week{padding:12px 0;border-bottom:0.5px solid var(--surface-2)}
.b10-week:last-child{border-bottom:none}
.b10-week-range{display:inline-block;padding:3px 10px;background:var(--accent-dim);color:var(--accent);border-radius:12px;font-size:11px;font-weight:700;letter-spacing:0.06em;text-transform:uppercase;margin-bottom:6px}
.b10-week-title{font-size:14px;font-weight:700;margin-bottom:6px}
.b10-week-action{font-size:13px;color:var(--text-2);padding:3px 0 3px 14px;position:relative}
.b10-week-action:before{content:'•';color:var(--accent);position:absolute;left:2px}

.b10-cond{padding:12px 0;border-bottom:0.5px solid var(--surface-2)}
.b10-cond:last-child{border-bottom:none}
.b10-cond-num{display:inline-flex;align-items:center;justify-content:center;width:24px;height:24px;border-radius:50%;background:var(--yellow);color:#1a1a1a;font-size:12px;font-weight:800;margin-right:8px}
.b10-cond-title{font-size:14px;font-weight:700;margin-bottom:6px}
.b10-cond-opt{font-size:13px;color:var(--text-2);padding:3px 0 3px 14px;position:relative}
.b10-cond-opt:before{content:'•';color:var(--yellow);position:absolute;left:2px}

.b10-alt{padding:12px 0;border-bottom:0.5px solid var(--surface-2)}
.b10-alt:last-child{border-bottom:none}
.b10-alt-cat{display:inline-block;font-size:10px;font-weight:800;letter-spacing:0.12em;text-transform:uppercase;color:var(--red);margin-bottom:4px}
.b10-alt-title{font-size:14px;font-weight:700;margin-bottom:6px}
.b10-alt-opt{font-size:13px;color:var(--text-2);padding:3px 0 3px 14px;position:relative}
.b10-alt-opt:before{content:'→';color:var(--red);position:absolute;left:0}

.b10-upsell{margin-top:8px;padding:14px;border:1px solid var(--accent);border-radius:var(--radius);background:linear-gradient(135deg,rgba(124,108,255,0.14),rgba(124,108,255,0.05))}
.b10-upsell-title{font-size:14px;font-weight:700;color:var(--accent);margin-bottom:4px}
.b10-upsell-desc{font-size:13px;color:var(--text-2);line-height:1.5;margin-bottom:8px}
.b10-upsell-meta{font-size:12px;color:var(--text-3)}

.b10-cta{display:flex;flex-direction:column;gap:8px;margin-top:12px}
.b10-cta-btn{padding:14px 16px;border-radius:100px;font-size:14px;font-weight:700;text-align:center;cursor:pointer}
.b10-cta-btn.primary{background:var(--accent);color:#fff}
.b10-cta-btn.secondary{background:var(--surface-2);color:var(--text);border:1px solid var(--surface-3)}

.b10-farewell{padding:16px;background:var(--surface-2);border-radius:var(--radius);margin-top:12px;font-size:14px;line-height:1.6;color:var(--text-2)}

/* ─── Universal block container ─── */
.blk{padding:18px 16px;background:var(--surface);border-radius:var(--radius-lg);margin-bottom:12px}
.blk-h{font-size:11px;font-weight:700;letter-spacing:0.12em;color:var(--text-3);text-transform:uppercase;margin-bottom:14px}
.blk-row{display:flex;justify-content:space-between;padding:7px 0;font-size:13px;color:var(--text-2);border-bottom:0.5px solid var(--surface-2)}
.blk-row:last-child{border-bottom:none}
.blk-row strong{color:var(--text);font-family:var(--mono);font-weight:700}
.blk-hdr2{font-size:13px;font-weight:700;color:var(--text);margin:14px 0 8px}
.blk-note{font-size:13px;color:var(--text-2);line-height:1.55;padding:10px 12px;background:var(--bg);border-radius:var(--radius-sm);margin-top:8px}
.blk-pill{display:inline-block;padding:3px 10px;border-radius:12px;font-size:11px;font-weight:700;letter-spacing:0.04em;text-transform:uppercase}
.blk-pill.green{background:rgba(34,197,94,0.15);color:#86efac}
.blk-pill.yellow{background:rgba(234,179,8,0.15);color:#fde68a}
.blk-pill.orange{background:rgba(234,88,12,0.15);color:#fdba74}
.blk-pill.red{background:rgba(239,68,68,0.15);color:#fca5a5}

/* Распределение (horizontal bar) */
.bar-row{display:grid;grid-template-columns:40px 1fr 90px;align-items:center;gap:10px;padding:6px 0;font-size:13px}
.bar-row-pct{font-family:var(--mono);font-weight:700;color:var(--text-2);text-align:right;font-size:12px}
.bar-row-fill{height:18px;background:var(--surface-2);border-radius:4px;overflow:hidden;position:relative}
.bar-row-fill-inner{height:100%;background:var(--accent);border-radius:4px}
.bar-row-label{font-size:13px;color:var(--text-2);font-weight:500;display:flex;justify-content:space-between;gap:8px}
.bar-row-label span:last-child{font-family:var(--mono);font-weight:700;color:var(--text)}

/* Строка стресс-теста — двустрочная, чтобы длинные цифры не переносились. */
.stress-row{display:flex;flex-direction:column;gap:6px;padding:8px 0;border-bottom:0.5px solid var(--surface-2)}
.stress-row:last-child{border-bottom:none}
.stress-row-head{display:flex;align-items:baseline;gap:10px;font-size:13px}
.stress-row-label{flex:1;min-width:0;color:var(--text-2);font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.stress-row-value{font-family:var(--mono);font-weight:700;color:var(--text);white-space:nowrap}
/* Бар — визуально вторичный относительно цифры: тонкий (4px) и максимум 40% ширины. */
.stress-row-bar{height:4px;background:rgba(239,68,68,0.10);border-radius:2px;overflow:hidden;max-width:40%}
.stress-row-bar-inner{height:100%;border-radius:2px}

/* Строка юнит-экономики — двустрочная, чтобы «В карман вам 4 463» не переносилось. */
.unit-row{display:flex;flex-direction:column;gap:4px;padding:6px 0;border-bottom:0.5px solid var(--surface-2)}
.unit-row:last-child{border-bottom:none}
.unit-row-head{display:flex;align-items:baseline;gap:8px;font-size:13px}
.unit-row-pct{font-family:var(--mono);font-weight:700;color:var(--text-2);min-width:36px;text-align:right;font-size:12px}
.unit-row-label{flex:1;min-width:0;color:var(--text-2);font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.unit-row-amount{font-family:var(--mono);font-weight:700;color:var(--text);white-space:nowrap}
.unit-row-bar{height:6px;background:var(--surface-2);border-radius:3px;overflow:hidden;margin-left:44px}
.unit-row-bar-inner{height:100%;border-radius:3px}
.unit-breakeven-note{font-size:12px;color:var(--text-2);line-height:1.4;margin-top:8px;padding:8px 12px;background:rgba(255,255,255,0.03);border-radius:6px}

/* CAPEX-строка — двустрочная, чтобы длинные суммы (150 000) не обрезались. */
.capex-row{display:flex;flex-direction:column;gap:6px;padding:8px 0;border-bottom:0.5px solid var(--surface-2)}
.capex-row:last-child{border-bottom:none}
.capex-row-head{display:flex;align-items:baseline;gap:10px;font-size:13px}
.capex-row-pct{font-family:var(--mono);font-weight:700;color:var(--text-2);font-size:12px;min-width:36px;text-align:right}
.capex-row-label{flex:1;min-width:0;color:var(--text-2);font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.capex-row-amount{font-family:var(--mono);font-weight:700;color:var(--text);white-space:nowrap}
.capex-row-bar{height:6px;background:var(--surface-2);border-radius:3px;overflow:hidden;margin-left:46px}
.capex-row-bar-inner{height:100%;background:var(--accent);border-radius:3px}

/* Scenarios mini-chart (block 7) */
.sc-chart{display:grid;grid-template-columns:repeat(24,1fr);gap:2px;align-items:flex-end;height:100px;padding:10px 0;border-bottom:1px solid var(--surface-2);border-top:1px solid var(--surface-2)}
.sc-bar{background:var(--accent);border-radius:1px;min-height:2px;opacity:0.85}
.sc-bar.neg{background:var(--red)}
.sc-legend{display:flex;gap:14px;font-size:11px;color:var(--text-3);margin-top:8px}
.sc-legend .dot{width:10px;height:10px;border-radius:50%;display:inline-block;margin-right:4px;vertical-align:middle}
/* Блок сезонности */
.ssn-chart{display:grid;grid-template-columns:repeat(12,1fr);gap:4px;align-items:end;padding:6px 0 2px}
.ssn-col{display:flex;flex-direction:column;align-items:center;gap:4px}
.ssn-bar-wrap{width:100%;height:90px;display:flex;align-items:flex-end;justify-content:center}
.ssn-bar{width:100%;border-radius:3px 3px 0 0;min-height:4px}
.ssn-pct{font-family:var(--mono);font-size:10px;color:var(--text-2);font-weight:700}
.ssn-mo{font-size:10px;color:var(--text-3);text-transform:lowercase}

/* Блок «Ваши первые 12 месяцев» (first_year_chart). 4 цвета столбиков:
   ramp (серый, разгон), mature (зелёный, норма), mature_high (яркий
   зелёный, сезонный пик), season_low (жёлтый, просадка). */
.fyc-chart{display:grid;grid-template-columns:repeat(12,1fr);gap:4px;align-items:end;padding:6px 0 2px}
.fyc-col{display:flex;flex-direction:column;align-items:center;gap:4px}
.fyc-bar-wrap{width:100%;height:110px;display:flex;align-items:flex-end;justify-content:center}
.fyc-bar{width:100%;border-radius:3px 3px 0 0;min-height:4px}
.fyc-bar.ramp{background:#94a3b8}
.fyc-bar.mature{background:#10b981}
.fyc-bar.mature_high{background:#059669}
.fyc-bar.season_low{background:#f59e0b}
.fyc-mo{font-size:10px;color:var(--text-3);text-transform:lowercase}
.fyc-narrative{font-size:13px;color:var(--text-2);line-height:1.5;margin-top:10px;padding:8px 12px;background:rgba(255,255,255,0.03);border-radius:6px}
.fyc-legend{display:flex;flex-wrap:wrap;gap:10px;margin-top:10px;font-size:11px;color:var(--text-3)}
.fyc-legend-item{display:flex;align-items:center;gap:6px}
.fyc-legend-dot{width:10px;height:10px;border-radius:2px}

/* Risks (block 9) */
.risk-item{padding:12px 0;border-bottom:0.5px solid var(--surface-2)}
.risk-item:last-child{border-bottom:none}
.risk-head{display:flex;align-items:center;gap:10px;margin-bottom:6px}
.risk-num{font-family:var(--mono);font-weight:700;color:var(--text-3);font-size:13px}
.risk-title{font-size:14px;font-weight:700;flex:1}
.risk-meta{font-size:11px;color:var(--text-3);margin-bottom:6px;letter-spacing:0.03em}
.risk-text{font-size:13px;color:var(--text-2);line-height:1.55;margin-bottom:6px}
.risk-mitigation{font-size:12px;color:var(--text-2);line-height:1.5;padding:8px 10px;background:var(--bg);border-left:3px solid var(--green);border-radius:4px}

.search-in{background:var(--surface);border-radius:var(--radius-sm);padding:10px 14px;margin-bottom:12px}
.search-in input{width:100%;background:transparent;border:none;outline:none;color:var(--text);font-size:15px}
</style>
</head>
<body>

<div class="top-bar">
  <button class="back-btn" id="back-btn" onclick="goBack()">
    <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
    Назад
  </button>
  <div class="brand"><strong>ZEREK</strong> · Экспресс-оценка</div>
  <div style="width:60px"></div>
</div>

<div class="progress-bar"><div class="progress-fill" id="progress-fill" style="--p:0"></div></div>
<div class="progress-text"><span id="progress-step">Шаг 1</span><span id="progress-total">из 8</span></div>

<div id="wizard-screen"></div>
<div id="loading-screen">
  <div class="spinner"></div>
  <div class="loading-title">Запускаем расчёт…</div>
  <div class="loading-sub">Это займёт до 10 секунд.</div>
</div>
<div id="result-screen"></div>

<!-- CTA-кнопка убрана: переход по клику на опцию. Для шагов с вводом (capital, confirm) рендерится inline-кнопка. -->
<div class="cta-wrap" id="cta-wrap" style="display:none"></div>

<script>
var API = 'https://web-production-921a5.up.railway.app';
function $(id){ return document.getElementById(id); }
// R8 (post-comment): бакетное округление как в PDF money_round
// (api/services/capital_service.py:_fmt_kzt). Раньше Mini App
// показывал 306 532 ₸/мес vs 307 000 ₸/мес в PDF — теперь оба
// округляют одинаково. Бакеты:
//   <1K → 10, <10K → 100, <100K → 500, <1M → 1 000, >1M → 10 000.
// Точные суммы кратные бакету (586 000) не меняются.
function fmt(n){
  if(n==null||isNaN(n)) return '—';
  var v = Math.abs(n);
  var step;
  if(v < 1000) step = 10;
  else if(v < 10000) step = 100;
  else if(v < 100000) step = 500;
  else if(v < 1000000) step = 1000;
  else step = 10000;
  var sign = n < 0 ? -1 : 1;
  var rounded = sign * Math.round(v / step) * step;
  return rounded.toLocaleString('ru-RU').replace(/,/g,' ');
}
function escapeHtml(s){ return String(s||'').replace(/[&<>"']/g, function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];}); }

function apiGet(path, cb){
  var x=new XMLHttpRequest(); x.open('GET', API+path, true); x.timeout=30000;
  x.onload=function(){ try{ cb(null, JSON.parse(x.responseText)); }catch(e){ cb(e); } };
  x.onerror=function(){ cb(new Error('network')); };
  x.ontimeout=function(){ cb(new Error('timeout')); };
  x.send();
}
function apiPost(path, body, cb){
  var x=new XMLHttpRequest(); x.open('POST', API+path, true);
  x.setRequestHeader('Content-Type','application/json'); x.timeout=60000;
  x.onload=function(){ try{ cb(null, JSON.parse(x.responseText)); }catch(e){ cb(e, x.responseText); } };
  x.onerror=function(){ cb(new Error('network')); };
  x.ontimeout=function(){ cb(new Error('timeout')); };
  x.send(JSON.stringify(body));
}
try { if (window.Telegram && window.Telegram.WebApp) { var tg=window.Telegram.WebApp; tg.ready && tg.ready(); tg.expand && tg.expand(); } } catch(e){}

var QC = {
  niche_id:'', niche_name:'', archetype:'', icon:'',
  format_id:'', format_name:'', format_type:'', class_level:'',
  city_id:'', city_name:'',
  loc_type:'', location_line:'',
  experience:'',
  // R12.5: уровень формата (simple/nice для STUDIO, standard/premium для
  // SALON_RENT). Пустая строка — авто-выбор на бэке (_resolve_r12_level).
  level:'',
  // R12.5: маркетинг-стратегия. По умолчанию 'middle'. Влияет на бюджет
  // и на скорость выхода на потолок (ramp_curve в A1 архетипе).
  strategy:'',
  payroll_type:'', entrepreneur_role:'',
  capital_own:null, capital_needed:null,
  // Месяц старта (1=янв..12=дек). Null до выбора клиентом → валидация 400 на backend.
  start_month: null,
};
var Configs = null;
var Cities = [];
var FormatsByNiche = {};
var NicheSurvey = null;
var StepPlan = [];
var stepIndex = 0;

function init(){
  var pending = 2, firstErr = null;
  apiGet('/configs', function(err, data){
    if(err) firstErr = err; else Configs = data || {};
    if(--pending === 0) finish();
  });
  apiGet('/cities', function(err, data){
    if(err) firstErr = firstErr || err; else Cities = (data && data.cities) || [];
    if(--pending === 0) finish();
  });
  function finish(){
    if(firstErr){ return showError('Не удалось загрузить данные: ' + firstErr.message); }
    StepPlan = computeStepPlan();
    renderStep();
  }
}

function computeStepPlan(){
  var plan = ['niche'];
  if(!QC.niche_id) return plan;
  plan.push('format');
  if(!QC.format_id) return plan;
  plan.push('city');
  if(!QC.city_id) return plan;
  var ft = QC.format_type;
  // Локация показывается только когда юзер реально выбирает:
  //   - KIOSK: выбор из 4 вариантов
  //   - STANDARD: выбор из allowed_locations
  // Для SOLO/HOME/MOBILE/HIGHWAY/PRODUCTION — loc_type уже проставлен из формата, шаг скрыт.
  if(ft === 'KIOSK' || ft === 'STANDARD'){
    plan.push('location');
  }
  plan.push('experience');
  if(!QC.experience) return plan;
  // R12.5: для соло-beauty (архетип A1) добавляем шаги уровня и стратегии.
  // - level: только для STUDIO (нынешний format_type=STANDARD) и SALON_RENT
  //   (нынешний format_type=SOLO). HOME без уровней.
  // - strategy: для всех A1 форматов.
  if(QC.archetype === 'A1'){
    if(ft === 'STANDARD' || ft === 'SOLO'){
      plan.push('level');
      if(!QC.level) return plan;
    }
    plan.push('strategy');
    if(!QC.strategy) return plan;
  }
  if(['SOLO','HOME'].indexOf(ft) === -1 && hasStaff()){
    plan.push('payroll');
    plan.push('role');
  }
  plan.push('capital');
  plan.push('start_month');
  plan.push('confirm');
  return plan;
}

function hasStaff(){
  if(!NicheSurvey || !NicheSurvey.selected_format) return false;
  return (NicheSurvey.selected_format.typical_staff || []).length > 0;
}

function renderStep(){
  updateProgress();
  var name = StepPlan[stepIndex];
  $('wizard-screen').style.display = 'block';
  $('loading-screen').classList.remove('active');
  $('result-screen').classList.remove('active');
  $('cta-wrap').style.display = 'none';  // CTA по умолчанию скрыт; рендереры сами добавляют inline-кнопку когда нужна
  // Кнопка «Назад» активна всегда. На шаге 0 уводит из оценки —
  // history.back() возвращает в Academy SPA / Telegram, или
  // Telegram.WebApp.close() закрывает Mini App если истории нет.
  $('back-btn').disabled = false;
  var fn = RENDERERS[name] || function(root){ root.innerHTML = '<div class="result-err">Шаг «'+name+'» не реализован.</div>'; };
  fn($('wizard-screen'));
}

/** advance() — переходит к следующему шагу (рассчитанному по текущему QC). */
function advance(){
  StepPlan = computeStepPlan();
  stepIndex += 1;
  if(stepIndex >= StepPlan.length) stepIndex = StepPlan.length - 1;
  renderStep();
}

function updateProgress(){
  var total = StepPlan.length;
  var p = stepIndex / Math.max(1, total-1);
  $('progress-fill').style.setProperty('--p', p);
  $('progress-step').textContent = 'Шаг ' + (stepIndex+1);
  $('progress-total').textContent = 'из ' + total;
}
function goBack(){
  if(stepIndex > 0){
    stepIndex -= 1;
    renderStep();
    return;
  }
  // На шаге 0 — выходим из оценки. Если есть history (открыты из
  // Academy SPA app.html) — возвращаемся туда. Иначе закрываем
  // Mini App через Telegram.WebApp.close().
  if(window.history.length > 1){
    window.history.back();
    return;
  }
  var tg = window.Telegram && window.Telegram.WebApp;
  if(tg && typeof tg.close === 'function'){ tg.close(); }
}

function loadNicheSurvey(cb){
  // Показываем мини-лоадер поверх wizard
  $('wizard-screen').innerHTML = '<div class="step"><div class="spinner" style="margin:40px auto"></div>' +
    '<div style="text-align:center;color:var(--text-2)">Загружаем параметры формата…</div></div>';
  apiGet('/quickcheck-survey/' + QC.niche_id + '?format_id=' + encodeURIComponent(QC.format_id), function(err, data){
    if(err){ NicheSurvey = null; return showError('Не удалось загрузить: ' + err.message); }
    NicheSurvey = data;
    cb();
  });
}

function showError(msg){
  $('wizard-screen').innerHTML = '<div class="result-err">'+escapeHtml(msg)+'</div>';
  $('cta-wrap').style.display = 'none';
}
function needsLocationChoice(){
  var ft = QC.format_type;
  return ['KIOSK','STANDARD'].indexOf(ft) !== -1;
}
function needsLine(){
  if(!QC.loc_type || QC.class_level === 'премиум') return false;
  var lm = (Configs && Configs.locations && Configs.locations.line_modifier) || {};
  var enabled = lm.enabled_for_locations || [];
  return enabled.indexOf(QC.loc_type) !== -1;
}

var RENDERERS = {};

RENDERERS.niche = function(root){
  var niches = (Configs.niches && Configs.niches.niches) || {};
  var cats = (Configs.niches && Configs.niches.categories) || {};
  var byCat = {};
  Object.keys(niches).forEach(function(nid){
    var n = niches[nid]; var c = n.category || 'other';
    if(!byCat[c]) byCat[c] = [];
    byCat[c].push({id:nid, name:n.name_rus, icon:n.icon, archetype:n.archetype});
  });
  var catOrder = Object.keys(cats).sort(function(a,b){ return (cats[a].order||99)-(cats[b].order||99); });
  catOrder = catOrder.filter(function(c){ return byCat[c]; });
  Object.keys(byCat).forEach(function(c){ if(catOrder.indexOf(c) === -1) catOrder.push(c); });

  var html = '<div class="step">' +
    '<div class="step-kicker">Ниша</div>' +
    '<h2>Какой бизнес открываете?</h2>' +
    '<div id="niche-list">';
  catOrder.forEach(function(c){
    var m = cats[c] || {};
    html += '<div class="category">'+escapeHtml(m.label_rus||c)+'</div>';
    byCat[c].forEach(function(n){
      var sel = (QC.niche_id === n.id) ? ' selected' : '';
      html += '<div class="opt niche-opt'+sel+'" data-name="'+escapeHtml(n.name.toLowerCase())+'" onclick="selectNiche(\''+n.id+'\')">' +
        '<div class="opt-icon">'+(n.icon||'📋')+'</div>' +
        '<div><div class="opt-label">'+escapeHtml(n.name)+'</div></div>' +
      '</div>';
    });
  });
  html += '</div></div>';
  root.innerHTML = html;
};
function selectNiche(nid){
  QC.niche_id = nid;
  var n = (Configs.niches.niches||{})[nid] || {};
  QC.niche_name = n.name_rus || nid;
  QC.archetype = n.archetype || '';
  QC.icon = n.icon || '';
  QC.format_id = ''; QC.format_type = ''; QC.class_level = '';
  QC.loc_type = ''; QC.location_line = '';
  NicheSurvey = null;
  advance();
}
function filterNiches(q){
  q = (q||'').trim().toLowerCase();
  document.querySelectorAll('.niche-opt').forEach(function(el){
    var n = el.getAttribute('data-name') || '';
    el.style.display = (!q || n.indexOf(q) !== -1) ? '' : 'none';
  });
}

RENDERERS.format = function(root){
  if(FormatsByNiche[QC.niche_id]){
    renderFormatList(root, FormatsByNiche[QC.niche_id]);
    return;
  }
  root.innerHTML = '<div class="step"><div class="step-kicker">Формат</div><h2>Загружаем форматы…</h2></div>';
  apiGet('/formats-v2/' + QC.niche_id, function(err, data){
    if(err){ showError('Не удалось загрузить форматы: ' + err.message); return; }
    FormatsByNiche[QC.niche_id] = (data && data.formats) || [];
    renderFormatList(root, FormatsByNiche[QC.niche_id]);
  });
};
function renderFormatList(root, fmts){
  var locsMeta = (Configs.locations && Configs.locations.locations) || {};
  var html = '<div class="step">' +
    '<div class="step-kicker">Формат</div>' +
    '<h2>Выберите формат</h2>' +
    '<div class="step-desc">Формат определяет масштаб, стартовые вложения и типовой штат.</div>' +
    '<div class="options">';
  fmts.forEach(function(f){
    var sel = (QC.format_id === f.format_id) ? ' selected' : '';
    var staffCnt = (f.typical_staff || []).reduce(function(a,s){ return a+(s.count||0); }, 0);
    var staffText = staffCnt > 0 ? staffCnt + ' сотр.' : 'работаете сами';
    var extra = [];
    if(f['class']) extra.push(f['class']);
    if(f.area_m2 > 0) extra.push(Math.round(f.area_m2) + ' м²');
    extra.push(staffText);
    var locHint = '';
    if(f.format_type === 'HIGHWAY') locHint = '🛣️ Трасса';
    else if(f.format_type === 'PRODUCTION') locHint = '🏭 Промзона';
    else if(f.format_type === 'KIOSK') locHint = '🏬 ТЦ / БЦ';
    else if(f.format_type === 'HOME') locHint = '🏠 Из дома';
    else if(f.format_type === 'MOBILE') locHint = '🚚 Выезд';
    else if(f.format_type === 'SOLO') locHint = '💼 Аренда в салоне';
    else if(f.allowed_locations && f.allowed_locations[0]){
      var ll = locsMeta[f.allowed_locations[0]];
      if(ll) locHint = '📍 ' + ll.label_rus;
    }
    html += '<div class="opt'+sel+'" onclick="selectFormat(\''+f.format_id+'\')">' +
      '<div class="opt-icon">📐</div>' +
      '<div style="flex:1"><div class="opt-label">'+escapeHtml(f.format_name)+'</div>' +
      '<div class="opt-sub">Стартовые вложения ≈ '+fmt(f.capex_standard)+' ₸ · ' + extra.join(' · ') + '</div>' +
      (locHint ? '<span class="opt-badge">'+locHint+'</span>' : '') +
      '</div></div>';
  });
  html += '</div></div>';
  root.innerHTML = html;
}
function selectFormat(fid){
  var f = (FormatsByNiche[QC.niche_id] || []).find(function(x){ return x.format_id === fid; });
  if(!f) return;
  QC.format_id = fid; QC.format_name = f.format_name;
  QC.format_type = f.format_type || 'STANDARD';
  QC.class_level = f['class'] || '';
  if(f.format_type === 'HIGHWAY') QC.loc_type = 'highway';
  else if(f.format_type === 'PRODUCTION') QC.loc_type = 'industrial';
  else if(f.format_type === 'SOLO') QC.loc_type = 'rent_in_salon';
  else if(f.format_type === 'HOME') QC.loc_type = 'home';
  else if(f.format_type === 'MOBILE') QC.loc_type = 'mobile';
  else QC.loc_type = '';
  QC.location_line = '';
  // После выбора формата — подгружаем survey (для entrepreneur_roles), затем advance.
  loadNicheSurvey(function(){ advance(); });
}

RENDERERS.city = function(root){
  var html = '<div class="step">' +
    '<div class="step-kicker">Город</div>' +
    '<h2>В каком городе?</h2>' +
    '<div class="step-desc">От города зависят аренда, налоги и конкуренция.</div>' +
    '<div class="options">';
  Cities.forEach(function(c){
    var sel = (QC.city_id === c.city_id) ? ' selected' : '';
    var name = c['Город'] || c.city_id;
    var safe = escapeHtml(name).replace(/\\/g,'\\\\').replace(/'/g,"\\'");
    html += '<div class="opt'+sel+'" onclick="selectCity(\''+c.city_id+'\',\''+safe+'\')">' +
      '<div class="opt-icon">📍</div>' +
      '<div class="opt-label">'+escapeHtml(name)+'</div>' +
    '</div>';
  });
  html += '<div class="opt" onclick="selectCity(\'OTHER\',\'Другой город\')">' +
    '<div class="opt-icon">🗺️</div>' +
    '<div class="opt-label">Другой город Казахстана</div>' +
  '</div></div></div>';
  root.innerHTML = html;
};
function selectCity(cid, cname){ QC.city_id = cid; QC.city_name = cname; advance(); }

RENDERERS.location = function(root){
  // В StepPlan location есть только для KIOSK/STANDARD. Остальные (HIGHWAY/PRODUCTION/SOLO/HOME/MOBILE)
  // уже проставлены из формата и этот шаг пропущен.
  var fmt = NicheSurvey && NicheSurvey.selected_format;
  var ft = QC.format_type;
  var locsMeta = (Configs.locations && Configs.locations.locations) || {};

  // Если уже выбрана локация и нужна линия — рендерим режим выбора линии
  if(QC.loc_type && needsLine() && !QC.location_line){
    var lines = (Configs.locations.line_modifier && Configs.locations.line_modifier.lines) || {};
    var mSel = locsMeta[QC.loc_type] || {};
    var htmlL = '<div class="step">' +
      '<div class="step-kicker">Линия</div>' +
      '<h2>Какая линия у помещения?</h2>' +
      '<div class="step-desc">Локация: '+escapeHtml(mSel.label_rus||QC.loc_type)+'. 2-я линия дешевле, но с меньшим трафиком.</div>' +
      '<div class="radio-group">';
    ['line_1','line_2'].forEach(function(lid){
      var lm = lines[lid] || {};

function submit(){
  $('wizard-screen').style.display = 'none';
  $('cta-wrap').style.display = 'none';
  $('loading-screen').classList.add('active');

  var clsMap = {'эконом':'Эконом','стандарт':'Стандарт','премиум':'Премиум'};
  var capexLevel = (QC.class_level || 'стандарт').toLowerCase();
  var body = {
    city_id: QC.city_id === 'OTHER' ? 'ALMATY' : QC.city_id,
    niche_id: QC.niche_id,
    format_id: QC.format_id,
    cls: clsMap[capexLevel] || 'Стандарт',
    capex_level: capexLevel,
    area_m2: (NicheSurvey && NicheSurvey.selected_format && NicheSurvey.selected_format.area_m2) || 0,
    loc_type: QC.loc_type,
    capital: QC.capital_own || QC.capital_needed || 0,
    start_month: QC.start_month,
    staff_mode: (QC.entrepreneur_role && QC.entrepreneur_role !== 'owner_only') ? 'self' : 'hired',
    specific_answers: {
      location_line: QC.location_line, experience: QC.experience,
      // R12.5: новые поля анкеты — уровень формата (для STUDIO/SALON_RENT)
      // и маркетинг-стратегия. Бэкенд в _resolve_r12_level умеет
      // авто-выбирать level если он не задан. strategy по умолчанию 'middle'.
      level: QC.level || null,
      strategy: QC.strategy || 'middle',
      payroll_type: QC.payroll_type, entrepreneur_role: QC.entrepreneur_role,
      capital_own: QC.capital_own, capital_needed: QC.capital_needed,
      archetype: QC.archetype, format_type: QC.format_type,
    },
  };
  window._lastBody = body;
  apiPost('/quick-check', body, function(err, resp, raw){
    $('loading-screen').classList.remove('active');
    if(err){ return showResultError('Ошибка расчёта: ' + err.message + (raw ? '\n' + raw : '')); }
    renderResult(resp && resp.result);
  });
}

function renderResult(result){
  window._lastResult = result;
  $('result-screen').classList.add('active');
  $('cta-wrap').style.display = 'none';
  if(!result){ return showResultError('Пустой ответ от API.'); }

  // Порядок блоков: сначала данные (паспорт → рынок → юнит-эко → P&L →
  // траектория/сезонность → стресс → риски → капитал), затем итоговый
  // светофор-вердикт (block1) и следующие шаги / апсейл (block10).
  // Клиент сначала читает все цифры, потом видит вывод.
  if(result.block1){
    var html = '';
    if(result.block2)  html += renderBlock2Html(result.block2);
    // Верхняя кнопка «Скачать PDF» — сразу после паспорта бизнеса.
    // Клиент заплатил 5 000 ₸ и должен сразу видеть, что отчёт готов
    // к скачиванию, не листая до самого конца.
    html += pdfTopCardHtml();
    if(result.block3)  html += renderBlock3Html(result.block3);
    if(result.block4)  html += renderBlock4Html(result.block4);
    if(result.block5)  html += renderBlock5Html(result.block5);
    // Блок «А что дальше?» (2 сценария + факторы роста + CTA) — после
    // дохода предпринимателя, до инфографики 12 месяцев.
    if(result.growth_scenarios) html += renderGrowthBlockHtml(result.growth_scenarios);
    // Персонализированный прогноз 12 мес (ramp + сезонность × start_month)
    // идёт ПЕРЕД общей сезонностью ниши — сначала конкретика, потом
    // эталонная картина.
    var fyc = result.block5 && result.block5.first_year_chart;
    if(fyc) html += renderFirstYearChartHtml(fyc);
    // Зона риска: разгон + сезонность — после инфографики 12 мес,
    // до стресс-теста. Рендерится только если has_cashflow_risk=True.
    if(result.danger_zone) html += renderDangerZoneHtml(result.danger_zone);
    if(result.block_season) html += renderSeasonBlockHtml(result.block_season);
    if(result.block8)  html += renderBlock8Html(result.block8);
    if(result.block9)  html += renderBlock9Html(result.block9);
    if(result.block6)  html += renderBlock6Html(result.block6);
    // Маркетинг-план: архетип + помесячный бюджет. Идёт перед блоком
    // «Достаточность капитала» — показывает сколько реально нужно на рекламу.
    if(result.marketing_plan) html += renderMarketingPlanHtml(result.marketing_plan);
    // «Парадокс штата» — потолок мастера + стратегии роста. Только для
    // beauty-архетипа A1; в render-цепочке после маркетинга, до капитала.
    if(result.staff_paradox) html += renderStaffParadoxHtml(result.staff_paradox);
    // Блок «Достаточность капитала» — сразу после CAPEX breakdown.
    // Заменяет примитивное «капитал хватает на CAPEX ✅» на 3 уровня
    // (минимум / комфортно / безопасно) + персональный вердикт.
    if(result.capital_adequacy) html += renderCapitalAdequacyHtml(result.capital_adequacy);
    html += renderBlock1Html(result.block1);
    html += pdfHeroHtml();
    html += pdfDiscussAiHtml();
    if(result.block10) html += renderBlock10Html(result.block10);
    $('result-screen').innerHTML = html;
    return;
  }
  // fallback
  var kpis = extractKpis(result);
  $('result-screen').innerHTML =
    '<div class="b1-section">' +
      '<div class="b1-metrics"><div class="b1-metric"><div class="b1-metric-label">Выручка/мес</div><div class="b1-metric-val">'+kpis.revenue+'</div></div>' +
      '<div class="b1-metric"><div class="b1-metric-label">Прибыль/мес</div><div class="b1-metric-val">'+kpis.profit+'</div></div></div>' +
    '</div>';
}

/* ─── Block 2 — Паспорт бизнеса ─── */

        '<div class="b2-role-ic">⭐</div>' +

          '<div class="b2-role-desc">'+escapeHtml((b2.entrepreneur_role||{}).description_rus||'')+'</div>' +
        '</div>' +
      '</div>' +
    '</div>';
  }

  // Секция финансов
  var fin = b2.finance || {};
  var status = fin.capital_diff_status;
  var diffVal = fin.capital_diff;
  var diffLabel = '', diffClass = '';
  if(status === 'surplus'){
    diffLabel = '+' + fmt(diffVal) + ' ₸ профицит';
    diffClass = 'surplus';
  } else if(status === 'deficit' || status === 'critical_deficit'){
    diffLabel = fmt(Math.abs(diffVal)) + ' ₸ дефицит';
    diffClass = status === 'critical_deficit' ? 'critical' : 'deficit';
  } else if(status === 'match'){
    diffLabel = 'точно в бюджете';
    diffClass = 'surplus';
  }

  var finRows = '<div class="b2-fin">';
  if(fin.capital_own != null){

    finRows += '<div class="b2-fin-row"><span class="b2-fin-label">Ваш капитал</span>' +
               '<span class="b2-fin-val" style="color:var(--text-3)">не указан</span></div>';
  }
  if(fin.capex_needed){
    finRows += '<div class="b2-fin-row"><span class="b2-fin-label">Нужно для формата</span>' +
               '<span class="b2-fin-val">'+fmt(fin.capex_needed)+' ₸</span></div>';
  }
  if(diffLabel){
    finRows += '<div class="b2-fin-row"><span class="b2-fin-label">Разница</span>' +
               '<span class="b2-fin-val '+diffClass+'">'+escapeHtml(diffLabel)+'</span></div>';
  }
  if(b2.payroll_type_rus && b2.payroll_type_rus !== '—'){
    finRows += '<div class="b2-fin-row"><span class="b2-fin-label">Оплата сотрудникам</span>' +
               '<span class="b2-fin-val" style="font-family:var(--sans);font-weight:600">'+escapeHtml(b2.payroll_type_rus)+'</span></div>';
  }
  if(b2.experience_rus && b2.experience_rus !== '—'){
    finRows += '<div class="b2-fin-row"><span class="b2-fin-label">Опыт в нише</span>' +
               '<span class="b2-fin-val" style="font-family:var(--sans);font-weight:600">'+escapeHtml(b2.experience_rus)+'</span></div>';
  }
  finRows += '</div>';

  // Критические плашки
  if(status === 'critical_deficit'){
    finRows += '<div class="b2-critical-note"><strong>⚠️ Критичный дефицит капитала.</strong> Рассмотрите альтернативный формат или дополнительное финансирование.</div>';
  } else if(fin.capital_own == null){
    finRows += '<div class="b2-match-note">Капитал не указан — оценка рассчитана по средним данным для такого бизнеса в РК.</div>';
  }

  return '<div class="b2-section">' +
      '<div class="b2-title">Паспорт вашего бизнеса</div>' +
      nicheBlock + metaRows +
    '</div>' +
    '<div class="b2-section">' + staffBlock + '</div>' +
    '<div class="b2-section"><div class="b2-title">Финансовые параметры</div>' + finRows + '</div>';
}

    if(b10.cta_buttons && b10.cta_buttons.length){

function renderBlock3Html(b3){
  if(!b3) return '';
  // HOME-форматы: 2GIS и агрегаторы не отражают рынок мастеров на дому.
  // Показываем короткую заметку про Instagram/TikTok, без баров плотности.
  if(b3.type === 'home_market_note'){
    return '<div class="blk"><div class="blk-h">Рынок и конкуренты</div>' +
      '<div class="blk-note">' + escapeHtml(b3.message || '') + '</div>' +
    '</div>';
  }
  var s = b3.saturation || {};
  var af = b3.affordability || {};
  var satPct = Math.min(s.pct_of_benchmark || 0, 200);
  var html = '<div class="blk"><div class="blk-h">Рынок и конкуренты · '+escapeHtml(b3.city||'')+'</div>' +
    '<div class="blk-hdr2">Насыщенность рынка</div>' +
    '<div class="blk-row"><span>Конкурентов в нише</span><strong>'+s.competitors_count+'</strong></div>' +
    '<div class="blk-row"><span>На 10 000 жителей</span><strong>'+s.density_city+'</strong></div>' +
    '<div class="blk-row"><span>Средняя плотность по РК</span><strong>'+s.density_benchmark+'</strong></div>' +
    '<div style="margin:14px 0 6px"><div class="bar-row-fill" style="height:12px"><div class="bar-row-fill-inner" style="width:'+satPct+'%;background:'+barColor(s.color)+'"></div></div></div>' +
    '<div style="text-align:right;font-size:11px;color:var(--text-3)">'+s.pct_of_benchmark+'% от средних данных по РК</div>' +
    '<div class="blk-note" style="margin-top:10px"><span class="blk-pill '+(s.color||'yellow')+'">'+ (s.color==='green'?'Недонасыщен':s.color==='yellow'?'Норма':s.color==='orange'?'Перенасыщен':'Критично') +'</span> '+escapeHtml(s.text_rus||'')+'</div>';
  if(b3.competitors_list && b3.competitors_list.length){
    html += '<div class="blk-hdr2">Топ конкуренты</div>';
    b3.competitors_list.forEach(function(c, i){
      html += '<div class="blk-row"><span>#'+(i+1)+' '+escapeHtml(c.name||'')+(c.district?' · '+escapeHtml(c.district):'')+'</span>' +
              '<strong>'+(c.rating||'—')+'★ '+(c.reviews?'· '+c.reviews+' отз.':'')+'</strong></div>';
    });
  }
  html += '<div class="blk-hdr2">Платёжеспособный спрос</div>' +
    '<div class="blk-row"><span>Коэффициент города</span><strong>'+af.city_coef+'</strong></div>' +
    '<div class="blk-note">'+escapeHtml(af.text_rus||'')+'</div>';
  return html + '</div>';
}
function barColor(c){
  return {green:'var(--green)', yellow:'var(--yellow)', orange:'#fb923c', red:'var(--red)'}[c] || 'var(--accent)';
}

/* ─── Block 4 — Юнит-экономика ─── */
function renderBlock4Html(b4){
  if(!b4) return '';
  var m = b4.metrics || {};
  var avg = b4.avg_check || 0;
  var html = '<div class="blk"><div class="blk-h">Юнит-экономика · '+escapeHtml(b4.unit_label||'')+'</div>';

  // Метрики разные по архетипу — покажем ключевые
  if(m.avg_check){ html += '<div class="blk-row"><span>Средний чек / юнит</span><strong>'+fmt(m.avg_check)+' ₸</strong></div>'; }
  if(m.checks_per_day){
    var cpdLabel = m.checks_per_day_note ? ('Чеков в смену ('+m.checks_per_day_note+')') : 'Чеков в смену';
    html += '<div class="blk-row"><span>'+cpdLabel+'</span><strong>'+m.checks_per_day+'</strong></div>';
    if(m.max_checks_per_day){
      html += '<div class="blk-row"><span>Максимум при 100% загрузке</span><strong>'+m.max_checks_per_day+'</strong></div>';
    }
  }
  // Строка «Загрузка» убрана (пункт 23 финального раунда) — клиенту
  // релевантны только «Средний чек», «Чеков в смену», «Максимум», «Валовая».
  if(m.gross_revenue_per_unit){ html += '<div class="blk-row"><span>Валовая выручка</span><strong>'+fmt(m.gross_revenue_per_unit)+' ₸/мес</strong></div>'; }
  if(m.ltv){ html += '<div class="blk-row"><span>LTV клиента</span><strong>'+fmt(m.ltv)+' ₸</strong></div>'; }
  if(m.cac){ html += '<div class="blk-row"><span>CAC</span><strong>'+fmt(m.cac)+' ₸</strong></div>'; }
  if(m.ltv_cac_ratio){ html += '<div class="blk-row"><span>LTV / CAC</span><strong>'+m.ltv_cac_ratio+'</strong></div>'; }
  if(m.occupancy_pct){ html += '<div class="blk-row"><span>Заполняемость</span><strong>'+m.occupancy_pct+'%</strong></div>'; }

  // Распределение одного чека — двустрочная вёрстка, чтобы длинные
  // названия типа «В карман вам» + сумма не ломались на мобильных 320px.
  if((b4.breakdown||[]).length){
    html += '<div class="blk-hdr2">Куда уходят деньги с одного '+(b4.unit_label||'чека')+'</div>';
    b4.breakdown.forEach(function(it){
      var pct = it.pct||0;
      var color = (it.label === 'Бизнесу' || it.label === 'Чистыми вам') ? 'var(--green)' : 'var(--accent)';
      html += '<div class="unit-row">' +
        '<div class="unit-row-head">' +
          '<div class="unit-row-pct">'+pct+'%</div>' +
          '<div class="unit-row-label">'+escapeHtml(it.label)+'</div>' +
          '<div class="unit-row-amount">'+fmt(it.amount)+' ₸</div>' +
        '</div>' +
        '<div class="unit-row-bar"><div class="unit-row-bar-inner" style="width:'+pct+'%;background:'+color+'"></div></div>' +
      '</div>';
    });
  }

  // Breakeven
  html += '<div class="blk-hdr2">Точка безубыточности</div>' +
    (m.breakeven_label ? '<div class="blk-row"><span>Минимум</span><strong>'+escapeHtml(m.breakeven_label)+'</strong></div>' : '') +
    (m.planned_label   ? '<div class="blk-row"><span>Планируется</span><strong>'+escapeHtml(m.planned_label)+'</strong></div>' : '') +
    (m.safety_margin   ? '<div class="blk-row"><span>Запас прочности</span><strong>×'+m.safety_margin+'</strong></div>' : '') +
    (m.breakeven_label ? '<div class="unit-breakeven-note">Это минимум услуг в месяц, чтобы покрыть все расходы и выйти в ноль. Всё, что больше — ваша прибыль.</div>' : '');

  return html + '</div>';
}

/* ─── Block 6 — Стартовый капитал ─── */
function renderBlock6Html(b6){
  if(!b6) return '';
  var html = '<div class="blk"><div class="blk-h">Структура стартовых вложений</div>';
  html += '<div class="blk-row"><span>Нужно для формата</span><strong>'+fmt(b6.capex_needed)+' ₸</strong></div>';

  // Структура — двустрочная вёрстка, чтобы суммы не обрезались при ширине 320px.
  html += '<div class="blk-hdr2">На что уйдут деньги</div>';
  (b6.capex_structure||[]).forEach(function(it){
    var barWidth = Math.min((it.pct||0) * 2, 100);
    html += '<div class="capex-row">' +
      '<div class="capex-row-head">' +
        '<div class="capex-row-pct">'+(it.pct||0)+'%</div>' +
        '<div class="capex-row-label">'+escapeHtml(it.label)+'</div>' +
        '<div class="capex-row-amount">'+fmt(it.amount)+' ₸</div>' +
      '</div>' +
      '<div class="capex-row-bar"><div class="capex-row-bar-inner" style="width:'+barWidth+'%"></div></div>' +
    '</div>';
  });

  // Ваши vs нужно
  html += '<div class="blk-hdr2">Ваши деньги vs реально нужно</div>';
  if(b6.capital_own != null){
    html += '<div class="blk-row"><span>У вас есть</span><strong>'+fmt(b6.capital_own)+' ₸</strong></div>' +
            '<div class="blk-row"><span>Нужно</span><strong>'+fmt(b6.capex_needed)+' ₸</strong></div>';
    var diffLabel = '', diffClass = '';
    if(b6.diff_status === 'surplus'){ diffLabel = '+' + fmt(b6.diff) + ' ₸ (профицит)'; diffClass = 'green'; }
    else if(b6.diff_status === 'match'){ diffLabel = 'точно в бюджете'; diffClass = 'green'; }
    else if(b6.diff_status === 'deficit'){ diffLabel = fmt(Math.abs(b6.diff)) + ' ₸ дефицит'; diffClass = 'yellow'; }
    else if(b6.diff_status === 'critical_deficit'){ diffLabel = fmt(Math.abs(b6.diff)) + ' ₸ дефицит (критичный)'; diffClass = 'red'; }
    html += '<div class="blk-row"><span>Разница</span><span class="blk-pill '+diffClass+'">'+escapeHtml(diffLabel)+'</span></div>';
  }
  // UX #5: «Капитал не указан» убран — оставлено только в паспорте бизнеса
  // и в блоке «Достаточность капитала», чтобы не дублировать 4 раза.

  if((b6.actions||[]).length){
    html += '<div class="blk-hdr2">Варианты закрыть недостачу</div>';
    b6.actions.forEach(function(a, i){
      html += '<div class="blk-row"><span>'+(i+1)+'. '+escapeHtml(a)+'</span></div>';
    });
  }

  return html + '</div>';
}

/* ─── Сезонность выручки по месяцам (заменяет Траекторию 24 мес) ─── */
function renderSeasonBlockHtml(bs){
  if(!bs || !bs.coefs) return '';
  var coefs = bs.coefs, months = bs.months || [];
  var maxC = Math.max.apply(null, coefs) || 1.2;
  var bars = coefs.map(function(c, i){
    var h = Math.max(6, (c / maxC) * 95);
    var color = c > 1.05 ? 'var(--green)' : (c < 0.95 ? 'var(--yellow)' : 'var(--accent)');
    var labelPct = Math.round(c * 100);
    return '<div class="ssn-col">' +
      '<div class="ssn-bar-wrap"><div class="ssn-bar" style="height:'+h+'%;background:'+color+'"></div></div>' +
      '<div class="ssn-pct">'+labelPct+'%</div>' +
      '<div class="ssn-mo">'+escapeHtml(months[i]||'')+'</div>' +
    '</div>';
  }).join('');
  var peakPart = (bs.peaks && bs.peaks.length) ? 'пики: ' + bs.peaks.join(', ') : '';
  var troughPart = (bs.troughs && bs.troughs.length) ? 'просадки: ' + bs.troughs.join(', ') : '';
  var caption = [peakPart, troughPart].filter(Boolean).join(' · ');
  if(!caption) caption = 'Выручка распределена равномерно по году.';
  var html = '<div class="blk"><div class="blk-h">Сезонность выручки по месяцам</div>' +
    '<div style="font-size:12px;color:var(--text-3);margin-bottom:10px">Январь-декабрь, % от средней годовой</div>' +
    '<div class="ssn-chart">' + bars + '</div>' +
    '<div class="blk-note" style="margin-top:10px">Для вашей ниши ' + escapeHtml(caption) + '.</div>' +
  '</div>';
  return html;
}

/* ─── Capital adequacy (3 уровня + вердикт) ─── */
function renderCapitalAdequacyHtml(data){
  if(!data) return '';
  var v = data.verdict_level || 'unknown';
  var html = '<div class="capital-adequacy">';
  html += '<div class="capital-head">💰 Достаточность капитала</div>';

  if(data.user_capital){
    html += '<div class="capital-user-amount">У вас: <strong>'+fmt(data.user_capital)+' ₸</strong></div>';
  }

  html += '<div class="capital-verdict capital-verdict-'+escapeHtml(v)+'">' +
    '<div class="capital-verdict-label">'+escapeHtml(data.verdict_label || '')+'</div>' +
    '<div class="capital-verdict-message">'+escapeHtml(data.verdict_message || '')+'</div>' +
  '</div>';

  html += '<div class="capital-levels-title">📊 Три уровня достаточности</div>';
  var levels = [
    {id:'minimum',     label:'Минимум',    sub:'только CAPEX',              amount:data.minimum,     warnIcon:'⚠️'},
    {id:'comfortable', label:'Комфортно',  sub:'с резервом на разгон',       amount:data.comfortable, warnIcon:'⚠️'},
    {id:'safe',        label:'Безопасно',  sub:'+ сезонный буфер',          amount:data.safe,        warnIcon:'❌'},
  ];
  levels.forEach(function(lv){
    var reached = data.user_capital != null && data.user_capital > 0 && data.user_capital >= lv.amount;
    var icon = reached ? '✅' : (data.user_capital ? lv.warnIcon : '•');
    html += '<div class="capital-level">' +
      '<div class="capital-level-info">' +
        '<span class="capital-level-icon">'+icon+'</span>' +
        '<div class="capital-level-labels">' +
          '<span class="capital-level-label">'+escapeHtml(lv.label)+'</span>' +
          '<span class="capital-level-sublabel">'+escapeHtml(lv.sub)+'</span>' +
        '</div>' +
      '</div>' +
      '<div class="capital-level-amount">'+fmt(lv.amount)+' ₸</div>' +
    '</div>';
  });

  var rb = data.reserve_breakdown || {};
  if(rb.total_for_period > 0){
    html += '<div class="capital-reserve-breakdown">';
    html += '<div class="capital-reserve-breakdown-title">Из чего состоит резерв на '+rb.months+' мес:</div>';
    var items = [
      {label:'Маркетинг × '+rb.months,            monthly:rb.marketing_per_month},
      {label:'Прочие расходы × '+rb.months,        monthly:rb.other_opex_per_month},
      {label:'Соцплатежи ИП × '+rb.months,         monthly:rb.ip_min_taxes_per_month},
      {label:'Аренда × '+rb.months,                monthly:rb.rent_per_month},
    ];
    items.forEach(function(it){
      if(it.monthly > 0){
        html += '<div class="capital-reserve-item"><span>'+escapeHtml(it.label)+'</span><span>'+fmt(it.monthly * rb.months)+' ₸</span></div>';
      }
    });
    html += '<div class="capital-reserve-item capital-reserve-total"><span>Итого резерв</span><span>'+fmt(rb.total_for_period)+' ₸</span></div>';
    html += '</div>';
  }

  html += '<div class="capital-wisdom">💡 Большинство бизнесов закрываются в первый год не потому что идея плохая, а потому что деньги закончились во время разгона. Запас важнее красивого оборудования.</div>';

  html += '</div>';
  return html;
}

  if(sp.strategies && sp.strategies.length){
