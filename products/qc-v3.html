/* ─── Marketing plan (архетипы + помесячный бюджет) ─── */
function renderMarketingPlanHtml(mp){
  if(!mp || mp.error || !mp.monthly_plan) return '';

  var monthly = mp.monthly_plan || [];
  // 3 фазы: разгон (1-3), настройка (4-6), зрелый (7-12).
  function phaseAvg(slice){
    if(!slice.length) return 0;
    return Math.round(slice.reduce(function(s,m){return s + (m.total_marketing||0);}, 0) / slice.length);
  }
  var phaseRamp = phaseAvg(monthly.slice(0,3));
  var phaseTune = phaseAvg(monthly.slice(3,6));
  var phaseMature = phaseAvg(monthly.slice(6,12));

  var d = mp.choice_drivers || {};
  var ch = (mp.channels_allocation || {}).paid_budget_allocation || {};
  var sum = mp.summary || {};

  var html = '<div class="marketing-plan">' +
    '<div class="mp-title">📣 Маркетинг — ваша воронка</div>' +
    '<div class="mp-subtitle">Маркетинг работает как машина разгона — на старте дорого, потом окупается сарафаном.</div>' +

    '<div class="mp-archetype">' +
      '<div class="mp-archetype-label">Архетип вашей ниши</div>' +
      '<div class="mp-archetype-name">'+escapeHtml(mp.archetype_name || '')+' ('+escapeHtml(mp.archetype_id || '')+')</div>' +
      (mp.archetype_note ? '<div class="mp-archetype-note">'+escapeHtml(mp.archetype_note)+'</div>' : '') +
    '</div>';

  // 5 драйверов выбора.
  html += '<div class="mp-section-label">Что важно клиенту при выборе</div>' +
          '<div class="mp-drivers">';
  [['Цена', d.price || 0], ['Локация', d.location || 0], ['Визуал', d.visual || 0],
   ['Доверие', d.trust || 0], ['Скорость', d.speed || 0]].forEach(function(p){
    var n = p[1];
    var stars = '★★★★★'.slice(0, n) + '☆☆☆☆☆'.slice(0, 5 - n);
    html += '<div class="mp-driver">' +
      '<div class="mp-driver-label">'+escapeHtml(p[0])+'</div>' +
      '<div class="mp-driver-stars">'+stars+'</div>' +
      '<div class="mp-driver-score">'+n+'/5</div>' +
    '</div>';
  });
  html += '</div>';

  // 3 фазы.
  html += '<div class="mp-section-label">Бюджет по фазам роста</div>' +
          '<div class="mp-phases">' +
    '<div class="mp-phase"><div class="mp-phase-label">Разгон (м.1-3)</div>' +
      '<div class="mp-phase-budget">'+fmt(phaseRamp)+' ₸/мес</div>' +
      '<div class="mp-phase-note">Новые клиенты почти все платные. Инста только раскручивается.</div></div>' +
    '<div class="mp-phase"><div class="mp-phase-label">Настройка (м.4-6)</div>' +
      '<div class="mp-phase-budget">'+fmt(phaseTune)+' ₸/мес</div>' +
      '<div class="mp-phase-note">Алгоритмы учатся, сарафан начинает работать.</div></div>' +

    ['2GIS продвижение', ch.gis_paid || 0],
    ['OLX / Krisha', ch.olx_krisha || 0],
  ].filter(function(p){ return p[1] > 0; }).sort(function(a,b){ return b[1] - a[1]; });
  if(channels.length){
    html += '<div class="mp-section-label">Куда идёт платный бюджет</div>' +
            '<div class="mp-channels">';
    channels.forEach(function(p){
      html += '<div class="mp-channel">' +
        '<span class="mp-channel-name">'+escapeHtml(p[0])+'</span>' +
        '<span class="mp-channel-pct">'+p[1]+'%</span>' +
      '</div>';
    });
    html += '</div>';
  }

  // Платформенная комиссия (если есть).
  var platComm = (monthly[0] || {}).platform_commission_rate_pct || 0;
  if(platComm > 0){
    html += '<div class="mp-warning">💳 Платформенная комиссия: '+platComm+'% от каждого заказа через агрегаторы (Wolt/Glovo/Яндекс.Еда/Kaspi). Это вычет из маржи, не из рекламного бюджета.</div>';
  }

  // Что НЕ работает.
  if(mp.what_not_to_do_ru){
    html += '<div class="mp-warning">❌ '+escapeHtml(mp.what_not_to_do_ru)+'</div>';
  }
  // Совет по контенту.
  if(mp.content_advice_ru){
    // R8 I.4: backend возвращает <strong>...</strong> в тексте «Про
    // контент» (для PDF). Mini App escape'ит весь HTML — пользователь
    // видел буквально «<strong>Путь 1 — сам</strong>». Разрешаем
    // только <strong>/</strong> + переносы \n\n → <br><br>.
    var safeText = escapeHtml(mp.content_advice_ru)

  html += '<div class="mp-wisdom">💡 Маркетинг — это кислород бизнеса. Для вашей ниши важно ПРАВИЛЬНОЕ распределение, а не больший бюджет.</div>';

  html += '</div>';
  return html;
}

/* ─── Block 8 — Стресс-тест ─── */
function renderBlock8Html(b8){
  if(!b8) return '';
  var html = '<div class="blk"><div class="blk-h">Стресс-тест: чувствительность к параметрам</div>';
  html += '<div class="blk-row"><span>Базовая прибыль</span><strong>'+fmt(b8.base_profit_month)+' ₸/мес</strong></div>';

  html += '<div class="blk-hdr2">Что произойдёт при изменении параметра</div>';
  html += '<div class="blk-note" style="margin-bottom:10px">Эти цифры показывают, насколько упадёт ваша прибыль за год, если один из параметров ухудшится. Например: падение среднего чека на 15% уменьшит годовую прибыль на указанную сумму.</div>';
  // Импакт приходит из движка как абсолютные рубли в год (impact_annual).
  // Ширина бара — по доле от максимального impact в списке.
  var sensList = b8.sensitivities || [];
  var maxAbs = sensList.reduce(function(a,s){ return Math.max(a, Math.abs(s.impact_annual||0)); }, 1);
  sensList.forEach(function(s){
    var v = s.impact_annual || 0;
    var widthPct = Math.min(Math.abs(v)/maxAbs*100, 100);
    var severityRatio = Math.abs(v)/maxAbs;
    var color = severityRatio >= 0.70 ? 'var(--red)' : severityRatio >= 0.45 ? '#fb923c' : v < 0 ? 'var(--yellow)' : 'var(--green)';
    var icon = severityRatio >= 0.70 ? '🚨' : severityRatio >= 0.45 ? '⚠️' : '';
    var valueText = (v>0?'+':'−') + fmt(Math.abs(v)) + ' ₸/год';
    html += '<div class="stress-row">' +
      '<div class="stress-row-head">' +
        '<div class="stress-row-label">'+escapeHtml(s.param)+' ('+(s.change>0?'+':'')+s.change+'%) '+icon+'</div>' +
        '<div class="stress-row-value">'+valueText+'</div>' +
      '</div>' +
      '<div class="stress-row-bar"><div class="stress-row-bar-inner" style="width:'+widthPct+'%;background:'+color+'"></div></div>' +
    '</div>';
  });

  // Секция «Точка смерти бизнеса» удалена (пункт 25 финального раунда) —
  // пороги падения для Quick Check перегружены, это уровень FinModel.

  if(b8.critical_param){
    html += '<div class="blk-hdr2">Критичный параметр</div>' +
      '<div class="blk-note"><strong>'+escapeHtml(b8.critical_param.param)+'</strong> — самая уязвимая метрика.</div>';
    if((b8.recommendations||[]).length){
      html += '<div style="margin-top:10px">';
      b8.recommendations.forEach(function(r){
        html += '<div style="font-size:13px;color:var(--text-2);padding:4px 0 4px 14px;position:relative"><span style="position:absolute;left:0">•</span>'+escapeHtml(r)+'</div>';
      });
      html += '</div>';
    }
  }
  return html + '</div>';
}

// Round-3 §4.2: модалка AI-чата с контекстом текущего отчёта.
// Серверный endpoint /qc-chat принимает {question, report} и возвращает
// {answer}. Сессии не ведём — каждый вопрос self-contained (для MVP).
function openAiChat(){
  if(!window._lastResult){ alert('Сначала запустите расчёт.'); return; }
  if(document.getElementById('ai-chat-overlay')) return;
  var overlay = document.createElement('div');
  overlay.id = 'ai-chat-overlay';
  overlay.className = 'ai-chat-overlay';
  overlay.innerHTML =
    '<div class="ai-chat-sheet" onclick="event.stopPropagation()">' +
      '<div class="ai-chat-header">' +
        '<div class="ai-chat-title">ИИ-консультант · по вашему отчёту</div>' +
        '<button class="ai-chat-close" onclick="closeAiChat()" aria-label="Закрыть">×</button>' +
      '</div>' +
      '<div class="ai-chat-messages" id="ai-chat-messages">' +
        '<div class="ai-msg ai-msg-bot">' +
          'Задайте вопрос по вашему отчёту. Например: «Почему такая окупаемость?», ' +
          '«Что изменится, если переделать под SOLO?», «Посоветуй маркетинг под мой бюджет».' +
        '</div>' +
      '</div>' +
      '<div class="ai-chat-input">' +
        '<textarea id="ai-chat-q" placeholder="Ваш вопрос…"></textarea>' +
        '<button class="ai-chat-send" id="ai-chat-send" onclick="sendAiChat()">→</button>' +
      '</div>' +
    '</div>';
  overlay.addEventListener('click', function(e){
    if(e.target === overlay) closeAiChat();
  });
  document.body.appendChild(overlay);
  setTimeout(function(){ var t = document.getElementById('ai-chat-q'); if(t) t.focus(); }, 50);
}
function closeAiChat(){
  var o = document.getElementById('ai-chat-overlay');
  if(o) o.remove();
}
function sendAiChat(){
  var ta = document.getElementById('ai-chat-q');
  var send = document.getElementById('ai-chat-send');
  var msgs = document.getElementById('ai-chat-messages');
  if(!ta || !msgs) return;
  var question = (ta.value || '').trim();
  if(!question) return;
  // user message
  var userEl = document.createElement('div');
  userEl.className = 'ai-msg ai-msg-user';
  userEl.textContent = question;
  msgs.appendChild(userEl);
  ta.value = '';
  ta.disabled = true; send.disabled = true;
  // loading placeholder
  var loadEl = document.createElement('div');
  loadEl.className = 'ai-msg ai-msg-bot loading';
  loadEl.textContent = 'Думаю…';
  msgs.appendChild(loadEl);
  msgs.scrollTop = msgs.scrollHeight;

  apiPost('/qc-chat', {
    question: question,
    report: window._lastResult,
  }, function(err, resp, raw){
    ta.disabled = false; send.disabled = false;
    if(loadEl.parentNode) loadEl.parentNode.removeChild(loadEl);
    var answer;
    if(err){
      answer = 'Не удалось получить ответ: ' + (err.message || err) + '. Попробуйте ещё раз.';
    } else {
      answer = (resp && resp.answer) || 'Ответ не пришёл. Попробуйте переформулировать.';
    }
    var botEl = document.createElement('div');
    botEl.className = 'ai-msg ai-msg-bot';
    botEl.textContent = answer;
    msgs.appendChild(botEl);
    msgs.scrollTop = msgs.scrollHeight;
    ta.focus();
  });
}
function downloadPDF(sourceId){
  var body = window._lastBody;
  if(!body){ alert('Сначала запустите расчёт.'); return; }
  var btns = document.querySelectorAll('.pdf-download-btn');
  var origHtml = [];
  btns.forEach(function(b, i){
    origHtml[i] = b.innerHTML;
    b.disabled = true;
    b.innerHTML = '<span class="pdf-main">Генерируем PDF…</span>' +
                  '<span class="pdf-sub">5-10 секунд</span>';
  });

  function setAll(html, extraClass){
    btns.forEach(function(b){
      b.disabled = false;
      b.innerHTML = html;
      if(extraClass) b.classList.add(extraClass);
    });
  }

  apiPost('/quick-check/pdf', body, function(err, resp, raw){
    if(err){
      console.error('PDF error:', err, raw);
      btns.forEach(function(b, i){ b.disabled = false; b.innerHTML = origHtml[i]; });
      alert('Ошибка при скачивании PDF. Попробуйте ещё раз.');
      return;
    }
    var url = resp && resp.pdf_url;
    if(!url){
      btns.forEach(function(b, i){ b.disabled = false; b.innerHTML = origHtml[i]; });
      alert('PDF не пришёл. Попробуйте ещё раз.');
      return;
    }
    var full = API + url;
    var filename = (resp && resp.filename) || 'ZEREK_QuickCheck.pdf';
    var tg = window.Telegram && window.Telegram.WebApp;
    if(tg && typeof tg.openLink === 'function'){
      // В Telegram WebApp (особенно iOS) <a download> не работает —
      // PDF открывается inline в WebView без возможности сохранить.
      // openLink уводит во внешний браузер (Safari/Chrome), где
      // backend отдаёт Content-Disposition: attachment и срабатывает
      // штатное скачивание.
      tg.openLink(full, { try_instant_view: false });
    } else {
      try {
        var a = document.createElement('a');
        a.href = full; a.download = filename; a.target = '_blank'; a.rel = 'noopener';
        document.body.appendChild(a); a.click();
        setTimeout(function(){ try { a.remove(); } catch(e){} }, 0);
      } catch(e1){ window.open(full, '_blank'); }
    }
    // Round-3 §4.1: успешный state — тот же зелёный градиент, чуть темнее.
    setAll('<span class="pdf-main">✓ PDF сохранён</span>' +
           '<span class="pdf-sub">можно скачать повторно</span>', 'downloaded');
  });
}
function extractKpis(r){

  try {

    if(payback){ out.heroVal = payback + ' мес'; out.heroUnit = 'срок окупаемости'; }
    var rev = r.revenue_month || (r.unit && r.unit.revenue_month) || null;
    var pr  = r.profit_month  || (r.unit && r.unit.profit_month) || null;
    var cap = r.capex_total   || (r.unit && r.unit.capex_total) || null;
    var wc  = r.working_cap   || (r.unit && r.unit.working_cap) || null;
    if(rev) out.revenue = fmt(rev)+' ₸';
    if(pr)  out.profit  = fmt(pr)+' ₸';
    if(cap) out.capex   = fmt(cap)+' ₸';
    if(wc)  out.working_cap = fmt(wc)+' ₸';
    out.verdict = (r.verdict || (r.block1 && r.block1.verdict) || '');
