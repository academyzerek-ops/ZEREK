<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#0F0F0F">
<title>ZEREK — Экспресс-оценка</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0F0F0F;
    --surface: #1C1C1E;
    --surface-2: #2C2C2E;
    --surface-3: #3A3A3C;
    --text: #FFFFFF;
    --text-2: #A0A0A5;
    --text-3: #6C6C70;
    --accent: #7C6CFF;
    --accent-dim: rgba(124, 108, 255, 0.15);
    --green: #22c55e;
    --green-dim: rgba(34, 197, 94, 0.15);
    --yellow: #eab308;
    --yellow-dim: rgba(234, 179, 8, 0.15);
    --red: #ef4444;
    --red-dim: rgba(239, 68, 68, 0.15);
    --sans: -apple-system, BlinkMacSystemFont, "Inter", "Roboto", "Segoe UI", sans-serif;
    --mono: "JetBrains Mono", ui-monospace, "SF Mono", Menlo, monospace;
    --radius: 16px;
    --radius-sm: 10px;
    --radius-lg: 20px;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    margin: 0; padding: 0;
    background: var(--bg); color: var(--text);
    font-family: var(--sans);
    font-size: 15px; line-height: 1.45;
    -webkit-font-smoothing: antialiased;
  }
  body { padding: 0 16px 40px; padding-bottom: max(40px, env(safe-area-inset-bottom, 0)); }
  button { font-family: inherit; border: none; background: none; color: inherit; cursor: pointer; padding: 0; }
  h1, h2, h3 { margin: 0; font-weight: 700; letter-spacing: -0.02em; }
  h2 { font-size: 22px; margin-bottom: 6px; }
  p { margin: 0; }

  /* ========= Header ========= */
  .top-bar {
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 0 10px; position: sticky; top: 0;
    background: linear-gradient(180deg, var(--bg) 85%, transparent);
    z-index: 10;
  }
  .back-btn {
    display: flex; align-items: center; gap: 6px;
    font-size: 15px; font-weight: 600; color: var(--accent);
    padding: 6px 4px;
  }
  .back-btn svg { width: 18px; height: 18px; }

  .brand {
    font-size: 13px; font-weight: 700; letter-spacing: 0.02em;
    color: var(--text-2); text-transform: uppercase;
  }
  .brand strong { color: var(--text); }

  /* ========= Progress ========= */
  .progress-bar {
    height: 4px; background: var(--surface-2); border-radius: 2px;
    overflow: hidden; margin-bottom: 6px;
  }
  .progress-fill {
    height: 100%; background: var(--accent);
    width: calc(var(--p, 0) * 100%);
    transition: width 0.25s ease;
  }
  .progress-text {
    display: flex; justify-content: space-between;
    font-size: 12px; color: var(--text-3); font-weight: 500;
    margin-bottom: 20px;
  }
  .progress-text strong { color: var(--text-2); font-weight: 600; }

  /* ========= Wizard ========= */
  .step-head { margin-bottom: 18px; }
  .step-kicker {
    font-size: 11px; font-weight: 700; letter-spacing: 0.12em;
    color: var(--accent); text-transform: uppercase; margin-bottom: 8px;
  }
  .step-desc { font-size: 14px; color: var(--text-2); margin-top: 4px; }

  .options { display: flex; flex-direction: column; gap: 8px; padding-bottom: 20px; }
  .opt {
    display: flex; align-items: center; gap: 14px;
    padding: 14px 16px;
    background: var(--surface); border: 1.5px solid transparent;
    border-radius: var(--radius); cursor: pointer;
    transition: border-color 0.15s, background 0.15s, transform 0.1s;
    min-height: 56px;
  }
  .opt:active { transform: scale(0.985); }
  .opt.selected { border-color: var(--accent); background: var(--accent-dim); }
  .opt-icon { font-size: 22px; width: 32px; flex-shrink: 0; text-align: center; }
  .opt-label { font-size: 15px; font-weight: 600; color: var(--text); }
  .opt-sub { font-size: 12px; color: var(--text-3); margin-top: 2px; }

  /* Toggles (location type) */
  .toggles { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-bottom: 18px; }
  .toggle {
    padding: 12px 8px; background: var(--surface);
    border: 1.5px solid transparent; border-radius: var(--radius-sm);
    text-align: center; font-size: 13px; font-weight: 600;
    cursor: pointer; transition: border-color 0.15s, background 0.15s;
  }
  .toggle.selected { border-color: var(--accent); background: var(--accent-dim); color: var(--accent); }

  /* Range */
  .range-wrap { padding: 14px 16px; background: var(--surface); border-radius: var(--radius); margin-bottom: 18px; }
  .range-label { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; font-size: 13px; color: var(--text-2); font-weight: 600; }
  .range-val { font-family: var(--mono); font-weight: 700; color: var(--text); font-size: 16px; }
  input[type="range"] {
    -webkit-appearance: none; width: 100%; height: 4px;
    background: var(--surface-3); border-radius: 2px; outline: none;
  }
  input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none; width: 22px; height: 22px;
    background: var(--accent); border-radius: 50%; cursor: pointer;
    border: 3px solid var(--bg);
  }

  .lvl-btns { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
  .lvl-btn {
    padding: 12px 6px; background: var(--surface);
    border: 1.5px solid transparent; border-radius: var(--radius-sm);
    text-align: center; cursor: pointer; transition: border-color 0.15s, background 0.15s;
  }
  .lvl-btn.selected { border-color: var(--accent); background: var(--accent-dim); }
  .lvl-title { font-size: 14px; font-weight: 700; color: var(--text); }
  .lvl-sub { font-size: 11px; color: var(--text-3); margin-top: 2px; }

  .section-label { font-size: 13px; font-weight: 600; margin-bottom: 8px; color: var(--text-2); }

  /* Confirm table */
  .confirm-table {
    width: 100%; border-collapse: collapse;
    background: var(--surface); border-radius: var(--radius); overflow: hidden;
  }
  .confirm-table td {
    padding: 12px 16px; font-size: 14px;
    border-bottom: 1px solid var(--surface-2);
  }
  .confirm-table tr:last-child td { border-bottom: none; }
  .confirm-table td:first-child { color: var(--text-2); width: 40%; }
  .confirm-table td:last-child { text-align: right; font-weight: 600; }

  /* Bottom CTA */
  .cta-wrap {
    position: sticky; bottom: 0;
    padding: 14px 0 16px;
    padding-bottom: max(16px, env(safe-area-inset-bottom, 0));
    background: linear-gradient(0deg, var(--bg) 80%, transparent);
    margin-top: 10px;
  }
  .btn {
    width: 100%; padding: 15px 20px;
    background: var(--accent); color: #fff;
    font-size: 16px; font-weight: 700;
    border-radius: 100px; cursor: pointer;
    transition: opacity 0.15s, transform 0.1s;
    letter-spacing: -0.01em;
  }
  .btn:active { opacity: 0.85; transform: scale(0.99); }
  .btn.disabled { background: var(--surface-2); color: var(--text-3); cursor: default; }
  .btn-outline {
    background: transparent; color: var(--accent);
    border: 1.5px solid var(--surface-3);
  }

  /* ========= Loading ========= */
  #loading-screen {
    display: none; flex-direction: column; align-items: center; justify-content: center;
    min-height: 70vh; text-align: center; padding: 40px 20px;
  }
  #loading-screen.active { display: flex; }
  .spinner {
    width: 48px; height: 48px;
    border: 3px solid var(--surface-2);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.9s linear infinite;
    margin-bottom: 24px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-title { font-size: 18px; font-weight: 700; margin-bottom: 6px; }
  .loading-sub { font-size: 13px; color: var(--text-2); }

  /* ========= Report ========= */
  #report-screen { display: none; padding-bottom: 40px; }
  #report-screen.active { display: block; }

  .block {
    background: var(--surface); border-radius: var(--radius-lg);
    padding: 20px 18px; margin-bottom: 14px;
  }
  .block-title {
    font-size: 11px; font-weight: 700; letter-spacing: 0.14em;
    text-transform: uppercase; color: var(--text-3);
    margin-bottom: 10px;
    display: flex; align-items: center; gap: 6px;
  }
  .block-h {
    font-size: 20px; font-weight: 700; margin-bottom: 4px; letter-spacing: -0.02em;
  }
  .block-sub { font-size: 13px; color: var(--text-2); margin-bottom: 14px; }
  .block-hint {
    font-size: 11px; color: var(--text-3); line-height: 1.5;
    margin-top: 12px; padding-top: 12px; border-top: 1px solid var(--surface-2);
  }

  .hint-btn {
    display: inline-flex; align-items: center; justify-content: center;
    width: 18px; height: 18px; border-radius: 50%;
    background: var(--surface-2); color: var(--text-2);
    font-size: 11px; font-weight: 700;
    cursor: pointer; margin-left: 4px; vertical-align: middle;
  }
  .hint-btn:hover { background: var(--surface-3); color: var(--text); }

  /* Block 1 — Verdict */
  .verdict-hero {
    text-align: center; padding: 8px 0 12px;
  }
  .verdict-icon { font-size: 56px; line-height: 1; margin-bottom: 8px; }
  .verdict-name { font-size: 18px; font-weight: 700; }
  .verdict-city { font-size: 13px; color: var(--text-2); margin-top: 2px; }

  .verdict-status {
    margin: 16px 0; padding: 14px 16px; border-radius: 14px;
    display: flex; align-items: center; gap: 12px;
    font-size: 14px; font-weight: 600;
  }
  .verdict-status.green { background: var(--green-dim); color: var(--green); }
  .verdict-status.yellow { background: var(--yellow-dim); color: var(--yellow); }
  .verdict-status.red { background: var(--red-dim); color: var(--red); }
  .verdict-status-ic { font-size: 22px; }

  .hero-number-wrap {
    text-align: center; padding: 24px 12px 12px;
    background: linear-gradient(180deg, var(--surface-2), var(--surface));
    border-radius: var(--radius);
    margin-bottom: 14px;
  }
  .hero-label {
    font-size: 12px; font-weight: 700; letter-spacing: 0.1em;
    text-transform: uppercase; color: var(--text-3); margin-bottom: 6px;
  }
  .hero-number {
    font-family: var(--mono); font-weight: 700;
    font-size: 38px; letter-spacing: -0.02em; color: var(--green);
    line-height: 1.1;
  }
  .hero-number.yellow { color: var(--yellow); }
  .hero-number.red { color: var(--red); }
  .hero-unit { font-size: 14px; color: var(--text-2); margin-top: 6px; font-weight: 500; }
  .hero-caption { font-size: 11px; color: var(--text-3); margin-top: 10px; padding: 0 10px; line-height: 1.5; }

  .mini-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
  .mini-card {
    background: var(--surface-2); border-radius: var(--radius-sm);
    padding: 12px 10px; text-align: center;
  }
  .mini-label { font-size: 10px; font-weight: 600; color: var(--text-3); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 4px; }
  .mini-value { font-family: var(--mono); font-weight: 700; font-size: 17px; color: var(--text); }

  /* Block 2 — Passport */
  .passport-row {
    display: flex; align-items: flex-start; gap: 12px;
    padding: 10px 0; border-bottom: 1px solid var(--surface-2);
  }
  .passport-row:last-child { border-bottom: none; }
  .passport-ic { font-size: 18px; width: 26px; flex-shrink: 0; text-align: center; }
  .passport-label { font-size: 12px; color: var(--text-3); }
  .passport-val { font-size: 14px; font-weight: 600; margin-top: 1px; line-height: 1.4; }

  /* Block 3 — Unit economics */
  .unit-chain { display: flex; flex-direction: column; gap: 0; margin: 10px 0; }
  .unit-row {
    background: var(--surface-2); border-radius: var(--radius-sm);
    padding: 14px 16px; display: flex; justify-content: space-between; align-items: center;
  }
  .unit-row.primary { background: var(--green-dim); border: 1.5px solid var(--green); }
  .unit-op {
    align-self: center; font-size: 11px; font-weight: 700;
    color: var(--text-3); padding: 6px 0;
    display: flex; align-items: center; gap: 6px; justify-content: center;
  }
  .unit-op::before, .unit-op::after {
    content: ''; flex: 1; height: 1px; background: var(--surface-3);
  }
  .unit-label { font-size: 13px; color: var(--text-2); font-weight: 500; }
  .unit-val { font-family: var(--mono); font-weight: 700; font-size: 18px; }
  .unit-row.primary .unit-label { color: var(--green); font-weight: 700; }
  .unit-row.primary .unit-val { color: var(--green); font-size: 22px; }

  /* Block 4 — Waterfall P&L */
  .waterfall { display: flex; flex-direction: column; gap: 2px; margin-top: 6px; }
  .wf-row {
    display: grid; grid-template-columns: 1fr auto; gap: 10px;
    padding: 8px 10px; border-radius: 6px;
    font-size: 13px; position: relative; min-height: 32px;
    align-items: center;
  }
  .wf-row .wf-bar {
    position: absolute; left: 0; top: 0; bottom: 0;
    background: var(--surface-2); z-index: 0;
    border-radius: 6px; width: var(--w, 0%);
  }
  .wf-row.negative .wf-bar { background: rgba(239, 68, 68, 0.12); }
  .wf-row.positive .wf-bar { background: rgba(34, 197, 94, 0.12); }
  .wf-row.hero {
    background: var(--green-dim); border: 1.5px solid var(--green);
    margin-top: 6px; padding: 12px 14px; min-height: 44px;
  }
  .wf-row.hero .wf-bar { display: none; }
  .wf-row.subhead {
    font-weight: 700; color: var(--text);
    margin-top: 6px;
  }
  .wf-label { position: relative; z-index: 1; color: var(--text-2); font-weight: 500; }
  .wf-row.positive .wf-label, .wf-row.hero .wf-label, .wf-row.subhead .wf-label { color: var(--text); font-weight: 600; }
  .wf-row.hero .wf-label { font-weight: 700; font-size: 14px; color: var(--green); }
  .wf-val { position: relative; z-index: 1; font-family: var(--mono); font-weight: 600; white-space: nowrap; }
  .wf-row.negative .wf-val { color: var(--red); }
  .wf-row.positive .wf-val { color: var(--green); }
  .wf-row.hero .wf-val { font-size: 18px; font-weight: 700; color: var(--green); }

  /* Block 5 — CAPEX + buffer */
  .capex-group { margin-bottom: 16px; }
  .capex-head {
    display: flex; align-items: center; gap: 8px;
    font-size: 14px; font-weight: 700; margin-bottom: 8px;
  }
  .capex-item {
    display: flex; justify-content: space-between; align-items: center;
    padding: 8px 0; font-size: 13px;
    border-bottom: 1px solid var(--surface-2);
  }
  .capex-item:last-of-type { border-bottom: none; }
  .capex-item .val { font-family: var(--mono); font-weight: 600; }
  .capex-total {
    display: flex; justify-content: space-between;
    padding: 10px 12px; margin-top: 6px;
    background: var(--surface-2); border-radius: var(--radius-sm);
    font-size: 14px; font-weight: 700;
  }
  .capex-total .val { font-family: var(--mono); }
  .total-grand {
    background: var(--accent-dim); color: var(--accent);
    padding: 14px 16px; border-radius: var(--radius-sm);
    margin-top: 14px; display: flex; justify-content: space-between; align-items: center;
    font-size: 15px; font-weight: 700;
  }
  .total-grand .val { font-family: var(--mono); font-size: 17px; }

  /* Block 6 — 3 points scale */
  .scale-wrap { padding: 8px 0 0; }
  .scale-track {
    position: relative; height: 8px; border-radius: 4px; overflow: hidden;
    background: linear-gradient(90deg, var(--red), var(--yellow) 50%, var(--green));
    margin-bottom: 14px;
  }
  .scale-mark {
    position: absolute; top: 0; bottom: 0; width: 2px;
    background: var(--text);
    transform: translateX(-50%);
  }
  .scale-mark::after {
    content: ''; position: absolute; top: -4px; left: 50%;
    transform: translateX(-50%);
    width: 10px; height: 10px; border-radius: 50%;
    background: var(--text); border: 2px solid var(--bg);
  }
  .scale-legend { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 6px; margin-bottom: 14px; font-size: 11px; text-align: center; }
  .scale-legend span { color: var(--text-3); font-weight: 600; }
  .scale-points { display: flex; flex-direction: column; gap: 10px; }
  .scale-point {
    background: var(--surface-2); border-radius: var(--radius-sm);
    padding: 12px 14px; border-left: 3px solid;
  }
  .scale-point.red { border-color: var(--red); }
  .scale-point.yellow { border-color: var(--yellow); }
  .scale-point.green { border-color: var(--green); }
  .sp-head {
    display: flex; justify-content: space-between; align-items: baseline;
    font-size: 13px; font-weight: 700; margin-bottom: 4px;
  }
  .sp-val { font-family: var(--mono); font-weight: 700; font-size: 14px; }
  .scale-point.red .sp-val { color: var(--red); }
  .scale-point.yellow .sp-val { color: var(--yellow); }
  .scale-point.green .sp-val { color: var(--green); }
  .sp-desc { font-size: 12px; color: var(--text-2); line-height: 1.5; }

  /* Block 7 — Stress scenarios */
  .scenario { margin-bottom: 14px; }
  .scenario:last-child { margin-bottom: 0; }
  .scen-head { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
  .scen-tag {
    font-size: 10px; font-weight: 700; padding: 3px 8px; border-radius: 100px; letter-spacing: 0.04em; text-transform: uppercase;
  }
  .scenario.red .scen-tag { background: var(--red-dim); color: var(--red); }
  .scenario.blue .scen-tag { background: var(--accent-dim); color: var(--accent); }
  .scenario.green .scen-tag { background: var(--green-dim); color: var(--green); }
  .scen-title { font-size: 14px; font-weight: 700; }
  .scen-params { font-size: 12px; color: var(--text-3); margin-bottom: 8px; }
  .scen-bar-wrap { position: relative; height: 40px; background: var(--surface-2); border-radius: var(--radius-sm); overflow: hidden; display: flex; align-items: center; padding: 0 14px; }
  .scen-bar {
    position: absolute; left: 0; top: 0; bottom: 0;
    border-radius: var(--radius-sm);
    width: var(--w, 0%);
  }
  .scenario.red .scen-bar { background: linear-gradient(90deg, var(--red-dim), rgba(239, 68, 68, 0.35)); }
  .scenario.blue .scen-bar { background: linear-gradient(90deg, var(--accent-dim), rgba(124, 108, 255, 0.35)); }
  .scenario.green .scen-bar { background: linear-gradient(90deg, var(--green-dim), rgba(34, 197, 94, 0.45)); }
  .scen-value {
    position: relative; z-index: 1;
    font-family: var(--mono); font-weight: 700; font-size: 15px;
  }
  .scenario.red .scen-value { color: var(--red); }
  .scenario.blue .scen-value { color: var(--accent); }
  .scenario.green .scen-value { color: var(--green); }

  /* Block 8 — Risks */
  .risk-card {
    background: var(--surface-2); border-radius: var(--radius-sm);
    padding: 14px 16px; margin-bottom: 10px;
    border-left: 3px solid var(--yellow);
  }
  .risk-head {
    display: flex; align-items: flex-start; gap: 8px;
    font-size: 14px; font-weight: 700; margin-bottom: 6px;
  }
  .risk-ic { font-size: 16px; flex-shrink: 0; }
  .risk-body { font-size: 13px; color: var(--text-2); line-height: 1.5; margin-bottom: 8px; }
  .risk-protect {
    font-size: 12px; padding: 8px 10px;
    background: rgba(34, 197, 94, 0.08); border-radius: 8px;
    color: var(--text); line-height: 1.5;
  }
  .risk-protect strong { color: var(--green); }

  /* Block 9 — Next steps + upsell */
  .checklist { display: flex; flex-direction: column; gap: 8px; }
  .check-item {
    display: flex; align-items: flex-start; gap: 10px;
    padding: 10px 12px; background: var(--surface-2);
    border-radius: var(--radius-sm); font-size: 13px;
    cursor: pointer; user-select: none;
  }
  .check-box {
    width: 18px; height: 18px; border-radius: 4px;
    border: 1.5px solid var(--surface-3); flex-shrink: 0;
    margin-top: 1px; display: flex; align-items: center; justify-content: center;
    transition: background 0.15s, border-color 0.15s;
  }
  .check-item.done .check-box { background: var(--green); border-color: var(--green); }
  .check-item.done .check-box::after { content: '✓'; color: #fff; font-size: 13px; font-weight: 700; }
  .check-item.done .check-text { color: var(--text-3); text-decoration: line-through; }

  .upsell-head {
    background: var(--surface-2); padding: 16px; border-radius: var(--radius);
    margin: 18px 0 12px; font-size: 14px; line-height: 1.5;
  }
  .upsell-head strong { display: block; margin-bottom: 4px; font-size: 15px; }
  .upsell { background: var(--surface); border: 1.5px solid var(--surface-2); border-radius: var(--radius); padding: 18px; margin-bottom: 10px; }
  .upsell-tag {
    display: inline-flex; align-items: center; gap: 6px;
    font-size: 20px; font-weight: 700; margin-bottom: 12px;
  }
  .upsell-price { color: var(--accent); font-family: var(--mono); font-size: 18px; }
  .upsell-feats { list-style: none; padding: 0; margin: 0 0 14px; }
  .upsell-feats li {
    padding: 6px 0 6px 24px; position: relative; font-size: 13px; color: var(--text-2);
  }

var API = 'https://web-production-921a5.up.railway.app';
var tg = null;
try {
  if (window.Telegram && window.Telegram.WebApp) {
    tg = window.Telegram.WebApp;
    tg.ready();
    tg.expand();
    try { tg.enableClosingConfirmation(); } catch(e) {}
  }
} catch(e) {}

function haptic(type) {
  try {
    if (tg && tg.HapticFeedback) {
      if (type === 'select') tg.HapticFeedback.selectionChanged();
      else if (type === 'success') tg.HapticFeedback.notificationOccurred('success');
      else tg.HapticFeedback.impactOccurred('light');
    }
  } catch(e) {}
}

function apiGet(path, cb) {
  var xhr = new XMLHttpRequest();
  xhr.open('GET', API + path, true);
  xhr.onreadystatechange = function() {
    if (xhr.readyState !== 4) return;
    if (xhr.status === 200) { try { cb(null, JSON.parse(xhr.responseText)); } catch(e) { cb(e, null); } }
    else cb(new Error('HTTP ' + xhr.status), null);
  };
  xhr.onerror = function() { cb(new Error('Network error'), null); };
  xhr.send();
}
function apiPost(path, body, cb) {
  var xhr = new XMLHttpRequest();
  xhr.open('POST', API + path, true);
  xhr.setRequestHeader('Content-Type', 'application/json');
  xhr.onreadystatechange = function() {
    if (xhr.readyState !== 4) return;
    if (xhr.status === 200) { try { cb(null, JSON.parse(xhr.responseText)); } catch(e) { cb(e, null); } }
    else cb(new Error('HTTP ' + xhr.status), null);
  };
  xhr.onerror = function() { cb(new Error('Network error'), null); };
  xhr.send(JSON.stringify(body));
}

function fmt(n) {
  if (n == null || isNaN(n)) return '—';
  return Math.round(n).toString().replace(/\B(?=(\d{3})+(?!\d))/g, ' ');
}
function fmtK(n) {
  if (n == null || isNaN(n)) return '—';
  if (Math.abs(n) >= 1000000) return (n/1000000).toFixed(1).replace(/\.0$/, '') + ' млн';
  if (Math.abs(n) >= 1000) return Math.round(n/1000) + ' тыс';
  return fmt(n);
}
function fmtPct(n) {
  if (n == null || isNaN(n)) return '—';
  return Math.round(n) + '%';
}

  var p = (QC.step + 1) / STEPS.length;
  document.getElementById('pbar').style.setProperty('--p', p);
  document.getElementById('step-label').textContent = 'Шаг ' + (QC.step + 1) + ' из ' + STEPS.length;
  document.getElementById('step-name').textContent = STEP_NAMES[QC.step];
}

function setBackLabel() {
  var lbl = document.getElementById('back-label');
  if (!lbl) return;
  if (document.getElementById('report-screen').classList.contains('active')) {
    lbl.textContent = 'К расчётам';
  } else {
    lbl.textContent = QC.step === 0 ? 'Закрыть' : 'Назад';
  }
}

function renderStep() {
  setProgress();
  setBackLabel();
  var sn = STEPS[QC.step];
  var html = '';

  if (sn === 'city') {
    html = '<div class="step-head"><div class="step-kicker">Шаг 1</div><h2>Выберите город</h2><div class="step-desc">В каком городе планируете открыть?</div></div>';
    html += '<div class="options" id="city-list">';
    if (QC.cities.length === 0) {
      html += '<div style="text-align:center;color:var(--text-3);padding:40px 0">Загрузка…</div>';
    } else {
      for (var i = 0; i < QC.cities.length; i++) {
        var c = QC.cities[i];
        var cid = c.city_id || c.id;
        var cname = c['Город'] || c.name_ru || cid;
        var sel = QC.city_id === cid ? ' selected' : '';
        html += '<div class="opt' + sel + '" onclick="selectCity(this,\'' + cid + '\',\'' + cname + '\')"><div class="opt-icon">📍</div><div><div class="opt-label">' + cname + '</div></div></div>';
      }
    }
    html += '</div>';
  }
  else if (sn === 'category') {
    html = '<div class="step-head"><div class="step-kicker">Шаг 2</div><h2>Категория</h2><div class="step-desc">К какой категории относится идея?</div></div>';
    html += '<div class="options">';
    for (var i = 0; i < NICHE_CATEGORIES.length; i++) {
      var cat = NICHE_CATEGORIES[i];
      var sel = QC.category_idx === i ? ' selected' : '';
      html += '<div class="opt' + sel + '" onclick="selectCategory(this,' + i + ')"><div class="opt-icon">' + cat.icon + '</div><div><div class="opt-label">' + cat.title + '</div><div class="opt-sub">' + cat.ids.length + ' ниш</div></div></div>';
    }
    html += '</div>';
  }
  else if (sn === 'niche') {
    html = '<div class="step-head"><div class="step-kicker">Шаг 3</div><h2>Ниша</h2><div class="step-desc">Какой бизнес хотите открыть?</div></div>';
    html += '<div class="options">';
    var ids = NICHE_CATEGORIES[QC.category_idx].ids;
    for (var i = 0; i < ids.length; i++) {
      var nid = ids[i];
      var sel = QC.niche_id === nid ? ' selected' : '';
      html += '<div class="opt' + sel + '" onclick="selectNiche(this,\'' + nid + '\')"><div class="opt-icon">' + (NICHE_ICONS[nid] || '📋') + '</div><div><div class="opt-label">' + (NICHE_NAMES[nid] || nid) + '</div></div></div>';
    }
    html += '</div>';
  }
  else if (sn === 'format') {
    html = '<div class="step-head"><div class="step-kicker">Шаг 4</div><h2>Формат</h2><div class="step-desc">Выберите формат для «' + (NICHE_NAMES[QC.niche_id] || QC.niche_id) + '»</div></div>';
    html += '<div class="options" id="format-list"><div style="text-align:center;color:var(--text-3);padding:40px 0">Загрузка форматов…</div></div>';
    setTimeout(loadFormats, 50);
  }
  else if (sn === 'location') {
    html = '<div class="step-head"><div class="step-kicker">Шаг 5</div><h2>Локация и класс</h2><div class="step-desc">Где вы планируете открыться и на каком уровне</div></div>';
    html += '<div class="section-label">Тип помещения</div>';
    html += '<div class="toggles">';
    html += '<div class="toggle' + (QC.loc_type === 'ТЦ' ? ' selected' : '') + '" onclick="selectLoc(this,\'ТЦ\')">ТЦ / БЦ</div>';
    html += '<div class="toggle' + (QC.loc_type === 'улица' ? ' selected' : '') + '" onclick="selectLoc(this,\'улица\')">Улица</div>';
    html += '<div class="toggle' + (QC.loc_type === 'жилой дом' ? ' selected' : '') + '" onclick="selectLoc(this,\'жилой дом\')">Жилой дом</div>';
    html += '</div>';

    html += '<div class="range-wrap"><div class="range-label"><span>Площадь</span><span class="range-val" id="area-val">' + QC.area_m2 + ' м²</span></div>';
    html += '<input type="range" min="5" max="300" value="' + QC.area_m2 + '" oninput="changeArea(this.value)"></div>';

    html += '<div class="section-label" style="margin-top:8px">Класс оснащения</div>';
    html += '<div class="lvl-btns">';
    html += '<div class="lvl-btn' + (QC.capex_level === 'эконом' ? ' selected' : '') + '" onclick="selectLevel(this,\'эконом\')"><div class="lvl-title">Эконом</div><div class="lvl-sub">б/у, базовый</div></div>';
    html += '<div class="lvl-btn' + (QC.capex_level === 'стандарт' ? ' selected' : '') + '" onclick="selectLevel(this,\'стандарт\')"><div class="lvl-title">Стандарт</div><div class="lvl-sub">новое, среднее</div></div>';
    html += '<div class="lvl-btn' + (QC.capex_level === 'премиум' ? ' selected' : '') + '" onclick="selectLevel(this,\'премиум\')"><div class="lvl-title">Премиум</div><div class="lvl-sub">топовое</div></div>';
    html += '</div>';
  }
  else if (sn === 'confirm') {
    html = '<div class="step-head"><div class="step-kicker">Проверка</div><h2>Всё верно?</h2><div class="step-desc">Проверьте параметры перед расчётом</div></div>';
    html += '<table class="confirm-table">';
    html += '<tr><td>Город</td><td>' + (QC.city_name || '') + '</td></tr>';
    html += '<tr><td>Ниша</td><td>' + (NICHE_NAMES[QC.niche_id] || QC.niche_id) + '</td></tr>';
    html += '<tr><td>Формат</td><td>' + (QC.format_name || QC.format_id) + '</td></tr>';
    html += '<tr><td>Локация</td><td>' + QC.loc_type + '</td></tr>';
    html += '<tr><td>Площадь</td><td>' + QC.area_m2 + ' м²</td></tr>';
    html += '<tr><td>Оснащение</td><td>' + QC.capex_level + '</td></tr>';
    html += '</table>';
  }

  document.getElementById('steps').innerHTML = html;

  var cta = document.getElementById('cta-wrap');
  cta.style.display = AUTO_STEPS[sn] ? 'none' : '';
  updateBtn();
}

function updateBtn() {
  var btn = document.getElementById('next-btn');
  var sn = STEPS[QC.step];
  var ok = false;
  if (sn === 'city') ok = !!QC.city_id;
  else if (sn === 'category') ok = QC.category_idx !== null;
  else if (sn === 'niche') ok = !!QC.niche_id;
  else if (sn === 'format') ok = !!QC.format_id;
  else ok = true;
  btn.className = 'btn' + (ok ? '' : ' disabled');
  btn.textContent = sn === 'confirm' ? 'Рассчитать' : 'Далее';
}

/* ==========================================================
   Wizard: actions
   ========================================================== */
function autoAdvance() {
  if (QC._advancing) return;
  QC._advancing = true;
  haptic('select');
  setTimeout(function() {
    QC._advancing = false;
    if (QC.step === STEPS.length - 1) { runCalculation(); return; }
    QC.step++;
    renderStep();
  }, 180);
}

function onBack() {
  if (document.getElementById('report-screen').classList.contains('active')) {
    // Back from report to wizard
    document.getElementById('report-screen').classList.remove('active');
    document.getElementById('wizard-screen').style.display = '';
    setBackLabel();
    return;
  }
  if (QC.step === 0) {
    if (tg && tg.close) tg.close();
    else window.history.back();
    return;
  }
  QC.step--;
  renderStep();
}

function onNext() {
  var btn = document.getElementById('next-btn');
  if (btn.classList.contains('disabled')) return;
  if (QC.step === STEPS.length - 1) { runCalculation(); return; }
  QC.step++;
  renderStep();
}

function selectCity(el, id, name) {
  QC.city_id = id; QC.city_name = name;
  var opts = el.parentNode.querySelectorAll('.opt');
  for (var i = 0; i < opts.length; i++) opts[i].classList.remove('selected');
  el.classList.add('selected');
  autoAdvance();
}
function selectCategory(el, idx) {
  if (QC.category_idx !== idx) { QC.niche_id = null; QC.format_id = null; }
  QC.category_idx = idx;
  var opts = el.parentNode.querySelectorAll('.opt');
  for (var i = 0; i < opts.length; i++) opts[i].classList.remove('selected');
  el.classList.add('selected');
  autoAdvance();
}
function selectNiche(el, id) {
  if (QC.niche_id !== id) QC.format_id = null;
  QC.niche_id = id; QC.niche_name = NICHE_NAMES[id] || id;
  var opts = el.parentNode.querySelectorAll('.opt');
  for (var i = 0; i < opts.length; i++) opts[i].classList.remove('selected');
  el.classList.add('selected');
  autoAdvance();
}
function selectFormat(el, id, name) {
  QC.format_id = id; QC.format_name = name;
  var opts = el.parentNode.querySelectorAll('.opt');
  for (var i = 0; i < opts.length; i++) opts[i].classList.remove('selected');
  el.classList.add('selected');
  autoAdvance();
}
function selectLoc(el, t) {
  QC.loc_type = t;
  var btns = el.parentNode.querySelectorAll('.toggle');
  for (var i = 0; i < btns.length; i++) btns[i].classList.remove('selected');
  el.classList.add('selected');
  haptic('select');
}
function changeArea(v) { QC.area_m2 = parseInt(v, 10); document.getElementById('area-val').textContent = v + ' м²'; }
function selectLevel(el, l) {
  QC.capex_level = l;
  var btns = el.parentNode.querySelectorAll('.lvl-btn');
  for (var i = 0; i < btns.length; i++) btns[i].classList.remove('selected');
  el.classList.add('selected');
  haptic('select');
}

/* ==========================================================
   Load cities + formats
   ========================================================== */
function loadCities() {
  apiGet('/cities', function(err, resp) {
    if (err || !resp) { showLoadError('cities'); return; }
    QC.cities = resp.cities || resp;
    if (STEPS[QC.step] === 'city') renderStep();
  });
}
function loadFormats() {
  apiGet('/formats/' + QC.niche_id, function(err, resp) {
    var list = document.getElementById('format-list');
    if (!list) return;
    if (err || !resp) { list.innerHTML = '<div class="error-card">Не удалось загрузить форматы</div>'; return; }
    QC.formats = resp.formats || resp;
    var html = '';
    for (var i = 0; i < QC.formats.length; i++) {
      var f = QC.formats[i];
      var fid = f.format_id || f.id;
      var fname = FORMAT_NAMES[fid] || fid;
      var sel = QC.format_id === fid ? ' selected' : '';
      html += '<div class="opt' + sel + '" onclick="selectFormat(this,\'' + fid + '\',\'' + fname.replace(/'/g, "\\'") + '\')"><div class="opt-icon">📋</div><div><div class="opt-label">' + fname + '</div></div></div>';
    }
    list.innerHTML = html;
  });
}
function showLoadError(what) {
  document.getElementById('steps').innerHTML = '<div class="error-card">Не удалось загрузить ' + what + '. Проверьте соединение.</div>';
}

/* ==========================================================
   Run calculation
   ========================================================== */
function runCalculation() {
  haptic('success');
  document.getElementById('wizard-screen').style.display = 'none';
  document.getElementById('loading-screen').classList.add('active');

  var body = {
    city_id: QC.city_id, niche_id: QC.niche_id, format_id: QC.format_id,
    area_m2: QC.area_m2, loc_type: QC.loc_type,
    capex_level: QC.capex_level, start_month: QC.start_month
  };

  apiPost('/quick-check', body, function(err, data) {
    document.getElementById('loading-screen').classList.remove('active');
    if (err || !data || data.status !== 'ok' || !data.result) {
      document.getElementById('wizard-screen').style.display = '';
      alert('Ошибка расчёта. Попробуйте ещё раз.');
      return;
    }
    RESULT = data.result;
    renderReport(RESULT);
  });
}

/* ==========================================================
   Derive extra metrics from existing API response
   (Phase 1 — done on client; Phase 2 moves to engine)
   ========================================================== */
function deriveMetrics(r) {
  var b1 = r.block_1 || {};
  var b2 = r.block_2 || {};
  var b3 = r.block_3 || {};
  var b4 = r.block_4 || {};
  var b5 = r.block_5 || {};
  var b6 = r.block_6 || {};
  var b7 = r.block_7 || {};
  var oe = r.owner_economics || null; // Phase 2 — server-computed

  var opexItems = b3.items || [];
  function findItem(re) {
    for (var i = 0; i < opexItems.length; i++) {
      if (re.test((opexItems[i].name || '').toLowerCase())) return opexItems[i].amount || 0;
    }
    return 0;
  }

  var revenue, cogs, gross, rent, fot, mkt, util, other,
      opexTotal, profitBeforeTax, tax, social, netInPocket,
      closurePocket, growthPocket, closureRevenue, growthRevenue,
      stress, payback, taxRatePct, taxRegime;

  if (oe && typeof oe.net_in_pocket === 'number') {
    // Server values — source of truth
    revenue = oe.revenue; cogs = oe.cogs; gross = oe.gross;
    var ob = oe.opex_breakdown || {};
    rent = ob.rent || 0; fot = ob.fot || 0; mkt = ob.marketing || 0;
    util = ob.utilities || 0; other = ob.other || 0;
    opexTotal = oe.opex_total || (rent + fot + mkt + util + other);
    profitBeforeTax = oe.profit_before_tax;
    tax = oe.tax_amount; taxRatePct = oe.tax_rate_pct || (b7.rate_pct || 4);
    taxRegime = b7.regime || 'Упрощёнка';
    social = oe.social_payments;
    netInPocket = oe.net_in_pocket;
    closurePocket = oe.closure_pocket || 200000;
    growthPocket = oe.growth_pocket || 600000;
    closureRevenue = oe.closure_revenue || 0;
    growthRevenue = oe.growth_revenue || 0;
    payback = oe.owner_payback_months || null;

    var serverStress = oe.stress_test || [];
    stress = serverStress.map(function(s) {
      return { color: s.color, label: s.label, params: s.params, pocket: s.net_in_pocket };
    });
  } else {
    // Client fallback (if server didn't deploy Phase 2 yet)
    revenue = b1.revenue_monthly || 0;
    cogs = b2.cogs_monthly || Math.round(revenue * ((b2.cogs_pct || 30) / 100));
    gross = b2.gross_profit || (revenue - cogs);
    opexTotal = b3.total || 0;
    taxRatePct = b7.rate_pct || 4;
    taxRegime = b7.regime || 'Упрощёнка';
    tax = Math.round(revenue * taxRatePct / 100);
    rent = findItem(/аренд/); fot = findItem(/фот|зарпл/); mkt = findItem(/маркет|рекл/);
    util = findItem(/коммун|утили|электр/);
    other = Math.max(0, opexTotal - rent - fot - mkt - util);
    social = 45000;
    profitBeforeTax = gross - opexTotal;
    netInPocket = profitBeforeTax - tax - social;
    closurePocket = 200000; growthPocket = 600000;
    var ptr = netInPocket > 0 ? revenue / netInPocket : 0;
    closureRevenue = ptr > 0 ? Math.round(closurePocket * ptr) : 0;
    growthRevenue = ptr > 0 ? Math.round(growthPocket * ptr) : 0;
    stress = [];
    var bad = { color: 'red', label: 'Если всё плохо', params: 'Трафик −25%, чек −10%, аренда +20%' };
    var br = Math.round(revenue * 0.75 * 0.9);
    bad.pocket = br - Math.round(br * cogs / Math.max(revenue, 1)) - (opexTotal - rent + Math.round(rent * 1.2)) - Math.round(br * taxRatePct / 100) - social;
    stress.push(bad);
    stress.push({ color: 'blue', label: 'Базовый сценарий', params: 'Расчётные показатели', pocket: netInPocket });
    var gr = Math.round(revenue * 1.2 * 1.1);
    stress.push({ color: 'green', label: 'Если всё хорошо', params: 'Трафик +20%, чек +10%', pocket: gr - Math.round(gr * cogs / Math.max(revenue, 1)) - opexTotal - Math.round(gr * taxRatePct / 100) - social });
    payback = netInPocket > 0 ? Math.max(1, Math.round((b4.investment_min || b4.total || 0) / netInPocket)) : null;
  }

  var invMin = b4.investment_min || b4.total || 0;

  return {
    revenue: revenue, cogs: cogs, gross: gross,
    rent: rent, fot: fot, mkt: mkt, util: util, other: other,
    opexTotal: opexTotal, profitBeforeTax: profitBeforeTax,
    tax: tax, taxRatePct: taxRatePct, taxRegime: taxRegime,
    social: social,
    netInPocket: netInPocket,
    invMin: invMin, invMax: b4.investment_max || invMin, capexItems: b4.items || [],
    bufferMonths: 3, bufferTotal: Math.round((opexTotal + social) * 3),
    payback: payback,
    closurePocket: closurePocket, growthPocket: growthPocket,
    closureRevenue: closureRevenue, growthRevenue: growthRevenue,
    breakEven: b6.tb_revenue || 0, safetyMargin: b6.safety_margin || 0,
    tbChecksDay: b6.tb_checks_day || 0, checkMed: b1.check_med || 0,
    trafficMed: b1.traffic_med || 0, locomotive: b1.locomotive || '',
    stress: stress,
    verdictColor: (r.block_10 && r.block_10.verdict_color) || 'yellow',
    verdictText: (r.block_10 && r.block_10.verdict_text) || '',
    risks: (r.block_9 && r.block_9.risks) || [],
    mistakes: (r.block_9 && r.block_9.mistakes) || [],
    nextSteps: (r.block_10 && r.block_10.next_steps) || [],
    checklist: (r.block_12_checklist && r.block_12_checklist.items) || [],
    personnel: parsePersonnel(opexItems),
    audience: parseAudience(b1.disclaimer || ''),
    cls: (r.input && r.input['class']) || QC.capex_level
  };
}

function getNicheRisks(nicheId, m) {
  var specific = NICHE_RISKS[nicheId];
  if (specific && specific.length) return specific;
  // Generic fallback from API
  var risks = m.risks || [];
  var mistakes = m.mistakes || [];
  var all = [];
  for (var i = 0; i < risks.length; i++) all.push({ title: 'Риск ниши', body: risks[i], protect: null });
  for (var i = 0; i < mistakes.length; i++) all.push({ title: 'Типичная ошибка', body: mistakes[i], protect: null });
  return all;
}

function parsePersonnel(items) {
  for (var i = 0; i < items.length; i++) {
    if (/фот|зарпл/i.test(items[i].name || '')) return items[i].note || '';
  }
  return '';
}
function parseAudience(text) {
  // "Средний чек … ЦА: Фрилансеры, пары, студенты, 18-50, доход средний."
  var m = (text || '').match(/ЦА:\s*([^\.]+)/i);
  return m ? m[1].trim() : '';
}

/* ==========================================================
   Render report (9 blocks)
   ========================================================== */
function renderReport(r) {
  var m = deriveMetrics(r);
  var wrap = document.getElementById('report-screen');
  wrap.classList.add('active');
  document.getElementById('wizard-screen').style.display = 'none';
  setBackLabel();

  var niche = QC.niche_id;
  var nicheIcon = NICHE_ICONS[niche] || '📊';
  var nicheName = NICHE_NAMES[niche] || niche;
  var html = '';

  // ── BLOCK 1 — Вердикт ─────────────────────────────
  var vc = m.verdictColor;
  var verdText = vc === 'green' ? 'Бизнес жизнеспособен'
    : vc === 'red' ? 'Высокий риск, рекомендуем пересмотреть'
    : 'Бизнес возможен, но есть риски';
  var verdIcon = vc === 'green' ? '✅' : vc === 'red' ? '🚨' : '⚠️';
  var pocketColor = m.netInPocket <= 0 ? 'red' : (m.netInPocket < m.closurePocket ? 'yellow' : '');
  html += '<div class="block">';
  html += '<div class="verdict-hero"><div class="verdict-icon">' + nicheIcon + '</div>';
  html += '<div class="verdict-name">' + (QC.format_name || nicheName) + '</div>';
  html += '<div class="verdict-city">' + nicheName + ' · ' + (QC.city_name || '') + '</div></div>';
  html += '<div class="verdict-status ' + vc + '"><div class="verdict-status-ic">' + verdIcon + '</div><div>' + verdText + '</div></div>';
  html += '<div class="hero-number-wrap">';
  html += '<div class="hero-label">В карман собственнику <span class="hint-btn" onclick="showHint(\'pocket\')">?</span></div>';
  html += '<div class="hero-number ' + pocketColor + '">' + fmtK(m.netInPocket) + ' ₸</div>';
  html += '<div class="hero-unit">в месяц</div>';
  html += '<div class="hero-caption">после всех налогов и обязательных соцплатежей</div>';
  html += '</div>';
  html += '<div class="mini-grid">';
  html += '<div class="mini-card"><div class="mini-label">Окупаемость</div><div class="mini-value">' + (m.payback ? m.payback + ' мес' : '—') + '</div></div>';
  html += '<div class="mini-card"><div class="mini-label">Старт</div><div class="mini-value">' + fmtK(m.invMin) + '</div></div>';
  html += '<div class="mini-card"><div class="mini-label">Запас</div><div class="mini-value">' + fmtPct(m.safetyMargin) + '</div></div>';
  html += '</div>';
  html += '</div>';

  // ── BLOCK 2 — Паспорт ─────────────────────────────
  html += '<div class="block">';
  html += '<div class="block-title">📋 Паспорт проекта</div>';
  html += '<div class="passport-row"><div class="passport-ic">📍</div><div><div class="passport-label">Город</div><div class="passport-val">' + (QC.city_name || '') + '</div></div></div>';
  html += '<div class="passport-row"><div class="passport-ic">🏪</div><div><div class="passport-label">Формат</div><div class="passport-val">' + (QC.format_name || QC.format_id) + '</div></div></div>';
  html += '<div class="passport-row"><div class="passport-ic">💎</div><div><div class="passport-label">Класс оснащения</div><div class="passport-val">' + (m.cls || QC.capex_level) + '</div></div></div>';
  html += '<div class="passport-row"><div class="passport-ic">📐</div><div><div class="passport-label">Площадь</div><div class="passport-val">' + QC.area_m2 + ' м² · ' + QC.loc_type + '</div></div></div>';
  if (m.personnel) html += '<div class="passport-row"><div class="passport-ic">👨‍💼</div><div><div class="passport-label">Штат</div><div class="passport-val">' + m.personnel + '</div></div></div>';
  if (m.audience) html += '<div class="passport-row"><div class="passport-ic">👥</div><div><div class="passport-label">Целевая аудитория</div><div class="passport-val">' + m.audience + '</div></div></div>';
  html += '</div>';

  // ── BLOCK 3 — Юнит-экономика ─────────────────────
  var costPerTx = Math.round(m.checkMed * (m.cogs / Math.max(m.revenue, 1)));
  var profitPerTx = m.checkMed - costPerTx;
  var dailyCustomers = 15;
  var dailyGross = profitPerTx * dailyCustomers;
  html += '<div class="block">';
  html += '<div class="block-title">💰 Экономика одного клиента <span class="hint-btn" onclick="showHint(\'unit\')">?</span></div>';
  html += '<div class="block-h">Сколько вы зарабатываете с одного чека</div>';
  html += '<div class="unit-chain">';
  html += '<div class="unit-row"><div class="unit-label">Средний чек</div><div class="unit-val">' + fmt(m.checkMed) + ' ₸</div></div>';
  html += '<div class="unit-op">минус</div>';
  html += '<div class="unit-row"><div class="unit-label">Себестоимость чека</div><div class="unit-val">−' + fmt(costPerTx) + ' ₸</div></div>';
  html += '<div class="unit-op">равно</div>';
  html += '<div class="unit-row primary"><div class="unit-label">Заработок с клиента</div><div class="unit-val">' + fmt(profitPerTx) + ' ₸</div></div>';
  html += '</div>';
  html += '<div class="block-hint">Если в день приходит <strong>' + dailyCustomers + ' клиентов</strong> — это <strong>' + fmt(dailyGross) + ' ₸</strong> валовой прибыли в день. Но из этого ещё нужно заплатить аренду, зарплаты, налоги.</div>';
  html += '</div>';

  // ── BLOCK 4 — Водопад P&L ────────────────────────
  var maxAmount = m.revenue || 1;
  function wfRow(label, amount, kind) {
    var pct = Math.min(100, Math.round(Math.abs(amount) / maxAmount * 100));
    var cls = kind || '';
    var sign = (kind === 'negative' || (amount < 0)) ? '−' : '';
    var disp = fmtK(Math.abs(amount)) + ' ₸';
    return '<div class="wf-row ' + cls + '" style="--w:' + pct + '%"><div class="wf-bar"></div><div class="wf-label">' + label + '</div><div class="wf-val">' + sign + disp + '</div></div>';
  }
  html += '<div class="block">';
  html += '<div class="block-title">📊 Куда уходят деньги</div>';
  html += '<div class="block-h">Доходы и расходы за месяц</div>';
  html += '<div class="waterfall">';
  html += wfRow('Выручка в месяц', m.revenue, 'positive');
  html += wfRow('Себестоимость', m.cogs, 'negative');
  html += wfRow('Наценка после себестоимости', m.gross, 'subhead');
  if (m.rent) html += wfRow('Аренда', m.rent, 'negative');
  if (m.fot) html += wfRow('ФОТ (зарплаты + налоги)', m.fot, 'negative');
  if (m.mkt) html += wfRow('Маркетинг', m.mkt, 'negative');
  if (m.util) html += wfRow('Коммуналка', m.util, 'negative');
  if (m.other > 0) html += wfRow('Прочие расходы', m.other, 'negative');
  html += wfRow('Прибыль до налогов', m.profitBeforeTax, 'subhead');
  html += wfRow('Налог ' + m.taxRegime + ' (' + m.taxRatePct + '%)', m.tax, 'negative');
  html += wfRow('Соцплатежи собственника', m.social, 'negative');
  html += '<div class="wf-row hero"><div class="wf-label">В карман собственнику</div><div class="wf-val">' + fmtK(m.netInPocket) + ' ₸</div></div>';
  html += '</div>';
  html += '<div class="block-hint">Налог <strong>УСН</strong> <span class="hint-btn" onclick="showHint(\'usn\')">?</span> платится с выручки, не с прибыли. <strong>Соцплатежи</strong> <span class="hint-btn" onclick="showHint(\'social\')">?</span> собственник платит за себя независимо от дохода.</div>';
  html += '</div>';

  // ── BLOCK 5 — Стартовые вложения + подушка ──────
  html += '<div class="block">';
  html += '<div class="block-title">💼 Стартовые вложения</div>';
  html += '<div class="block-h">Что нужно вложить до открытия</div>';

  html += '<div class="capex-group">';
  html += '<div class="capex-head">💰 Оборудование и ремонт</div>';
  for (var i = 0; i < m.capexItems.length; i++) {
    var ci = m.capexItems[i];
    html += '<div class="capex-item"><span>' + (ci.name || ci.item || '') + '</span><span class="val">' + fmtK(ci.amount || ci.cost || 0) + ' ₸</span></div>';
  }
  html += '<div class="capex-total"><span>Оборудование всего</span><span class="val">' + fmtK(m.invMin) + ' ₸</span></div>';
  html += '</div>';

  html += '<div class="capex-group">';
  html += '<div class="capex-head">🛡️ Подушка безопасности <span class="hint-btn" onclick="showHint(\'buffer\')">?</span></div>';
  html += '<div class="capex-item"><span>Резерв на 3 месяца расходов</span><span class="val">' + fmtK(m.bufferTotal) + ' ₸</span></div>';
  html += '<div class="capex-total"><span>Подушка</span><span class="val">' + fmtK(m.bufferTotal) + ' ₸</span></div>';
  html += '</div>';

  html += '<div class="total-grand"><span>Итого на старт</span><span class="val">' + fmtK(m.invMin + m.bufferTotal) + ' ₸</span></div>';
  html += '<div class="block-hint">Подушка безопасности — это деньги, которые позволят работать, даже если первые месяцы выручка будет ниже плана. Без подушки 80% бизнесов закрываются в первые 6 месяцев.</div>';
  html += '</div>';

  // ── BLOCK 6 — Три точки на шкале ─────────────────
  var pocketOnScale = m.netInPocket;
  var scalePos;
  if (pocketOnScale <= 0) scalePos = 5;
  else if (pocketOnScale < m.closurePocket) scalePos = 15 + (pocketOnScale / m.closurePocket) * 20;
  else if (pocketOnScale < m.growthPocket) scalePos = 35 + ((pocketOnScale - m.closurePocket) / (m.growthPocket - m.closurePocket)) * 45;
  else scalePos = Math.min(95, 80 + (pocketOnScale - m.growthPocket) / m.growthPocket * 15);

  html += '<div class="block">';
  html += '<div class="block-title">📍 На какой вы стадии</div>';
  html += '<div class="block-h">Три точки на шкале жизни бизнеса</div>';
  html += '<div class="scale-wrap">';
  html += '<div class="scale-track"><div class="scale-mark" style="left:' + scalePos + '%"></div></div>';
  html += '<div class="scale-legend"><span>Закрытие</span><span>Безубыток</span><span>Рост</span></div>';
  html += '<div class="scale-points">';
  html += '<div class="scale-point red"><div class="sp-head"><span>🔴 Точка закрытия <span class="hint-btn" onclick="showHint(\'closure\')">?</span></span><span class="sp-val">&lt; ' + fmtK(m.closurePocket) + ' ₸</span></div><div class="sp-desc">Собственник зарабатывает меньше наёмного продавца. Смысла вести бизнес нет.</div></div>';
  html += '<div class="scale-point yellow"><div class="sp-head"><span>🟡 Безубыточность <span class="hint-btn" onclick="showHint(\'breakeven\')">?</span></span><span class="sp-val">' + fmtK(m.breakEven) + ' ₸</span></div><div class="sp-desc">Минимальная выручка в месяц, при которой бизнес не теряет и не зарабатывает. Нужно ~' + m.tbChecksDay + ' чеков в день.</div></div>';
  html += '<div class="scale-point green"><div class="sp-head"><span>🟢 Точка роста <span class="hint-btn" onclick="showHint(\'growth\')">?</span></span><span class="sp-val">&gt; ' + fmtK(m.growthPocket) + ' ₸</span></div><div class="sp-desc">Можно нанимать второго сотрудника, инвестировать в рекламу или открывать вторую точку.</div></div>';
  html += '</div></div>';
  html += '</div>';

  // ── BLOCK 7 — Стресс-тест ────────────────────────
  var stressMax = 1;
  for (var i = 0; i < m.stress.length; i++) if (Math.abs(m.stress[i].pocket) > stressMax) stressMax = Math.abs(m.stress[i].pocket);
  html += '<div class="block">';
  html += '<div class="block-title">🎯 Стресс-тест</div>';
  html += '<div class="block-h">Что будет, если рынок просядет</div>';
  html += '<div class="block-sub">Проверка устойчивости бизнеса в разных условиях</div>';
  for (var i = 0; i < m.stress.length; i++) {
    var s = m.stress[i];
    var w = Math.max(15, Math.round(Math.abs(s.pocket) / stressMax * 100));
    var sign = s.pocket < 0 ? '−' : '';
    html += '<div class="scenario ' + s.color + '"><div class="scen-head"><span class="scen-tag">' + s.label + '</span></div>';
    html += '<div class="scen-params">' + s.params + '</div>';
    html += '<div class="scen-bar-wrap"><div class="scen-bar" style="--w:' + w + '%"></div>';
    html += '<div class="scen-value">' + sign + fmtK(Math.abs(s.pocket)) + ' ₸/мес</div></div></div>';
  }
  html += '<div class="block-hint">Сценарий «если всё плохо» показывает устойчивость. Если даже в плохом варианте вы не уходите в минус — бизнес жизнеспособен.</div>';
  html += '</div>';

  // ── BLOCK 8 — Риски ниши ─────────────────────────
  var nicheRisks = getNicheRisks(QC.niche_id, m);
  if (nicheRisks.length) {
    html += '<div class="block">';
    html += '<div class="block-title">⚠️ Риски ниши</div>';
    html += '<div class="block-h">Почему закрываются такие бизнесы</div>';
    for (var i = 0; i < nicheRisks.length && i < 7; i++) {
      var risk = nicheRisks[i];
      html += '<div class="risk-card"><div class="risk-head"><span class="risk-ic">⚠️</span><span>' + risk.title + '</span></div>';
      html += '<div class="risk-body">' + risk.body + '</div>';
      if (risk.protect) html += '<div class="risk-protect"><strong>Как защититься: </strong>' + risk.protect + '</div>';
      html += '</div>';
    }
    html += '<div class="block-hint">Полный разбор всех рисков с источниками данных и реальными кейсами — в PDF-отчёте.</div>';
    html += '</div>';
  }

  // ── BLOCK 9 — Следующие шаги + апсейлы ───────────
  html += '<div class="block">';
  html += '<div class="block-title">✅ Следующие шаги</div>';
  html += '<div class="block-h">Что сделать на этой неделе</div>';
  html += '<div class="checklist" id="checklist">';
  var steps = m.nextSteps.length ? m.nextSteps : [
    'Проверить локацию лично в часы пик',
    'Получить 3 предложения по аренде',
    'Созвониться с 2 поставщиками',
    'Рассчитать бюджет на первый закуп',
    'Оформить ИП или статус Самозанятого',
    'Открыть счёт в Kaspi Business',
    'Создать Instagram-страницу'
  ];
  for (var i = 0; i < steps.length; i++) {
    html += '<div class="check-item" onclick="toggleCheck(this)"><div class="check-box"></div><div class="check-text">' + steps[i] + '</div></div>';
  }
  html += '</div>';

  html += '<div class="upsell-head"><strong>Вы получили экспресс-оценку.</strong>Для запуска нужен следующий уровень детализации — выбирайте ниже.</div>';

  html += '<div class="upsell">';
  html += '<div class="upsell-tag">📊 Финансовая модель<span class="upsell-price">9 000 ₸</span></div>';
  html += '<ul class="upsell-feats"><li>Помесячный расчёт на 36 месяцев</li><li>Учёт сезонности</li><li>Расчёт кредита и кассовых разрывов</li><li>5 детальных сценариев</li></ul>';
  html += '<button class="btn" onclick="orderUpsell(\'finmodel\')">Заказать финмодель</button></div>';

  html += '<div class="upsell">';
  html += '<div class="upsell-tag">📋 Бизнес-план<span class="upsell-price">15 000 ₸</span></div>';
  html += '<ul class="upsell-feats"><li>Полный документ для банка/гранта</li><li>Шаблон Bastau Biznes</li><li>Маркетинговая стратегия</li><li>Операционный план</li></ul>';
  html += '<button class="btn btn-outline" onclick="orderUpsell(\'bizplan\')">Заказать бизнес-план</button></div>';

  html += '<div class="pdf-block"><h3>📄 Сохранить отчёт в PDF</h3><p>Полный 14-страничный отчёт для партнёров и банка. Скоро.</p><button class="btn btn-outline" onclick="alert(\'PDF-отчёт появится в ближайшее время\')">Скачать PDF (скоро)</button></div>';

  html += '<div style="margin-top:18px"><button class="btn btn-outline" onclick="startOver()">Новый расчёт</button></div>';
  html += '</div>';

  wrap.innerHTML = html;
  window.scrollTo({ top: 0, behavior: 'instant' });
}

/* ==========================================================
   Report actions
   ========================================================== */
function toggleCheck(el) {
  el.classList.toggle('done');
  haptic('select');
}
function orderUpsell(what) {
  var txt = what === 'finmodel' ? 'Хочу заказать финансовую модель' : 'Хочу заказать бизнес-план';
  try {
    if (tg && tg.openTelegramLink) { tg.openTelegramLink('https://t.me/zerekai_bot?start=' + encodeURIComponent(what)); return; }
  } catch(e) {}
  alert(txt + ' — напишите @zerekai_bot');
}
function startOver() {
  QC = {
    step: 0, city_id: null, city_name: null,
    category_idx: null, niche_id: null, niche_name: null,
    format_id: null, format_name: null,
    loc_type: 'ТЦ', area_m2: 30, capex_level: 'стандарт',
    start_month: new Date().getMonth() + 1,
    cities: QC.cities, formats: [], _advancing: false
  };
  RESULT = null;
  document.getElementById('report-screen').classList.remove('active');
  document.getElementById('report-screen').innerHTML = '';
  document.getElementById('wizard-screen').style.display = '';
  renderStep();
  window.scrollTo({ top: 0, behavior: 'instant' });
}

/* ==========================================================
   Bottom sheet
   ========================================================== */
function showHint(key) {
  var h = HINTS[key];
  if (!h) return;
  haptic('light');
  document.getElementById('sheet-title').textContent = h.title;
  var body = '<div class="sheet-section"><div class="sheet-label">Что это простыми словами</div><div class="sheet-text">' + h.what + '</div></div>';
  body += '<div class="sheet-section"><div class="sheet-label">Почему это важно</div><div class="sheet-text">' + h.why + '</div></div>';
  body += '<div class="sheet-section"><div class="sheet-label">Норма для вашей ниши</div><div class="sheet-text">' + h.norm + '</div></div>';
  document.getElementById('sheet-body').innerHTML = body;
  document.getElementById('sheet-bd').classList.add('active');
  document.getElementById('sheet').classList.add('active');
}
function closeSheet() {
  document.getElementById('sheet-bd').classList.remove('active');
  document.getElementById('sheet').classList.remove('active');
}

/* ==========================================================
   Splash
   ========================================================== */
function hideSplash() {
  var s = document.getElementById('splash');
  if (!s || s.classList.contains('fade')) return;
  s.classList.add('fade');
  document.body.classList.remove('splash-on');
  setTimeout(function() { if (s && s.parentNode) s.parentNode.removeChild(s); }, 500);
}

function initSplash() {
  var v = document.getElementById('splash-video');
  if (!v) return;
  var done = false;
  var finish = function() { if (done) return; done = true; hideSplash(); };
  v.addEventListener('ended', finish);
  v.addEventListener('error', finish);
  // Fallback ceiling in case autoplay blocked or metadata slow
  setTimeout(finish, 4500);
  // Kick autoplay (iOS sometimes needs explicit play() after ready)
  var tryPlay = function() { try { v.play().catch(finish); } catch(e) { finish(); } };
  if (v.readyState >= 2) tryPlay(); else v.addEventListener('loadeddata', tryPlay);
  // Tap to skip
  document.getElementById('splash').addEventListener('click', finish);
}

/* ==========================================================
   Init
   ========================================================== */
function init() {
  initSplash();
  loadCities();
  renderStep();
}
document.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>
